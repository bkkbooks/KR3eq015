body:
  text: 卷下燥氣論經云燥勝則乾干為澀滯不通之疾其病有外感內傷之因寒燥燥熱之異傷人氣分血分之次第淺深皆辨之不可不早辨也邵新甫曰外感之燥首傷上焦氣分氣分失治則延及血分內傷之燥乃人之本病由於精血下奪而成或因偏餌燥藥所致病從下焦陰分先起下焦失治則槁及乎上喘咳痿厥三消噎膈之萌總由於此治法外感之燥津液結於上而為患者結者必使之開解非辛潤流利氣機不可內傷之燥精血竭於下而為患者竭者必使之復盈非柔潤靜藥及血肉有情者以滋填之不可大抵是病用藥最忌者苦澀最善者甘柔此其大較也獨是外感內傷宜分寒燥燥熱尤不可混夫因寒而燥為燥之化氣由燥而熱乃燥之本氣人但知燥熱為燥之常而不知寒燥為燥之變無怪乎其辛燥升散動輒得咎也不觀諸內經乎經曰陽明司天燥淫所勝民病善嘔心脅痛不能轉側治以苦溫苦當是微苦如杏仁之類取其通降溫當是溫潤非溫燥升散之類此內經治寒燥之正法也又曰陽明之勝清發於中左胠脅痛溏泄內為嗌塞外發㿗疝大涼肅殺華英改容毛蟲乃殃胸中不便嗌塞而咳據此經文亦指涼燥搏束而言性理大全謂燥屬次寒沈目南曰盛夏暑熱熏蒸人身汗出濈濈肌膚潮潤而不燥冬月嚴凝肅殺人身乾槁燥冽故深秋燥氣行人體肺金應之肌膚亦燥此亦指寒燥而言寒燥如此溫燥可知夫乾金主燥於時為秋然秋不遽燥也秋分以後漸至大涼露寒霜肅清氣搏激燥乃行令燥從天降首傷肺金肺主一身氣化氣為燥郁清肅不行機關不利勢必乾咳連聲胸脅牽痛不能轉側胸悶氣逆喘急乾嘔又或氣為燥郁不能行水水停膈上則必口渴思飲飲水則吐煩悶不寧氣為燥郁不能布津則必寒熱無汗口鼻唇舌起燥嗌喉干疼又或氣為燥郁內外皆壅則必一身盡痛肺主皮毛甚至皮膚干疼手不可按凜凜惡寒甚而肢厥雖覆以重裘不溫頗似陰寒之象又或氣為燥郁治節無權中宮水飲不能屈曲輸於膀胱而直注於大腸則必腹痛泄瀉甚者揮霍攪亂上吐下瀉脈伏肢涼又似陰寒寒濕之象夏受暑燥亦多病此但燥氣干滯所瀉必艱澀難行與濕瀉熱瀉之傾腸滑利者不同吐瀉甚則津液內奪柔化為剛腸燥拘急有似硬梗按之痛甚蜷曲難伸任脈失榮養當臍上下按之堅硬動躍震手沖脈失榮養臍之兩旁按之堅硬動躍震手此皆燥極見證切勿認為積滯誤行攻下又或經絡失於榮養拘攣掣痛俗名轉筋立時陰亡液涸目陷肉銷面青膚黑舌中肉剝神明昏亂陰奪於內陽無依附遂至肢厥身冷汗出如珠內閉外脫不救又或肺燥直逼大腸肺與大腸同屬燥金而成腸澼俗名痢疾燥鬱氣機則腸垢下而色白燥傷血絡則血滲大腸而色紅腸中本無血所行之血乃腸間經絡之血滲入大腸腸中切痛痛而後行裡急後重艱澀不通行後稍止氣機終覺不利糟粕又或結為燥糞與濕痢之痛緩酸墜而不裡急艱澀大便溏而多者有別凡此燥病多生於陰虧之輩勞苦之人夏月炎蒸液為汗耗水竭金枯裡氣已燥以燥感燥同氣相求最為易易唐孫思邈真人制生脈散人參麥冬五味子合為生脈散本屬陰柔之品乃製為散潤藥燥服之既可得藥之形質緩化於內又不膩氣機古人立法周密如此使人夏月服之以保肺金治未病也奈何漢唐以後醫道失傳不知人生天地間外感內傷千變萬化總不外天地陰陽之氣即不外天地燥濕之氣乃世於濕氣猶多發明而於燥氣未能詳究所以每遇外感渾曰風寒不辨其為風燥為風濕為寒燥為寒濕至暑燥初起與寒燥相似更不之辨但見寒熱無汗頭身疼痛咳嗽嘔吐胸悶氣逆等證輒用辛燥升散見有胸悶便曰感寒停滯並用苦燥破滯輕則用蘇薄荊防重則用羌獨芎芷在夏月則用香薷藿香至青皮枳殼山楂等味亦慣行佐用試思以上諸藥其為辛潤乎抑為辛燥乎其在夾濕者用之猶可若是風燥寒燥之邪則以燥治燥變證必然蜂起將見燥邪竄入肌肉則發斑竄入皮膚則發疹竄入營分則舌赤無苔神亂譫煩斯時也見其邪入營分又用一派苦寒清火柔膩滋陰逼令燥邪深入心包深入骨髓入心包則神煩意亂煩屬心肺輕則多言重則譫語閉極則神明昏亂囈語不休目睛頻轉入腎則燥循衣摸席揚手擲足陰液耗極則口噤齒齘身強發痙內閉外脫不可救援又或上焦氣分之邪未開法宜辛潤開達或津液聚於胸膈為痰阻結氣分正在心下硬痛法宜苦辛通降如小陷胸湯半夏瀉心湯溫膽湯三子湯之類對病發藥方能獲效乃不用開化妄用大劑攻下氣為邪搏不能傳送正糞不行但行稀水徒傷氣血又或邪已傳裡遷延不下致成臟結雖下不行若是者始而以燥治燥致邪走竄繼而苦寒冰伏陰柔滋膩致邪閉結終而誤下失下致邪實正虛輕者重重者死蓋不知凡幾其為可慨不亦甚乎又見習俗遇有霍亂不辨燥濕但見腹痛吐瀉輒用藿香正氣散甚有用香砂桂附吳萸諸燥藥其在濕邪自可冀以溫中止瀉若是燥邪不獨瀉不能止必致耗液亡陰內閉外脫或上焦之邪走入中下氣分之邪走入營分每見大便下紅形如血膋遂不可救又見習俗遇有腸澼不辨燥濕輒用敗毒散升陽芍藥湯通里其在風濕致痢用敗毒散升陽轉氣逆流挽舟自可獲效濕熱致痢用芍藥湯酸苦泄熱苦辛通降亦可獲效若是燥邪治以辛燥苦燥必致傷及血液剝盡腸膏如此類推不可枚舉或曰治法何如曰病有燥濕藥有燥潤病有風燥寒燥暑燥燥火燥郁夾濕之分藥有辛潤溫潤清潤咸潤燥潤兼施之別且六氣之邪初無形質以氣傷氣首先犯肺必用輕藥乃可開通汗出而解經曰輕可去實信不誣也況人之汗為津液所化而汗之出乃氣機所傳一經感邪阻遏肺氣氣為邪阻不能布津外通毛竅故身無汗寒熱疼痛氣為邪阻不能布津上濡清竅下通胃腸故口乾舌燥胸悶氣逆二便不調治者當辨燥濕二氣何氣致病所兼何邪兼風兼寒兼暑所化何邪化火未化火所夾何邪夾水夾痰夾食夾本病對病發藥使之開通開字橫看是由肺外達皮毛與升散之向上行者不同通字豎看是由肺下達胃腸通潤通和皆謂之通非專指攻下言也邪一開通津液流行而汗自解何必泥定風藥發汗耶且風藥不獨不能發汗反耗傷津液絶其化汗之源尚冀其化汗耶以燥氣論燥邪初起在未化熱時宜用辛潤開達氣機如杏仁牛蒡桔梗之屬兼寒加以溫潤如豆豉前胡薑蔥之類邪機閉遏加以通潤如白芥子細辛之類咳嗽不止胸前悶悶加蘇子紫菀百部之類辛中帶潤自不傷津而且辛潤又能行水燥夾濕者宜之辛潤又能開閉內外閉遏者宜之其裡氣不和者佐以栝蔞皮鮮薤白之類辛滑流利氣機氣機一通大便自解濁邪解而清邪失所依附亦必化汗而解其化熱者於辛潤劑中酌加清潤輕虛之品二三味如梨皮蔗皮梨汁蔗汁荸薺蘆根石膏知母川貝母南沙參桑葉菊花銀花花粉之類以泄其熱熱泄則清肅令行氣機流利亦必化汗而解其陰虛者於辛潤劑中酌加生地元參沙參麻仁黑脂麻蜂蜜之類養陰潤腸但不宜多用恐膩著邪氣其夾濕者於辛潤劑中酌加蔻仁通草茯苓半夏之類辛淡滲濕亦不宜多用恐燥傷津液其夾濕而化熱者於辛潤劑中酌加滑石淡竹葉之清滲連翹山梔之微苦微燥重者酌加薑汁炒木通炒芩連之類苦降辛通開化濕熱其邪已傳裡依附胃腸渣滓者則攻下一法又未可緩施但下宜適中不可太過觀仲景用大承氣湯一劑分為三服視其進退用之以藥力不及猶可再服藥力太過不可挽回其用心之細有如此者且上焦邪氣開通天氣下降地氣自隨之以運行又何必緩下為能乎此治外燥之大法也或又曰誤藥不可以救乎曰難也藥病相反也燥邪用燥藥一相反也肺喜清肅而藥用濁烈二相反也肺主下降而藥用升散三相反也燥邪屬氣以氣傷氣原無形質而且肺為輕虛之臟膻中為空靈之所苦寒沉降陰柔滯膩氣濁味厚病未閉而藥閉之病已閉而藥復閉之四相反也氣分之邪未開而津液又被下奪五相反也一病而五相反不死何待燥邪本易化熱今誤被辛燥升散寒涼冰伏陰柔滋膩不得再用熱藥挽之惟有用余氏普濟丹寧上丸養液開閉以回萬一曰辛燥寒涼陰柔三者之弊如此其甚其不可以一用乎而又非也降佐以升降非攻破乃辛潤流通使之自降升非升散不過用微燥之品數分以和格拒而已開佐以闔凡寒涼陰柔皆是闔機君臣佐使配合得宜亦何不可夫天地陰陽之道即升降開闔之道人苟知此立方自錯綜變化神妙不測矣又有內寒燥一證考醫壘元戎嘗用溫熱藥治之如桂附硫黃良薑巴豆之屬然彼系治北方之人感受大寒寒結於內卒然腹痛不曾化熱乃用熱藥為丸以通寒結此偶用之方非常法也劉河間曰燥本屬秋陰異於寒濕而同於風熱熱甚則液耗風生肝主風木主筋肺不清肅下降則津液聚於胸膈而為痰飲不歸正化以潤其筋其為病有經脈徑強而口噤者燥甚乾澀收斂故也有經脈拘急或時惡寒或善伸數缺脈浮數而弦者燥氣怫鬱裡氣不舒故也有脾胃乾涸成消渴者燥劫胃津故也有風癇發作瘛瘲昏冒僵仆者燥甚化風涎溢胸膈因燥生濕故也外燥昏閉亦多由此至於中風筋緩不收與諸膹郁病痿似與徑切緊澀相反而其為燥則同特其燥之甚焉耳觀秋深燥甚草木有枯縮而不伸者亦有萎落而不收者其理可悟矣夫手得血而能持足得血而能行燥則血液衰少而氣不流暢緩縱不收必然之理孫一奎曰燥旺於秋然必秋分以後清氣行而萬物乃燥燥屬金金屬西方之氣在人為肺乃運氣以卯酉為陽明燥金司天而不言肺者何也蓋以肺脈起於中焦津液出於中焦故也彼醫經統旨謂燥是陽明所化亦是故耳沈生明曰內經病機一十九條獨遺燥氣蓋為燥兼風熱而化言風熱而燥在其中矣燥兼風化者經曰風能勝濕濕去則燥生在人則風能爍液液去則燥生燥傷肺金金不勝水而病及肝木故中風筋脈動弦風癇口噤收斂急切諸病生燥兼熱化者易曰燥萬物者莫熯乎火始也火爍金而燥乃成既也金不生水而燥益甚故消穀善飢胃槁噎膈二便閉塞枯涸燥裂諸病又生由熱生風由風生燥燥又生熱循環勝復至於髓液俱枯燥非淺患明矣推致燥之由有因於天者有因於人者陽明燥金司天或久旱無雨燥化大行傷及肺金此因於天者也七情不節氣結神傷精損及病時汗吐下太過或久勞風日之中頻近爐火之旁或食味辛熱太過或虛勞誤投溫燥與夫服食家久服金石之品皆能燥傷津液此因於人者也然究其本源皆緣血液不足所致蓋陰血虛則不能營運乎百體津液耗則不能滋養乎三焦指上中下三焦言由是邪熱怫鬱燥變多端或燥於外而皮膚皴裂或燥於內而精血枯涸燥於上則咽鼻乾疼燥於下則便溺閉結兼熱則手足痿化風則癇痙作實而燥熱必發顛狂虛而燥熱必致勞咳燥傷肺金不能敷布水精則又停痰停飲燥中夾濕而為噎膈因燥致病何可勝言治燥之法當觀釜沸之理血譬諸湯氣譬諸火若火猛湯沸而為實邪則當沃薪滅焰使不涸竭張太守所謂急下陽明以存津液者此也若沸久將干則又當益水勝火使不上僭王太僕所謂壯水之主以制陽光者此也又按經云心移寒於肺為肺消飲一溲二死不治謂之死陰死陰者謂心肺真陰枯涸真陽亦衰寒從中起氣不化液肺之陰氣已死也景嶽曾以八味丸歸脾湯治一搢紳而愈又如大便閉結食少脈微謂之陰結以半硫丸治之而愈是皆血枯氣澀陰傷及陽不能運化蒸變如地氣不上騰則天氣不下降閉塞而成冬者然此因虛而寒因寒而燥則又當改清潤為溫潤矣知經知權知常知變乃不愧為司命焉喻嘉言曰病機一十九條獨遺燥氣夫六氣配四時風於時為春暑於時為夏燥於時為秋寒於時為冬濕生於土土寄旺四時而季夏十八日為尤旺竊謂內經原文當是春傷於風夏傷於暑長夏傷於濕秋傷於燥冬傷於寒特傳寫者誤於暑字下濕字上脫略數字耳蓋秋傷於燥理之決然而無可疑者也經又謂咳不止而出白血者死白血謂色淺紅似肉似肺乃肺臟消削之驗然則病機云諸氣膹郁皆屬於肺諸痿喘嘔皆屬於上二條指燥病言明甚至左胠脅痛不能轉側嗌乾面塵身無膏澤足外反熱腰痛驚駭筋攣丈夫㿗疝婦人少腹痛目眯眥瘡則又燥病之本於肝而散見不一者也而要皆秋傷於燥之徵也奈何解者不知病機篇之偶有脫誤竟指燥病為濕病顯與經旨背而馳哉經曰心移熱於肺傳為膈消肺燥之由來者遠矣苟其人腎水得上交於心則心火自得下交於腎水火既濟何傷肺之有即或腎水不足而胃中津液猶足以協濟上供肺亦不至過燥也若中下之澤既竭而高源之水猶得措於不傾此必無之事矣經又云二陽結謂之消是手陽明大腸足陽明胃熱結而精血不榮致成消渴舌肉赤裂大渴引飲與膈消義同治膈消用白虎加人參湯清燥救肺觀此可知諸氣膹郁諸痿喘嘔之屬肺燥者用之亦無不合矣陰陽別論曰二陽之病發心脾有不得隱曲女子不月其傳為風消傳為息賁者死不治二陽陽明胃也發於心脾者謂二陽之病發於心脾者也心藏神脾藏意心之所發而有所主者謂之意脾雖藏意實本於心思則脾氣結而心氣亦結心氣結而心血亦結燥從中起傷及陽明陽明主肌肉風消者肌肉如風消削也息賁者息有音而上賁不下乃因肺氣虛不能下歸於腎腎氣虛不能上納乎肺也臟腑陰液銷亡殆盡故直斷之曰死不治柯韻伯論痙濕異同曰病機一十九條獨缺燥病若諸痙項強皆屬於濕愚竊疑之即本論亦自有痙濕之分且曰太陽病寒傷太陽經發汗太過因致痙則痙之屬燥無疑矣彼諸痙屬濕之說其傳寫之誤乎抑濕化為燥乎夫痙乃血虛筋急之狀按六氣皆足以致痙風寒之痙乃清氣搏激所致暑濕之痙或風寒搏激暑濕所致或暑濕壅遏所致或暑濕化燥所致或發汗太過所致其搏激壅遏者非辛潤溫潤以解之不可其化燥者及發汗太過者非清潤甘潤溫潤以濡之不可又按六經痙病各有部位身以後者屬太陽頭項強急腰脊反折髀不可屈膕筋如結皆其證也身以前者屬陽明頭面動搖口噤齒齘缺盆紐痛腿腳攣急皆其證也身之側者屬少陽口眼歪邪手足牽引兩脅拘急半身不遂皆其證也腹內拘急或因吐瀉而四肢拘急屬太陰惡寒蜷臥尻以代踵脊以代頭俯不能仰屬少陰睪丸上升宗筋下注少腹裡急陰中拘攣膝筋拘急屬厥陰然六經部位雖不同而要皆歸於燥但當辨燥之所因因寒因風因風寒束搏暑濕壅遏所化風寒化燥暑濕化燥以治其原加引經藥以為之使不必泥定經絡逐末而忘其本也其因風寒搏激致痙者其證發熱惡寒無汗氣上衝胸小便不利其脈堅緊其狀強直而口噤此得之天氣即經所謂諸暴強直皆屬於風是也勇猛無汗故曰剛痙其因暑濕壅遏致痙者其證發熱有汗而不惡寒其脈沉遲模糊不清往來不利其狀項強𠘧𠘧此得之地氣即經所謂諸痙項強皆屬於濕是也軟弱有汗故名柔痙仲景治因於風者君葛根甘涼以治風之動而又清潤治燥也風陽化熱乃可用若風寒搏束又非所宜治因於濕熱者君栝蔞根苦降以決濕之壅而又涼潤治燥也一藥而兩用之不惟不相礙且可相濟學者所當隅反也且夫善醫者必用視觀察之法而辨於其微辨於其早以治未病如項強而痛即痙之一端觀此便知是太陽經脈血虛而預防之如傷寒論云脈浮自汗心煩惡寒而腳攣急知痙之將作與以桂枝湯則厥與以芍藥甘草湯則其腳自伸甘草甘以緩急芍藥微潤微苦治燥而不膩邪仲聖用藥非若後人之顧此失彼也乃習俗見此不獨不能預防而且誤作風治辛散發汗助陽耗陰將見項背強直口噤齒齘腿腳攣急臥不著席諸證生矣此無他不審虛實故也夫治痙之法當分虛實而究其所因其因血虛發痙妄治發痙者亟用清和濡潤以柔化剛之法其虛甚者金寒水冷氣結津枯清潤又非所宜必得溫潤甘潤如蓯蓉枸杞熟地阿膠玉竹鹿膠菟絲子之類方為中窾以清潤猶稟清秋涼寒之氣甘潤溫潤乃得春和煦育之機虛燥治法大率類此嗟乎虛實殊途生死反掌學者所當辨於其微辨於其早也已論張仲景傷寒論漢張太守仲景著傷寒一書立一百一十三方三百九十七法隨病之變遷用之千變萬化靈妙無窮萬病皆當仿之為法不可僅作傷寒書讀也乃後之注是書者五十餘家移前易後互相訾議迄無定論愚按是書當分兩大段看法其前一段為表寒而作寒為天地燥結之氣燥故化火也速寒氣從外收斂搏束氣機津液不行故停濕者多後一段為裡寒而作裡寒或由外直中於內或虛則寒自內生總不外脾腎陽虛陽虛則不獨不能禦寒而且脾陽虛則不能散精腎陽虛則不能行水不能散精行水故化濕者多化火者少其法雖分六經亦不外三焦言六經者明邪所從入之門經行之徑病之所由起所由傳也不外三焦者以有形之痰涎水飲渣滓為邪所搏結病之所由成也觀其論中曰胸中曰心中曰心下曰胸脅下曰胃中曰腹中曰少腹雖未明言三焦較言三焦者更細也人身一小天地膈膜以上天氣主之肺與心也膈膜以下地氣主之脾胃二腸膀胱三焦腎也界乎天地之間者為膈膜膈膜乃肝膽部位如地之有樹木者然行乎肌肉之裡筋骨之外以運行血脈者為經絡如地之有脈絡溝渠以通天氣者然從膈下而上上至胸旁至脅皆清氣與津液往來之所其病不外痰涎水飲為邪所擊搏與氣相結由胃中脘及腹中下抵少腹乃有渣滓穢濁之物邪氣得以依附之而成下證一為清陽一為濁陰人身所以為一小天地也觀仲景先師所立方法確就邪傷人身之天地者治之六經固不爽毫釐三焦亦不逾分寸千古醫聖之稱舍仲景其誰與歸以太陽論太陽經脈行背背者胸中之府胸中為肺之外廓肺主皮毛凡邪從太陽入者必自毛竅始且六經之氣皆天氣所運行未有經氣鬱而天氣不郁者故傷寒論云太陽病頭痛發熱身痛腰痛骨節痛惡風無汗而喘又曰喘而胸滿劇者必衄衄乃解夫頭痛以下皆太陽見證喘而胸滿乃邪阻肺氣不舒也衄者寒燥化熱熱甚動血由肺之清道出也衄解與汗解同故曰衄乃解經言太陽固明明兼言肺矣且邪由皮毛而肌肉由肌肉而經脈一層收近一層是橫入邪由外橫入藥由內橫托故用輕虛之麻黃湯由肺化汗外達皮毛以出肺之空竅即以出太陽之門戶經云輕可去實又云薄則發泄厚則發熱麻黃體極空虛氣味俱薄輕薄上浮空虛外達太陽藥即肺藥也故用以為君即以為使桂枝辛溫微潤主溫肌肉枝亦橫達故以為臣杏仁質潤微辛微苦苦重於辛開而能降且仁含生意又能入心化汗炙甘草微潤而甘能緩藥性於上故以為佐方雖四味神妙無窮奈後世舍而不用偏用羌獨荊薄辛燥濁烈之品不知厚則發熱服之徒增煩躁且麻黃主開是橫力羌獨等主升是豎力肺主天氣天氣宜開宜降而不宜升故羌獨等味自神農本經已有之但非為治傷寒溫病設也仲景所以不一用之若發汗汗不出而煩躁者此邪鬱熱生內灼肺津也用大青龍湯辛涼潤以解之麻黃湯加石膏薑棗麻黃生薑石膏並用神妙已極湯名青龍者以龍為水族行津發汗之義也其有表邪未解搏束在裡之濕熱走於肌膚髮黃者麻黃連翹赤小豆生梓皮湯辛涼燥以解之其有發汗後汗出而喘或飲水多而喘此表邪雖解未盡肺中尚有留邪與水邪相搏故取麻杏甘膏湯辛涼解表表解則水邪自從汗而出若停水之重者發熱表不解心下有水氣乾嘔而咳而喘或噎或渴或不渴或大便利或小便不利一派皆停水見證主小青龍湯麻桂開表芍草護營尤妙在細辛之辛潤行水半夏之辛滑降逆乾薑五味子並用溫肺陽而固肺陰無微不到真神劑也方下對證加減亦毫釐不爽微利者去麻黃加芫花渴者去半夏加栝蔞根小便不利少腹滿去麻黃加茯苓喘者去麻黃加杏仁誤飲冷水令汗大出寒水相搏其人噎者去麻黃加附子蓋汗為水類肺為水源汗不解則邪搏肺氣不能通調水道下輸膀胱以致水停肺胃之間若不開表而徒利水無以解其搏束若一味開表而不用辛以行水又無以祛其水邪此方升中有降開中有闔真如神龍變化不測後人何曾夢得論曰病如桂枝證頭不痛頸不強寸脈浮微或脈乍緊或手足厥冷胸中痞硬氣上衝咽不得息者此胸中有寒也當吐之藥後探吐宜瓜蒂散夫所謂寒者即寒飲也觀神農本草瓜蒂赤小豆吐下胸腹中水邪可知更有汗吐下後正氣不運痰涎結氣留於心胸之間擾動清陽虛煩不寐劇者反復顛倒心中懊憹梔子豉湯吐之藥後探吐梔子輕虛上浮微苦泄熱豆豉本蒸曬醞釀而成故能宣發蘊蓄之痰涎結氣若心中懊憹飢不能食但頭汗出陽邪在上欲泄不得或煩熱汗出胸中窒者胸滿而喘者心中結痛者則皆主以梔豉宣化而不用探吐之法以汗出故也他如嘔者梔豉生薑湯虛者梔子甘草湯誤下微煩者梔子乾薑湯濕熱發黃者梔子柏皮湯下後心煩腹滿臥起不安者梔子厚朴枳實湯食復者枳實梔豉湯有宿食者加大黃如博棋大一塊此二湯治心中並治腹中觀麻杏甘膏以下諸湯皆兼治胸中心中水飲痰涎結氣者也所謂六經不外三焦者如此所謂寒燥搏濕者如此而未已也更有六七日發熱不解而煩渴欲飲水水入則吐名曰水逆此表邪未解里又停水其人無惡寒見證與小青龍證有別但發熱不解又不可不兼治主以五苓散桂枝白朮茯苓豬苓澤瀉多飲暖水汗出愈蓋取方中桂枝化膀胱之氣又能解肌一藥而兩用之者也他如發汗後水停胸中不下煩渴小便不利或因誤下而痞口燥煩渴小便不利或病本應汗而反以冷水浴之致水氣結於皮膚肌肉之間肉上粟起意欲飲水意欲二字宜玩是欲飲而又不飲之意而反不渴皆與五苓散導胸中水邪從小便解若陽明發熱渴欲飲水用豬苓湯是不取五苓散中之桂枝解表化氣而取豬苓湯中之阿膠滑石潤燥清熱矣豬苓茯苓澤瀉滑石阿膠若少陰下利咳而嘔心煩不得眠停水見證用文蛤散引心下濕熱從小便出以文蛤燥濕清熱又能滋陰一舉而三善備焉又有汗出不渴者水邪外溢也厥而心下悸者水邪凌心也皆主以茯苓甘草湯鎮水邪下降不爾汗多則亡陽水由心下入胃則作利也凡此皆治膀胱腑邪者也夫膀胱為至下之腑而見證多在心肺之間者以金為水源金鬱則不輸水水上逆則剋火故見證如此所謂寒燥搏濕病見膈上者又如此若太陽中風中即傷也又自有說夫太陽中風為寒中之風由毛竅僅襲肌肉雖由太陽穴道太陰毛竅門戶而來而未入於經脈之中見證鼻鳴乾嘔肺氣雖亦被傷而未甚遏郁所以脈來陽浮寸陰弱尺陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風惡風未有不惡寒者但惡寒甚輕非若傷寒及陰經之甚也翕翕發熱翕翕鳥羽掀張之貌狀其在外之熱勢非若陽明蒸蒸發熱之由里出也此衛分有邪不能衛外又不能護營營氣不共衛氣和諧之象衛行脈外主溫肌肉肥腠理腠謂津液滲泄之所理謂文理會逢之所所以主桂枝湯取桂枝甘草生薑溫衛芍藥甘草大棗護營營衛兩和病自可已服後須臾啜熱稀粥以助藥力溫覆取漐漐微似有汗者佳不可令如水淋漓病必不除以汗多動營汗從營出衛邪仍在故也凡解肌法皆當如此與傷寒發汗不同與溫病由里達表亦不同若發汗太過遂漏不止其人惡風小便難四肢微急難以屈伸津液少之故此衛分表邪未盡而又有津脫陽虛之象主桂枝加附子湯疏衛護營回陽止汗若燒針令其汗針處被寒核起而赤者必發奔豚氣從小腹上衝如豚奔者然宜灸其核上各一壯與桂枝加桂湯取桂枝多則味重下達不獨禦寒且能為膀胱化氣也若下後脈促胸滿中虛而表邪仍在者主桂枝去芍藥湯下後陽虛微惡寒者主桂枝去芍藥加附子湯下後微喘及未經下而自喘者皆表未解故也宜解表兼消痰降逆主桂枝加厚朴杏仁湯其有陽脈澀陰脈弦者當腹中急痛此太陰土虛肝木來乘故也先與小建中湯即桂枝湯加飴糖取大甘以和中土治太陰不差者即轉而治少陽與小柴胡湯疏土中之木若發汗後身疼痛脈沉遲表未盡而里已虛者主桂枝加芍藥生薑人參湯發汗過多其人叉手自冒心心下悸欲得按者汗為心液多則心氣虛主桂枝甘草湯若其人惡寒振振欲劈地者則陽虛已極不能制水又非用真武湯不克發汗後臍下悸者欲作奔豚主茯苓桂枝甘草大棗湯化膀胱之氣以鎮水邪太陽病八九日過經不解發熱惡寒一日二三度發如瘧狀但其人不嘔非少陽證清便自調無裡熱證此餘邪未盡主桂麻各半湯輕劑解之若脈微而惡寒者此陰陽俱虛不可更用汗吐下法其有面有熱色身癢者此微邪在皮膚中欲自出不得亦主以此湯取其小汗若身癢如蟲行皮中狀者此久虛也又不可用汗後形如瘧日再發微邪未盡者當汗出愈主桂枝二麻黃一湯微解之發熱惡寒熱多寒少者主桂枝二越婢一湯辛涼解之越婢湯麻黃石膏甘草生薑大棗服桂枝湯後仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者此停飲也主桂枝去桂加苓朮湯傷寒脈浮宜以汗解醫誤用火迫汗遂致亡陽驚狂起臥不安者此火迫其胸中之陽與少陰汗出之亡陰迥別故不用四逆回陽而用安神鎮攝主桂枝去芍藥加蜀漆龍骨牡蠣救逆湯鎮驚徹痰又有誤用火灸致邪無出路火氣上逆陰氣獨治於下腰以下重而痹者此名火逆主桂枝甘草龍牡湯和陰鎮逆此證心無痰閉故不用蜀漆本太陽證醫反下之引邪入太陰腹滿時痛主桂枝加芍藥湯以斂太陰之邪若大實痛者乃邪氣結於太陰主桂枝加大黃湯導邪出陽明之腑凡此皆衛分肌腠之邪因誤汗誤下誤火致生諸變表邪猶未盡去故皆從桂枝湯隨證加減以救其誤非依經正治之方也其有衛分肌腠之邪雖未入太陽經脈之中而已逼近經脈之側見證惡寒汗出又多項背強𠘧𠘧伸頸之貌因強所致一條汗出則邪未入經脈不得用麻黃而項背𠘧𠘧邪近經脈又非桂枝所能達主桂枝加葛根湯取葛根辛甘微潤氣味俱薄鼓舞胃氣上行隨桂枝外達若無汗者及陽明病目痛鼻乾不得眠者或太陽陽明合病自下利者主葛根湯即桂枝湯加葛根麻黃不下利而嘔者葛根加半夏湯夫葛根湯中雖有麻黃其意恰重在葛根取其升胃中清陽以止利辛甘涼潤以清熱若太陽傷風證醫反下之利遂不止脈促喘而汗出此表邪未解熱又陷里主葛根黃芩黃連湯方中有甘草取辛涼解表升清苦寒入腸燥濕泄熱堅陰此表裡兼治法也按桂枝葛根二湯一和營衛一治陽明不盡關乎肺矣然治陽明亦有重在肺者如論中雲服桂枝湯大汗出大煩渴脈洪大此表裡俱熱裡熱傷津未與宿滯相搏故未見中焦下證主白虎湯石膏知母甘草粳米虛者白虎加人參湯若傷寒解後餘熱未清虛羸少氣氣逆欲吐者竹葉石膏湯即人參白虎湯去知母加竹葉半夏麥冬夫白虎西方金也汗多液耗陽明火熾肺金被焚必得虎嘯風生亢熱乃解此肺胃子母同治又重在清燥救肺俾天氣清肅下降乃愈界乎人身天地之間者則有膈膜膈下脅肋肝膽布焉膽屬少陽陽明不治則必傳少陽傳少陽則病胸脅胸脅為清陽之道路津液升降之所邪熱傳此必有痰涎水飲與清氣搏結故見證甚多治法不一論曰傷寒往來寒熱寒已而熱熱已而寒不似太陽之寒時亦熱熱時亦寒也胸脅苦滿默默不欲飲食木邪乾土心煩喜嘔木氣上逆或胸中煩而不嘔或渴少陽熱邪或不渴或小便不利有痰涎蓄飲或咳肺有留飲或心下悸痰飲或脅下痞硬水飲與氣相結或腹中痛木鬱剋土身有微熱太陽邪未盡主小柴胡湯柴胡稟仲春之氣得微辛之味氣味俱薄功專升達少陽胸脅寒熱結氣並能疏腸中邪氣故用以為君臣以半夏黃芩之降生薑之辛苦降辛通與濕熱痰熱最宜其參草大棗因表裡無邪用作佐鋪截邪入里之路若表裡稍有邪者人參即不宜用觀加減法便知論曰胸中煩者去人參加栝蔞實不嘔者去半夏渴者去半夏加花粉人參腹中痛者去黃芩加芍藥脅下痞硬去大棗加牡蠣心下悸小便不利去黃芩加茯苓不渴表有微熱去人參加桂枝溫覆取微似汗愈咳者去人參生薑加乾薑五味他如婦人經水適斷熱入血室寒熱發作有時如瘧狀者亦主小柴胡湯又有經水適來表邪內陷熱入血室脈遲身涼胸脅下滿如結胸狀譫語者當刺期門隨其實而瀉之期門在乳頭直下第二肋端以同身寸法驗之去乳頭約四寸此厥陰陰維之會其最重者晝則明瞭暮則譫語如見鬼狀法當無犯胃氣及中上二焦不可汗不可下必自愈又有太陽少陽合病發熱微惡寒支節煩疼以上太陽證微嘔心下支結以下少陽證主柴胡桂枝湯小柴胡與桂枝湯併為一方和而達之又有少陽與陽明腑合病熱結在裡復往來寒熱者或發熱汗出不解心下痞硬嘔吐復下利者均主大柴胡湯表裡兩解之即小柴胡去人參加芍藥枳實大黃若胸脅滿而嘔少陽證日晡潮熱胃腑邪實已而微利未大結實小柴胡湯加芒硝湯軟蕩之又有下後邪陷胸心兼及胃腑阻郁清陽膀胱濕鬱不化以致胸滿少陽煩驚心譫語胃小便不利一身盡重不能轉側膀胱蓄濕柴胡加龍骨牡蠣湯主之小柴胡去甘草加龍牡鉛丹大黃桂枝茯苓又有誤汗誤下表邪內陷胸脅阻遏清陽陽氣上越里有寒熱以致寒熱往來胸脅滿微結心下煩皆少陽證小便不利渴而不嘔但頭汗出陽氣上越柴桂乾薑湯主之柴胡桂枝乾薑黃芩牡蠣花粉甘草二者見證錯雜故藥亦錯雜真神妙無方劑也凡此皆治胸脅心中少陽分野者也若夫心下見證又有不同者論曰病發於陽發熱惡寒而反下之熱入因作結胸病發於陰無熱惡寒而反下之熱入因作痞氣所以成者以下之太早故也夫結胸有熱結有寒結總不外痰涎蓄水搏束清陽之氣結於心胃之間心下胃上病屬有形故痛而硬痞氣寒熱虛實夾雜為病又有濕熱痰涎阻遏清陽之氣留於心胃之間病屬有形而無形故但滿而不痛結胸非攻其蓄水不可痞氣非苦辛寒熱並用消補兼施不可此大小陷胸瀉心諸湯之所由立也然結胸痞氣諸劑必表邪已解乃可用之若心下痞而惡寒者表未解也不可攻裡先用桂枝湯解表表解再行治里或用五苓散兩解表裡亦可試詳言之其濕熱痰涎小結胸者正在心下按之則痛脈浮滑小陷胸湯主之黃連半夏栝蔞實其蓄水結胸者頭痛清陽被阻心下痞硬滿引脅下痛乾嘔短氣下利皆蓄水見證汗出不惡寒者此表解里未和也十棗湯主之芫花甘遂大戟為末共一錢匕約今稱三分以十棗煎湯和服得快下利其蓄水與實熱互結胸者脈沉而緊心下痛按之石硬甚者舌燥而渴胸有蓄飲熱不得泄故燥而渴前五苓散治燥渴亦與此同意日晡小有潮熱胃腑有邪從心上至少腹硬滿痛不可近雖上下皆痛而根由心上而起又有結胸無大熱者此水結在胸脅也但頭汗出者此熱為水鬱不得發泄若小便不利水無出路身必發黃故並以大陷胸湯主之甘遂末一錢匕大黃芒硝煎湯和服又有結胸項亦強如柔痙狀下之則和主大陷胸丸緩下之大黃芒硝葶藶子杏仁和如彈丸一枚甘遂末一錢匕白蜜二合煎服一宿乃下不下再服取下為效用丸緩下取其不傷津液又寒水實結胸無熱證者與三物白散桔梗貝母巴霜為末服半錢匕羸者減之病在膈上者必吐在膈下者必利不利進熱粥一杯利不止進冷粥一杯巴豆之性得熱則行得冷則止若夫痞氣有因誤下而成者有因汗後邪未盡而成者蓋汗為水類邪汗未盡水濕與熱停於膈下亦能作痞其痞有水邪較重者汗解後心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利生薑瀉心湯主之取辛以行水之意生薑半夏黃芩黃連乾薑人參甘草大棗有胃虛較重者誤下其人下利日數十行完穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不安醫復誤下之其痞益甚此胃中虛客氣挾痰熱上逆故使硬也甘草瀉心湯主之取甘以補虛緩逆之意甘草黃芩半夏乾薑黃連大棗又有嘔而發熱柴胡湯證醫反下之柴胡證仍在者仍與柴胡湯必蒸蒸振卻發熱汗出而解即今所謂戰汗是也邪正相爭而出虛人多有之若無柴胡證但心滿而不痛者此為痞半夏瀉心湯主之取辛以燥濕之意半夏黃芩黃連乾薑人參甘草大棗又有脈浮而緊邪在表也醫誤下之緊反入里沉緊則作痞熱結氣分內無水邪故痞而按之自濡大黃黃連瀉心湯主之取苦以瀉熱之意妙在麻沸湯滾湯泡汁欲其輕揚清淡以滌上焦之邪熱又有心下痞復惡寒汗出者此陽虛也附子瀉心湯主之取溫陽止汗之意妙在濃煎附子輕泡大黃黃芩黃連蓋扶陽欲其熱而性重開痞欲其生而性輕也凡此皆治心下見證者也他如胸中有熱胃中有邪氣表邪陷入腹痛欲嘔與黃連湯即半夏瀉心湯去黃芩加桂枝達邪出外太陽與少陽合病自下利者與黃芩湯黃芩芍藥甘草大棗嘔者黃芩加半夏生薑湯誤下寒格吐下食入即吐與乾薑黃連黃芩人參湯此三者皆寒熱濕熱虛實夾雜為病與瀉心同一方法又有發汗後邪氣已去腹中脹滿濕氣與厚朴生薑甘草半夏人參湯泄濕補虛此又虛邪入腹中治法也若夫膈膜以下病及地氣不外胃中腹中少腹三者而已夫胃為中土藏垢納汙萬物皆歸焉故邪入胃腑即不能外達必從下解或邪熱與胃腸渣滓搏結或邪熱與膀胱血結或邪熱夾濕鬱極走於肌肉致身發黃匪直此也陽明腑實必病及三陰胃脾相為表裡太陰脾脈布胃中絡於嗌故腹滿而咽乾當臍屬少陰少陰腎脈絡於肺系舌本故口燥舌乾而渴少腹屬厥陰厥陰肝脈絡於肝循陰器故煩滿囊縮三陰屬臟五臟藏而不瀉其可瀉者惟胃腸而已此承氣諸湯所由立也承氣云者謂承天氣以平地氣者也亦有邪由陽明經經字宜著眼傳太陰經由太陰而少陰而厥陰成可溫之證者此寒濕重者也詳見裡寒條下茲不具論端以陽明腑實必審其確實證見如腑實則日晡未申時陽明主令必有潮熱或如瘧狀其熱未潮者里未結也其發熱微惡寒者表未解也皆不可與承氣即腹大滿不通僅可與小承氣厚朴枳實大黃微和胃氣勿令大下若日晡潮熱或手足濈然汗出四肢為諸陽之本汗出則陽氣已盛於土中以此為驗大便硬一法多汗則津液外泄胃中必燥燥則大便必硬腸有燥矢則必譫語或獨語如見鬼狀或腹滿痛或繞臍痛或心以下按之硬或煩躁發作有時或時有微熱喘冒不能臥或目中不了了睛不和里邪結實陽氣不能外達往往微似惡寒甚而厥逆熱深厥亦深舌苔必板厚缺津或黃或黑皆宜大承氣湯速下之大黃芒硝厚朴枳實大黃用酒洗先煨以緩其性芒硝後下欲其先軟化而後行也若劇者發則不識人循衣摸席惕而不安微喘直視此皆陽明危證脈弦者生澀者死弦則以其尚能制土若澀則氣血已枯矣亦有邪結脈澀氣血尚未盡枯者又有陽明少陽合病者必下利其脈不負者順也負者失也洪緩是陽明脈為不負弦緊是少陽脈為負負木剋土也脈滑而數者有宿食也遲而滑者內實也宜大承氣湯寸口脈浮而大按之反澀尺中亦微而澀邪結不通有宿食也宜大承氣湯少陰病得之二三日口燥舌乾者少陰證急下之少陰病自利清水色純青肝邪傳腎心下必痛口乾燥者急下之宜大承氣湯又有發汗後不惡寒但蒸蒸發熱者當和胃氣與調胃承氣湯大黃芒硝甘草調胃全在甘草恐傷中焦故不用朴實太陽病未解未出汗脈陰陽俱停先振栗汗出乃解但陽脈微者先汗出乃解但陰脈微者下之乃解宜調胃承氣湯其有脾約者精液不足脾氣約束大便必難宜麻仁丸即小承氣加麻仁杏仁白芍潤脾泄肝緩化行之其有直腸津液內竭欲行不行者宜蜜煎導法豬膽汁導法膽汁導法尤效又有太陽病不解經邪不解勢必傳腑熱結膀胱以致蓄血其人如狂熱甚血凝上干心包血自下下者愈亦有血下而脫者不可不知其少腹急結者宜桃仁承氣湯桃仁大黃芒硝甘草桂枝重者少腹硬滿其人喜忘血凝則心氣結甚則發狂小便自利蓄血在血分不在氣分矢雖硬大便反利血性滑利其色必黑內有瘀血或漱水不欲咽皆蓄血見證抵當湯下之水蛭虻蟲熬一次大黃桃仁若脈數不解而下不止必協熱而便膿血又別有治法其有熱而少腹滿者應小便不利今反利者為有血也當下之宜抵當丸即以湯藥作丸此見證較輕故用丸以緩下其血若脈沉結少腹滿身黃小便不利不利知為濕熱此非血結但濕熱不行耳茵陳湯下之茵陳梔子大黃陽明病發熱汗出者此為熱越不能發黃若但頭汗出齊頸而還小便不利渴欲飲水此為瘀熱濕與熱合在裡身必發黃茵陳湯主之熱利下重後重者白頭翁湯主之白頭翁黃連黃柏秦皮大病瘥後腰以下有水氣者牡蠣澤瀉散主之牡蠣澤瀉葶藶子蜀漆花粉商陸海藻凡此皆治地氣為病者也所謂六經不外三焦者此也試再言經邪少陰病得之二三日以上按循經傳一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰六經傳遍七日從太陽病漸次而減今云二三日以上當指五日以上之二三日言心中煩不得臥黃連阿膠湯主之黃連阿膠黃芩芍藥雞子黃此少陰傳經之熱邪有熱無結故用降火養陰法少陰病二三日咽痛者與甘草湯不瘥與甘桔湯此少陰虛熱上爍故用甘緩辛開苦降法少陰病咽傷生瘡不能言語聲不出者主苦酒湯半夏雞子白苦酒納雞子殼中置刀環安火上令三沸少少含咽之斂火降逆少陰病下利咽痛胸滿而煩者主豬膚湯白蜜米粉豬膚湯和服此陰虛化燥故用甘鹹潤納之法又有病後脈結代心動悸者主炙甘草湯炙甘草乾地黃麥冬麻仁阿膠生薑人參桂枝大棗此邪已去盡氣血兩虧經脈失養燥結不通故以甘涼潤養為主尤妙在大甘緩之於上佐辛潤通其脈絡所以治脈結代心悸有殊功又有汗吐下後病已向愈而心胃之間尚有留邪結氣以致心下痞硬噫氣不除旋覆代赭湯主之旋覆花人參生薑炙甘草半夏代赭石大棗此散結補虛法也又有少陰病始得之反發熱脈沉者麻黃附子細辛湯主之無里證者麻黃附子甘草湯主之此兩感傷寒一曰太陽與少陰並病夫太陽少陰相表裡而位最近猶可引之外達從汗而解故溫陽而兼達表又有少陰病四逆四逆散主之甘草枳實芍藥柴胡咳加五味乾薑悸加桂枝小便不利加茯苓腹痛加附子泄利下重加薤白此少陰傳經之邪非直中之邪並無脈微惡寒等陰證即下利一端並非清穀而反下重故用疏邪散結而不用溫陽若大汗大下後陽氣大虛則當以扶陽為急務論曰傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯攻其表此誤也得之便厥咽中干煩躁此是陰煩吐逆者與甘草乾薑湯以復其陽若厥愈足溫者更與芍藥甘草湯以和其陰其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之甘草乾薑附子此陰陽兩虛之後又復竭其陽非此湯不能挽回陽氣然必實有陽虛見證方可用傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯大汗出熱不去內拘急四肢疼以上皆外證又下利清穀厥逆惡寒者三者皆虛寒內證四逆湯主之急當救里大汗大下利而厥冷者四逆湯主之吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之雖有表證急當救里既吐且利小便復利二便俱利內陽將盡大汗出下利清穀內寒外熱雖有外熱表證而里證重極脈微欲絶四逆湯主之下後復發汗晝日煩躁不得眠夜來安靜陽虛有二證陰陽兩虛者畏陽陰不虛者喜陽不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之發汗復下之病仍不解煩躁者此陽氣不攝而煩所謂陰煩也然必參以他證方不致誤茯苓四逆湯主之茯苓人參附子甘草乾薑太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之此發汗太過水邪隨陽氣上逆比茯苓四逆湯證較重彼因汗下兩傷故用人參乾薑此因汗傷水逆故用真武鎮伏水邪挽回陽氣真武屬北方水神故取以為名茯苓芍藥生薑白朮附子若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊者茯苓桂枝白朮甘草湯主之此亦陽虛水逆之證即真武證之輕者若再發汗則動經氣而身為振振搖矣發汗病不解反惡寒者虛故也芍藥甘草附子湯主之太陽病外證未除而數下之遂協熱下利利下不止心下痞硬邪在上焦表裡不解桂枝人參湯主之桂枝甘草白朮人參乾薑傷寒下利不止心下痞硬服瀉心已復以他藥下之一誤再誤利不止醫以理中與之利益甚理中者理中焦也此利在下焦下藥太過大腸受傷赤石脂禹餘糧湯主之澀以止脫復利不止當利其小便分其清濁則便自堅凡此皆誤汗誤下傷及真陽故轉而用溫以救其誤非表寒化熱之正方也若夫裡寒一證不外脾腎陽虛陽虛則化濕故夾濕者多治法不外四逆真武理中三法四逆一類不離薑附再觀方中加減皆欲其通陽開閉重在腎也真武一類不離苓附生薑欲其溫陽鎮水亦重在腎也理中一類不離乾薑白朮欲其守中重在脾也其桂枝附子一類為風濕陽虛而設欲其解肌溫陽化濕表裡兼治重在裡此治裡寒之大較也試詳言之論曰發熱頭痛表邪脈反沉里脈若不瘥身體疼痛當急救里宜四逆湯甘草乾薑附子身體疼痛表寒裡寒陰陽二證皆有之雖沉為里脈而表邪郁遏者亦有之必審其人不煩不渴脈沉而至數清楚一派皆屬陰象乃可用之切勿孟浪脈浮而遲表熱裡寒下利清穀者四逆湯主之自利不渴屬太陰臟有寒也當溫之宜四逆輩凡溫熱之劑皆可選用故不曰湯而曰輩少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實寒實不可下也當吐之在上者因而越之若膈上有寒飲乾嘔者乾嘔無物知其為飲不可吐也當溫之寒散則飲化凡治飲皆當用溫宜四逆湯惡寒脈微而復利利止亡血也利盡而止津液內竭亡血即亡陰也四逆加人參湯主之回陽生津少陰病下利清穀裡寒外熱寒逼陽於外手足厥逆脈微欲絶身反不惡寒寒邪入里其人面色赤逼陽於外名曰戴陽或腹痛或乾嘔或咽痛寒逼陽上升或利止脈不出者通脈四逆湯主之其脈即出者愈四逆湯面赤加蔥腹痛去蔥加芍藥嘔加生薑咽痛去芍藥加桔梗利止脈不出去桔梗加人參諸證或陰或陽皆閉塞不通之故故用辛溫通陽下利清穀裡寒外熱汗出而厥者通脈四逆湯主之厥而汗出陽有立亡之象吐已下斷利止也汗出而厥四肢拘急不解脈微欲絶者四逆加豬膽汁湯主之取其苦滑直達下焦少陰病下利白通湯主之乾薑附子湯加蔥白四莖取其通少陰之陽氣少陰下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁童便湯主之取童便引陽藥直達至陰經所云反佐是也手足厥寒脈細欲絶者當歸四逆湯主之當歸桂枝芍藥細辛甘草通草大棗若其人內有久寒者當歸四逆加吳萸生薑湯主之所謂四逆一類重在通陽開閉者此也試再言真武少陰病腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳加五味乾薑細辛或小便利去茯苓或下利去芍藥加乾薑或嘔者去附子加乾薑真武湯主之少陰病身體疼手足寒骨節痛脈沉者附子湯主之真武湯去生薑加人參所謂真武一類重在溫陽行水水即是濕者此也至理中丸一方人參甘草白朮乾薑臍上築築欲作奔豚者腎氣動也去白朮加桂枝吐者去白朮加生薑悸者加茯苓渴欲飲水者加朮消飲生津腹中虛痛加人參寒加乾薑腹滿者去朮加附子乃大病瘥後喜唾胃液不藏兼有寒飲久不了了胃上有寒當以丸藥緩理之若桂枝附子一類乃解肌化濕溫陽表裡兼治之劑論曰傷寒八九日風濕相搏身體疼煩不能自轉側濕則身重不嘔不渴濕為陰邪脈浮虛而澀表裡皆虛桂枝附子湯主之桂枝附子甘草生薑大棗若其人大便硬小便自利者去桂加白朮湯主之白朮生腸胃之津液若大便不硬小便不利仍當加桂觀此條可知桂枝能通小便故五苓散用之服後其人如冒狀勿怪此以附術並走皮肉逐水氣未得除故使之其法當加桂以治之又有風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之得微汗則解即桂枝附子湯去薑棗加白朮此條因汗出故去薑棗雖用桂枝而其意則重在甘草附子溫陽故以名湯風濕發汗汗大出者但風氣去濕氣在故不愈治風濕微微似欲出汗者風濕俱去也此治風濕之大法也他如食谷欲嘔者必食谷而始嘔受病在納穀之處與乾嘔不同屬陽明也虛寒吳茱萸湯主之吳萸人參生薑大棗得湯反劇者屬上焦也停飲又有少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之胃氣虛寒乾嘔吐涎沫胃中寒飲頭痛者陽明之脈上於頭吳茱萸湯主之又有少陰病腹痛小便不利下利不止便膿血者桃花湯主之赤石脂乾薑粳米一服愈余勿服又有傷寒脈微而厥至七八日膚冷陽不衛外其人躁無暫安時者此為臟厥不治非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入其膈其人當自吐蛔蛔厥者烏梅丸主之又主久痢烏梅細辛乾薑當歸附子蜀椒桂枝黃連黃柏人參先食後服十丸漸加至二十丸禁食生冷滑臭等物凡此皆治裡寒者也余故曰傷寒論當分兩大段看法又有表寒壞證如傷寒六七日大下後寸脈沉遲尺脈不至手足厥逆咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之汗出愈麻黃升麻當歸桂枝白芍茯苓甘草乾薑白朮石膏知母黃芩玉竹天冬此上熱下寒互傷之證病證之雜藥味之多為古方所僅見觀此可悟古人用藥之法又有表寒方愈因交接感其餘熱名陰陽易病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒禈散主之男取婦禈襠婦取男禈襠燒灰和服方寸匕三服小便即利陰頭微腫則愈蓋引其邪火從陰處出也此又以意用藥法也觀傷寒一書立方錯綜變化皆本自內經用藥又與神農本草所載一一吻合余止言其大略學者於全書講求而推廣之則操縱在我萬病皆得所指歸矣豈徒作傷寒書讀哉按傷寒論中表寒一類本是寒燥之邪所立諸方只此麻黃桂枝葛根柴胡四味藥係為經邪而設其餘皆從三焦論治與溫病原不相悖觀諸方便知麻黃專主開表溫病忌用若嚴寒天氣實因感受風寒新邪引動伏邪如吳又可所云感冒兼役之證麻杏石甘湯亦不妨暫用其桂枝一味為溫病所最忌以其溫里故也書云桂枝入口陽盛熱盛則斃承氣入胃陰盛寒盛則亡嘗見誤服桂枝變證蜂起不可不知葛根辛甘涼潤為陽明藥柴胡主治邪郁胸脅溫病亦有陽明及胸脅證故間有用之者總之有是病則用是藥不可拘執至救誤諸方如四逆真武理中輩乃為傷寒誤汗誤下傷陽而設皆與溫病相反傷寒多傷陽故末路以扶陽為急務溫病多傷陰故末路以養陰為要法此又寒溫判若霄壤者也故並記之女科論經曰女子二七天癸至任脈通太衝脈盛月事以時下月為天之真水故潮汐長落上應月之盈虧而有常期者也女子屬陰血為水類故亦上應月之盈虧而有常期者也愆期則病生焉故古人謂女子首重調經夫首重調經是也但欲調其所不調必推其所以不調之源從而調之而經始調奈方書調經諸方多是行氣破血之品不知人身氣血只有不足斷無有餘其見為有餘者皆不足所致皆不足而邪湊之所致豈有重傷氣血而能調經之理又謂女子多郁必兼開鬱夫郁者不暢之謂必用微辛微潤諸品得春和之氣寓生髮之機乃能暢達氣機又豈有用辛燥乾澀之藥而能流暢遏郁之理詩云陟彼阿邱言採其虻虻貝母也朱子謂其能解鬱結之疾試觀貝母微辛微苦微潤微涼得土金之氣稟清肅之令微辛微潤則能通微苦微涼則能降而且色白形圓象類心肺所以主解鬱結之疾後人謂其清熱化痰者皆散結之功也一隅三反可類推矣又有先期為熱後期為寒之說亦不盡然余謂欲診其人之病須先辨其人之氣質陰陽金水之質其人肥白多屬氣虛再驗之色脈如面色唇舌慘淡脈息柔濡此氣虛見證氣虛則脾胃不能健運食少化遲化源即薄衝任自衰或氣不攝血為先期為崩漏或氣不化血為血少為後期色必淡紅無脹無痛陽虛化濕必多黃水白帶法宜歸脾一類以補氣血生化之源若久則氣不化血血虛化燥又成氣血雙虧之候木火之質其人蒼瘦多屬血虛再驗之色脈如面色唇舌多紅多燥脈息細澀或弦或數此血虛見證血虛則肝陰不濡肝陽內熾或血熱妄行為先期為崩漏或血虛留滯為後期為脹痛法宜滋燥養營為主其因虛留滯者佐咸柔以軟之辛潤以通之自可獲效久則陰虛燥急經枯月閉延為肝風眩暈多怒多煩脅肋作痛甚則咳嗽吐血咽痛骨蒸為乾血成勞之候又有氣血不足燥濕之邪乘虛湊入此類釀患尤屬多多夫氣為水母凡飲入於胃賴脾肺氣機吸攝水精四布五經並行氣虛者默運無權津液不歸正化變為帶濁暗損真元血虛者濕熱混入營分每成痛經平日時行黃水黏濁而熱黏著皮膚則癢臨期腹痛由肩背下抵腰足無不痠痛四肢乏力皮里發熱血色紫黑晦暗濕熱瘀濁下行如爛魚腸樣腥穢異常行後又多黃水若濕熱瘀濁不下則腹痛更甚法宜於養血劑中佐辛潤以通之參苦辛以化之苦多辛多尤必因其人之熱重濕重用之乃可獲效若久久不治則濕熱瘀濁凝聚成塊其初聚而未結營氣尚往來於其間以故推揉有聲按之覺痛古謂氣聚為瘕聚散不定即此類也巢氏不察其原徒立八瘕名目黃瘕青瘕脂瘕狐瘕蛇瘕鱉瘕燥瘕血瘕最足誤事其曰青瘕黃瘕下青黃濁汁脂瘕精血雜下如脂膏濕熱下行有明證也即用前法再加咸軟如龜板鱉甲決明牡蠣之類既能燥濕清熱軟堅又能養陰斷無不效之理嘗見痛經之證久之血虛化燥腸胃之外經絡之間結成硬塊營氣不得往來於其間以故堅固不移按之不痛古謂血結為症推移不動即此類也法當滋燥養營或用清潤或用溫潤亦視其人之寒熱施之仍須參以辛潤咸軟自可漸化又有腸覃一證經謂寒氣客於腸外與衛氣搏癖而內著瘜肉乃生大如雞卵漸如懷子按之則堅推之則移月事以時下此腸外脂膜受病未入脈中者也又有石瘕一證生於胞中即子宮經謂寒客子門子門閉塞惡血當瀉不瀉衃以留止日益大狀如孕堅如石月事不下此血凝子宮病也又有痃癖一證方書謂僻於肋下謂之癖隱於臍傍狀類硬弦謂之痃勞碌感寒則發與痛俱見不痛則隱此厥陰陽明經脈結聚也此三者治以溫潤佐以辛潤蓋溫潤辛潤氣陽質陰有陽和解凝之功無剛燥劫津之慮以柔治剛理固有一定者也鞠通先生云經謂燥淫所勝男子㿗疝女子少腹痛此燥氣延入下焦搏於血分堅結不散而成症疾勿論男婦化症回生丹主之若不知絡病宜緩通治法或妄用急攻必犯瘕散為蠱之戒此蠱乃血蠱也在婦人更多為極重難治之證學者不可不預防之也化症回生丹方系燥淫所勝治以苦溫佐以甘辛以苦下之之法方從金匱鱉甲煎丸與回生丹脫化而出久病堅結不散者非此不可又云難經謂任脈為病男子為七疝女子為瘕聚此燥氣延入下焦不與血搏故發時痛脹有形痛止無形自不得傷無過之營血而用化症丹矣老年八脈空虛亦不可與化症丹皆復亨丹主之愚按化症丹芳香燥藥猶嫌其多尚宜減去復亨丹溫潤甘辛頗為合拍又按血虛化燥一證每每經事先期或一月經行數次血色鮮紅即成塊亦鮮明而不晦暗必多進大劑育陰方愈氣虛者佐以益氣甚有血虛燥結隧道拘攣似積而實非積之病女子血海常虛肝陽多沸易生此證古人止分氣病血病立有積聚癥瘕名目並未詳氣血因何致病之故後人不事推求徒知見氣破氣見血行血往往用香附烏藥厚朴青皮木香檳榔破氣諸燥藥謂氣為血帥氣行則血行見治不效加以行血如三稜莪朮乾漆元胡蘇木之類甚有用巴豆硝黃諸品破積攻堅愈治愈結愈結愈大致之形消腹板成蠱成勞潮熱鼻衄上咳下利死而後已此等治法貽誤千古春山先生曰氣為血帥血實為氣航蓋水淺者瘀始停未有水足而河流壅塞者汁乾者物乃結未有汁足而枝葉枯硬者天包乎地表裡皆水人為血肉之體亦表裡皆水無形之陽基於有形之陰血行原藉乎氣行氣行亦資乎血行蓋血能載氣以行也總之因氣致病者調其氣而血自通因血致病者養其血而氣自行因燥濕寒熱致病氣血者治燥濕寒熱而氣血自調經云治病必求其本此說最為切要嗣育一門不外調經葆精二法古歌云山無不草木人無不生育女子要經調男子要精足調經之法前已發明葆精之道更宜詳究經曰兩神相搏夫婦合而成形常先身生是謂精此先天本來之精也又曰谷入氣滿淖澤注於骨是謂液此後天日生之精也先天之精受之生初後天之精生於穀氣故精字從米從青欲葆精者不徒藉資藥餌更須調其飲食凡煎煿辛燥等物最易生熱不宜多食至於治法當視其人之體質為之氣虛者治在脾肺土為金母金為水源飲食之精氣賴脾氣以散輸資肺氣以灌溉益脾肺之氣即以裕生化之源經故曰氣歸精陰虛者治在肺心腎經謂鬲肓之上心下鬲上為肓中有父母肺與心也七節之傍中有小心腎也肺心腎呼吸相通君相火動靜相隨生精者心損精者亦心精氣生於穀氣穀氣色白白為五色之本穀氣歸心奉君火而化赤赤血得金氣之敷布下行入腎化精歸本還原故其色仍白精生於血脈故曰生精者心然生之甚難損之甚易君火一動相火隨之虛陽潛沸於內則所生之少不敵所耗之多故陰虛者須滋肺心腎之陰以使之生即以招攝心腎之陽不使之耗心腎之坎離既濟而肺脾腎之地天自泰矣真陰真陽虛者治在脾腎益火以治土之母培土以生水之源所謂先後天一氣相生者此也然須服溫潤甘潤諸品最忌剛燥金石嘗見艱於嗣育者依古成方謂溫熱能補命門終年修服不知水中之火宜溫潤不宜溫燥陰液本虧又加剛燥耗劫輕則致生頭疼牙疼諸證甚則成目昏瘡疽偏枯痿廢之痼疾皆由於溫熱補命門之說誤之也然誤藥固足以致病即不誤藥亦僅可以治病草木無情斷難添精葆精之道操之在己枚叔七發云出輿入輦命曰蹶痿之機洞房清宮命曰寒熱之媒蛾眉皓齒命曰伐性之斧甘脆肥濃命曰腐腸之藥可知欲葆精者總須寡欲節勞以養其心不使君火引動相火相火得安其位自不耗散真陰再能適其寒溫調其飲食以裕其源自然精足此又勿藥真詮葆精妙法精足則神氣有歸必然多男古傳經淨後單日成男雙日成女諸說多屬支離男子精勝則多男女子天癸勝則多女此乾道成男坤道成女之義也男子精先至則生男女子天癸先至則生女此乾坤六子內陽外陰之義也夫女子天癸女子之真陰也馬元臺曰經云女子二七天癸至天癸陰精也腎屬水癸亦屬水由先天之氣蓄極而生故謂陰精為天癸王太僕以月事為天癸者非也易曰男女媾精萬物化生是男女交媾之時各有精但女子之精以二七而至而其月事亦與此時同候故經即繼之曰太衝脈盛月事以時下西學云女子子宮內有精珠十五顆至十八顆不等形如雀卵薄膜裹之內藏精液是謂陰精女子入月之年精珠始生暮年月信止精珠即無凡夫婦交媾精珠迸裂陰精與陽精交會是以成孕此說與元臺義同似可憑信觀雞之生卵雞腹中卵有數目漸次生盡則不生矣在人亦然嘗見婦人肥盛即難成孕以子宮為濕痰脂膜壅塞故也古法以二陳二術等治之又見婦人破泄太早太甚及大病脫血後雖調理復原亦難成孕想是精珠盡裂之故觀此則葆精之道不獨男子為然已也葆精之後當知保胎夫保胎之法不外氣血胞胎在腹如天之包地如雞之含卵四面皆血以養之氣以攝之不得行一條胞脈系腎以為根絆若氣虛不足以提攝血虛不足以涵濡則其胎自落彼巢元方分經養胎之說謂十二經脈養胎以五行分四時殊難憑信人身經脈一氣貫通豈有分任各養之理以系腎而言腰者腎之府腎為人身之根蒂腎虛則吸納之權廢實足以致落故腰痛胎必落大抵世之因氣虛落胎者十之二三因血虛落胎者十之六七其有每至兩三月即落者總由陰虛熱爍如涸澤之魚不能久活法宜清補腎陰為主兼忌濃味炙煿香燥破耗等物自可無虞古有黃芩白朮安胎之說不知此二藥系苦燥辛燥之體與胎大不相宜想古人為孕婦脾有濕熱者用之後人不察誤認為安胎聖藥豈不相反吳又可謂大黃為安胎聖藥此指客邪傳胃腑者言之去邪即是安胎豈無此實證而亦用之乎又古人因胎氣上逆用銀苧酒取其鎮逆清熱和氣血後人不悟此理嘗於閃挫欲墮者而亦用之豈非速其墮乎總之安胎之法有客邪致胎不安者但當去邪即是安胎邪早去一日胎早安一日經故曰有故無殞其有不因客邪而胎自不安者當究其所以不安之原以治之而胎自安其因閃挫欲墮者宜培養氣血稍參調氣治之至胎前雜病如子癇子煩子暈子淋子腫子懸子嗽等證大抵不外陰虛化燥陽虛化濕兩端隨證參酌自可無誤再胎婦平日常宜小勞流通氣血自無難産之患古方如達生散諸劑一派皆辛燥破耗之藥斷不可服鞠通先生謂天下本無事庸人自擾之其說甚是若欲其滑利易生常以豆腐皮加白蜜泡服或服鴨湯豬膚湯等類藉水行舟自然易産若夫臨産切宜安靜瓜熟蒂落比喻最精達生編六字真言一曰睡二曰忍痛三曰慢臨盆尤為切要其交骨難開者如加味當歸湯當歸川芎血餘炭炙龜板尚無流弊他如兔腦丸立應散諸方皆屬霸道斷不可從其有難産至兩三日水血行盡氣血虧極者急用八珍湯去苓術加阿膠枸杞沙苑黃耆山藥等味兩補氣血虛回乃可望生更有虛極神昏不知服藥者用八珍料斤許在産婦房中文火緩煎俾藥之氣味從産婦口鼻吸入運動氣血冀其蘇醒醒後即以此湯緩緩與服亦可望生曾經有驗此以意用藥法也其有胎死腹中者舌苔必青黯繼而腹冷寒戰胎即欲化而落宜大劑養血稍加肉桂氣虛者參以益氣亦不可拘執成方用平胃朴硝攻下致傷氣血舊訣云面赤舌青母活子死面青舌赤母死子活面舌俱青母子俱死此屬有驗産後氣血大虧更宜審慎吾鄉新産服生化湯當歸川芎炙草炮薑桃仁或胡椒湯艾湯其生化湯活血化瘀兒枕少腹有塊名曰兒枕作痛者尚宜胡椒耗散真陰艾湯助熱生風均不可服其有肝虛血燥體質平時常有肝陽上冒見證生化湯辛溫走竄又不宜服嘗有服此成痙厥者不可不知産後惟有用當歸丹參炙草和血稍加桃仁以導余瘀最為穩當川芎辛散炮姜溫燥不宜多用産後無虞保生等湯不知創自何人害人無算尤當禁忌其有氣血虛極者心虛氣短頭眩多汗須於前方加沙參棗仁熟地玉竹養之再參童便導瘀下行亦妙其有寒熱交作者亦由血虛不能榮養百體所致宜用前方大劑養血切勿作外感治金匱論新産婦人有三病一曰痙二曰鬱冒三曰大便難血不養肝肝風內動則痙此筋病也血虛肝陽上越則鬱冒頭眩目瞀嘔不能食但頭汗出此神病也血虛不能濡腸則大便難此液病也總之皆陰虛血燥見證當大劑養陰養血如復脈等湯最忌辛溫耗散即有外風亦忌風藥升舉其陽致汗脫血暈而斃春山先生云治風先養血血充風自滅易一養字充字較古歌尤勝又有産後隨臥敗血乘虛上攻或心下滿悶或痰涎壅盛甚則神昏口噤更有敗血衝心喜笑怒罵逾牆上屋者多致不救此證不論虛實急用熱童便灌之實證必有腹痛拒按情形輕者用生化湯重者用回生丹最妙若産後六氣外邪為病當汗當清當下隨證治之速去其邪兼護其虛無糧之師貴在速戰又不可拘於産後宜溫不宜涼之說內經有故無殞不專指胎前言之也女科大要如此學者以意參之隨所指而進步焉當不歧於路矣兒科論小兒春令也木德也花之苞果之萼稚陽未充稚陰未長者也稚陽未充則肌膚疏薄易於感觸稚陰未長則臟腑柔嫩易於傳變易於傷陰故小兒病較大人尤重尤當以存陰為第一義夫存陰非補陰之謂凡辛燥升散溫燥苦澀消導皆是耗傷陰液之藥往往陰液被傷肝風內動鼓痰上升血不榮筋筋急拘攣致成痙瘈稚陽未充忌用苦寒以苦寒善伐生生之氣且苦能化燥化燥則又傷陰不獨伐生生之氣已也金石之品善定神智令人發呆冰麝香燥走竄最耗心液經曰石藥發癲芳草發狂不可不知昔錢仲陽為小兒制六味丸取酸甘化陰之義酸水味也甘土味也木非水不生非土不載木實初結多酸猶稟木之本味成熟則純甘甲乙合而化土全得土之正味五味惟甘為無毒甘潤得水土氣足故能滋液仲陽允為小兒之司命者哉乃世俗未推六氣致病之理未推六氣最易化燥之理並未推小兒稚陽未充稚陰未長尤易化燥之理見兒發熱不知何邪概曰風寒輒與辛燥升散雜以苦溫苦澀消導吾鄉尤誤於薄荷荊芥辛涼之說下筆輒用不知荊芥質燥氣香上升巔頂薄荷質燥辛辣異常稍用三五分參於辛潤劑中以和格拒猶可若獨用多用頻用即薄荷一味實足耗液致成痙瘈乃見兒痙瘈便稱驚風亂投冰麝金石苦寒慓悍毒藥以為開竅鎮驚清熱祛風家傳祕法家藏丸丹多系如此誤治甚多殊堪憫惻又或將驚字誤作筋字之訛挑筋刺血強推強拿其在富貴之家釀禍猶速嘗見薦醫薦方接踵而至此醫用熱彼醫用寒一日之間七方十劑遍嘗刀針金石全施又或送鬼叫魂此搖彼喚使兒無片刻之安重棉厚絮爐火壺湯使兒在熱盦之內花之苞也果之萼也其堪如此傷殘也乎嗟乎是誰誤之也父母誤之也假使延一明理之醫對證施治何能至於此極乎吾鄉鞠通先生憫兒之疾苦作解兒難一冊其中分寒痙風溫痙溫熱痙暑痙濕痙燥痙六條為六氣致痙分內傷飲食痙本臟自病痙二條為內傷痙客忤痙一條為驚痙又謂先感後痙者即俗所謂驚風是也病久致痙者即俗所謂慢驚是也又引素問太陽所致為痙痙者強直之謂後人所謂角弓反張是也少陽所致為瘈瘈者蠕動引縮之謂後人所謂抽掣搐搦是也愚細玩諸條不外燥濕二字又終歸於燥之一字然則六氣最易化燥小兒尤易化燥之說此豈余之私見哉請析言之寒與燥同源風寒乃天地乾結之氣干則化燥最速故經謂傷寒為熱病之類風與熱皆屬陽邪風溫溫熱為溫燥之氣暑有熱有濕為燥中夾濕之氣濕與燥相反濕不能作痙故濕痙一條本論亦曰濕性陰柔不能致強初起之濕痙必兼風而成兼風寒者主寒燥搏濕治兼風熱者主風燥搏濕治燥乃正秋之時金風驟起草木黃落為涼燥搏束之氣比傷寒較輕又有暑濕內伏涼燥外來又為燥邪搏濕之氣所謂六氣之邪不外燥濕而燥為尤重者此也內傷飲食痙由兒之父母愛惜過甚不能為兒節制飲食飲食不節則脾郁不舒脾困則不能為胃行其津液而濕漸停矣濕停則泄瀉泄瀉久則傷脾脾傷則血無生化之源化源既薄血液日虛肝失所養肝陽鼓動內風輒發木來乘土蠕動引縮此由濕化燥之病即俗所謂慢驚慢脾風是也慢脾風者因脾慢而致生肝風者也本臟自病痙由於兒之先天薄弱父母又愛惜過甚恐兒之寒著以厚衣覆以厚被冬月設以圍爐致兒每日出汗汗多則亡血血燥則生風又或因兒常啼去淚淚為肝液液去陰傷肝陽鼓動內風輒發見蠕動引縮之象然本臟自病又為六氣致痙之根一感外邪內風隨動即成痙瘈此內傷二痙不外燥濕而又終於化燥者也古語云欲得小兒安常帶三分飢與寒此為惜兒祕訣蓋飢非餓也飲食清淡有節耳寒非凍也不宜厚絮重綿盦成熱病耳客忤一痙瑟庵先生云世俗妄傳驚風之證惟此乃副其名此由兒之心膽血虛神怯偶有所驚即以致痙所謂風者非外風也乃內動之肝風為病耳見證或有汗或無汗面色時青時赤畏見異言異服夢中囈語手足搐搦與六氣致痙神氣昏憒者不同此更為血燥生風之證余謂小兒諸病不外燥濕而又終歸於燥者固實有明徵也至於看法以色診為第一凡神充色澤者天真必厚易養而少病神怯神瞪面色慘淡枯瘁唇紅不澤者稟賦必薄難養而多病再看其先後天氣質如先天虧者必囟門難合或齒遲語遲行遲或項軟發穗青絡常露之類是也後天虧者必食少化遲腹膨泄瀉面色唇舌淡白之類是也又有看虎口紋法起於滑氏伯仁歌曰小兒三歲下虎口看三關紫熱紅傷寒青驚白是疳淡紅淡黃者斯為無病看又謂紋見下節風關為輕紋見中節氣關為重紋見上節命關為危直透三關為大危世俗推拿一科從之為法但滑氏及幼科諸書均未推原其故愚按靈樞經云經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也凡診絡脈色青則寒且痛赤則有熱胃中寒魚際絡多青胃中熱魚際絡紅其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也診虎口之說蓋本乎此但內經指百病而言不專指小兒一科彼滑氏男左女右之說未免拘執且紅為傷寒之說顯與經背至以絡脈所見之長短審病之淺深固屬法程而風氣命三字又未免杜撰夏禹鑄謂小兒亦以四診為法望色望苗竅為第一此說於理甚足蓋病之傳變不常即內經以色診絡之說亦不可拘惟手絡不宜暴露是為要訣以過露為血燥生風候也推拿一法即內經按摩法小兒惟內傷飲食一證輕摩其腹取其轉運可冀小效若他病用之則非徒無益而又害之矣針灸法為靈樞經所重但從無挑手絡之理惟霍亂一證因氣閉以致血閉其絡色青黑者即內經其暴黑者留久痹也之說當針尺澤膀彎曲池腿彎二穴以通氣血立時有效此外非深於針法者皆不可妄針致傷脈絡至於認證總以燥濕二氣為提綱以因風因寒因暑為機括以化火未化火為傳變以傷陰之輕重為用藥之淺深春山先生謂痘疹為燥火之甚者也其次當以痙病為重痙病多由燥熱化風雖名曰風實是肝陽為病耳筋失滋養故致強急今現燥象治法與大人無異不必另立法門試舉其大略言之風寒燥邪初起發熱無汗無論痙與不痙治以辛潤如杏仁牛蒡桔梗之類寒重者加以溫潤如蔥白豆豉鮮生薑之類風溫溫熱治以辛涼於前辛潤法中酌加微苦之品如桑葉蔞皮梔皮連翹蔗皮梨皮南沙參之類熱重酌加涼潤輕品如銀花菊花知母羚羊角片竹葉蘆根梨汁蔗汁之類客邪鼓動內風痰涎上蒙清竅厥時冒不知人或發痙發瘈前法必佐辛潤以開內閉如芥子鮮石菖蒲薑汁之類痰涎閉竅熱痰加貝母天竹黃花粉蔞仁膽星竹瀝薑汁之類濕痰加半夏蜜炙橘紅之類燥火甚者清燥救肺湯在所必用夾暑夾濕者加以辛淡如蔻皮蔻仁通草赤苓淡竹葉滑石鮮荷葉扁豆花之類夾濕熱者加薑汁炒木通薑汁炒黃連之類苦辛開化陰液虧極者色瘁竅乾無涕無淚口痙不能言語宜速救液如生地麥冬元參鮮首烏阿膠雞子黃鮮石斛玉竹女貞子龜板牡蠣決明燕菜之類液虛燥甚者必多進方回切勿中途易法致之不救其有液虛燥極又有痰熱閉竅暑濕內伏者不妨於養液劑中參以辛潤開竅豁痰辛潤又能行水去濕醫不執方合宜而且病純藥純病雜藥雜細玩漢人方法活活潑潑如珠走盤其神妙有不可測者凡此皆治六氣致病之大略也若本臟自痙病亦不外救液潤燥一法內傷飲食痙在濕未化燥時即須預防後來變痙及早節制飲食健運脾陽如參苓白朮散八仙糕一味雞金散之類若已化燥又須參以甘平微潤如制首烏山藥扁豆沙苑子枸杞菟絲棗仁阿膠龜板淡菜燕菜之類但此病陰陽兩傷燥濕並病多不能救客忤痙由血虛神怯而起審其實有所因別無他病用復脈去參桂棗姜加棗仁牡蠣汗多神不寧時有恐懼者加煅龍骨整琥珀整塊硃砂取其氣不取其質自無流弊疳積一證鞠通先生謂疳者干也干生於濕與內傷飲食痙同一病因夫干生於濕病之所由起也而濕已成干病之所至極也在濕未成干時用資生枳朮等丸疏補中焦頗為合拍仿古人以樂侑食之義食後擊鼓鼓動脾陽使之運化又以意治病之法其有因肥甘厚味太過釀生濕熱疳蟲者宜加苦寒辛酸如連梅川椒史君之類若濕已成疳則不獨苦寒殺蟲重傷脾胃不宜誤用即資生等丸亦嫌剛燥耗液惟都中相傳一方溫潤補脾辛潤通絡一通一補相需成功最為妙法都中方以全蠍三錢去毒烘乾為末每用精牛肉四兩作肉團數枚加蠍末少許蒸熟令兒逐日食之以蠍末完為度夫蠍色青屬木善竄而疏土其性陰兼通陰絡疏脾郁之久病在絡者最良然其性慓悍不宜獨用牛肉甘溫最善補土牛肉得全蠍而愈健全蠍得牛肉而不悍補脾之體運脾之用所以治疳積有殊功一味雞金散亦最妙又華陰李孝廉方用大棗百十枚去核象核之大小實以生軍麵裹煨熟搗為丸如棗核大每服七丸日再服神效此亦一通一補潤而不燥者也按此二方不獨治疳積有功凡類於疳積者旁通觸類實開無限法門西學謂小兒疳積乃吸液管受病吸液管者吸吸食物之精液管也千支百派散布大腸夾膜之間食後少頃內有精液始見如白絲然夾膜有小核甚多即吸管疊積而成一切吸管附近脊處乃合為一名曰精液總管附脊骨而上至頸骨第七節即屈轉而下左入頸手回血會管直達於心小兒疳積乃液管凝大閉塞不通故多食猶瘠按此與鞠通先生謂疳積生於飲食不節隱隱相合經謂婦人腸覃一證亦與此相仿化而裁之存乎變推而行之存乎通神而明之存乎其人也用藥大要論易曰立天之道曰陰與陽立地之道曰柔與剛草木雖微其氣味有陰陽之分體質有剛柔之別一物一太極也古人論藥性多言氣味少言體質蓋以地之剛柔即天之陰陽所化言陰陽而剛柔即在其中後人不悟此理每每誤用春山先生謂病有燥濕藥有燥潤凡體質柔軟有汁有油者皆潤體質乾脆無汁無油者皆燥然潤有辛潤溫潤平潤涼潤寒潤之殊燥有辛燥溫燥熱燥平燥涼燥寒燥之異又有微潤甚潤微燥甚燥之不同大抵潤藥得春秋冬三氣者多得夏氣者少燥藥得夏秋冬三氣者多得春氣者少燥藥得天氣多故能治濕潤藥得地氣多故能治燥藥未有不偏者也以偏救偏故名曰藥試舉其大略言之辛潤如杏仁牛蒡桔梗葛根細辛前胡防風青蒿紫菀百部當歸川芎桃仁紅花茺蔚子白芷鮮石菖蒲遠志鮮鬱金蜀漆殭蠶芥子萊蔔子蘇子薤白生薑豆豉蔥白芹菜汁韭汁之類溫潤如黨參高麗參黃耆甜冬朮蓯蓉枸杞山萸菟絲蘆巴巴戟天桑椹金櫻子五味子桂圓大棗胡桃鹿茸鹿角鹿膠羊腎海參淡菜紫河車坎氣之類大抵溫潤一類氣溫得天氣多質潤得地氣多受氣比他類較全且味多帶甘秉土之正味治陰陽兩虛者頗為合拍平潤如南北沙參東洋參熟地首烏芍藥玉竹百合沙苑柏子仁酸棗仁甜杏仁冬瓜仁麻仁亞麻仁黑脂麻烏梅蜂蜜飴糖阿膠燕窩豬膚鴨湯人乳之類涼潤如干地黃元參天麥冬西洋參鮮石斛女貞子銀花菊花鮮桑葉蒲公英知母荷葉竹瀝竹茹竹葉淡竹葉蘆根白茅根懷牛膝川貝母枇杷葉栝蔞花粉海藻昆布柿霜紫草白薇梨藕蔗汁荸薺汁露水龜板鱉甲牡蠣決明文蛤海浮石童便之類寒潤如石膏鮮地黃犀角羚羊角蚌水豬膽汁之類辛燥如羌獨活蘇葉荊芥薄荷藿香佩蘭香薷木香香附麻黃桂枝牽牛芫花之類溫燥如蒼朮厚朴半夏半夏雖燥其質尚滑南星蔻仁砂仁益智仁破故紙山楂青陳皮檳榔之類燥熱如附子肉桂乾薑肉桂桂枝乾薑質雖微潤究竟氣厚炮薑吳萸椒目之類平燥如茯苓琥珀通草苡仁扁豆山藥山藥體微燥而精尚多甘草神麯炒穀芽豬苓澤瀉川牛膝萆薢茵陳防己豆卷蠶砂車前子海金沙車前子精汁頗多但其性走泄海金沙質微燥二者在利水藥中尚不甚傷陰之類涼燥如連翹梔子霜桑葉丹皮地骨皮叉石斛滑石寒水石柴胡升麻蟬蛻鉤藤槐米枳殼枳實葶藶子之類寒燥如黃連黃芩黃柏木通苦參金鈴子龍膽草大黃元明粉大戟甘遂之類本草體質大略如此然既詳其體質又須辨其氣味大抵氣薄者多升多開味厚者多降多闔辛甘發散為陽主升酸苦通泄為陰主降溫者多開寒者多闔瀉者多開補者多闔辛苦辛酸之味多開酸鹹之味多闔辛能散能潤又能通津行水苦能燥能堅又能破泄酸能收之咸能軟之又能凝之甘得土之正味甘藥皆無毒同開則開同闔則闔緩中之力獨多淡得天之全氣淡薄無味象天寓有清肅之燥氣故功專滲濕上升於天下降於泉滲濕之功獨勝若夫水族如龜板鱉甲諸品稟乾剛之氣得坎水之精體剛質柔味鹹而淡能攻堅軟堅能燥濕清熱能滋陰潛陽一藥三用陰虛夾濕熱者血燥結塊者用之尤宜獨是草木受氣多偏味難純一一藥多兼數味或先苦后辛後甘或先甘后辛後苦總以味偏勝者為主味居後者為真但須平昔親嘗方能不誤春山先生從邵子元運之說謂古今藥性未能畫一如今之元會世運正當燥火司天故燥病獨多萬物亦從之而變燥金味辛火味苦故藥味多變苦辛愚按元運之說似難盡憑而地氣不同確有可據如論中所辨麥冬本甘今甘中帶辛杭産者辛味猶少川産者辛味較多叉斛本淡今霍山産者地近中州味仍甘淡川産者味淡微苦廣西雲南産者味純苦而不甘以廣西雲南居中州西南之邊陲得燥火之氣獨勝也所辨實皆不爽不獨時地不同即種植亦異如高麗人參氣本微濕今用硫黃拌種則溫性較勝如此類推不可枚舉至用藥之法須知用意醫者意也以意治病是最上一乘不得已而用藥已落二乘然無情之藥以有知之意用之則靈古法用藥如用兵用兵有戰有守有奇有正用藥亦然夫以天地之氣猶橐籥之開闔運行不息故能化生萬物在人則不能故其機一停則病一偏亦病一息則死六氣之中寒濕偏於闔燥火偏於開風無定體兼寒濕則闔兼燥火則開暑有熱有濕偏於熱者多開偏於濕者多闔用藥治病開必少佐以闔闔必少佐以開升必少佐以降降必少佐以升或正佐以成輔助之功或反佐以作嚮導之用陰陽相須之道有如此者燥病治以潤不妨佐以微苦以微苦屬火火能勝金也濕病治以燥不如治以淡以淡味得天之燥氣功專滲濕也更有病純者藥純病雜者藥雜如瀉心黃連諸湯是也有病雖雜而出於一源則立方要有專主有病雖純而夾以他病則立方要有變通燥病須防其夾濕濕病須防其化燥觀其已往以治其現在治其現在須顧其將來表裡寒熱虛實固當分明標本先後重輕尤宜權變燥病當用膏滋濕病當用丸散燥病夾濕潤藥用炒或用水丸濕病化燥燥藥用蒸或用蜜丸欲其速行則用湯藥取湯以蕩之之義欲其緩化則用丸藥取丸以緩之之義至於煎法亦當用意如陰液大虧又夾痰涎則濁藥輕煎取其流行不滯如地黃飲子是也如熱在上焦法宜輕蕩則重藥輕泡取其不犯下焦如大黃黃連瀉心湯是也如上熱下寒則寒藥淡煎溫藥濃煎取其上下不礙如煎附子瀉心湯法或先煎以厚其汁或後煎以取其氣或先煎取其味厚而緩行或後煎取其氣薄而先至如大承氣湯先煎大黃枳實厚朴後下芒硝是也欲其速下取急流水欲其緩中用甘瀾水即千揚水如煎大半夏湯法欲其上升外達用武火欲其下降內行用文火或藥後啜薄粥助藥力以取汗如服桂枝湯法或先食後藥助藥性之上升種種治法非參以意不可試觀仲景先師一百一十三方三百九十七法皆有真意存乎其間學者以意會意自有心得此不過論其大略而已醫宜識字論古人造字不外形聲形聲陰陽之道也然形聲又各有陰陽聲有四平上去入平聲之陽也上去入皆仄仄聲之陰也以形言之伏羲畫卦一畫開天則為一一音奇奇以象陽數之始也一畫豎之則為丨丨音袞上下通也左右倚之則為丿為乀丿音撇左戾也乀音弗右戾也縮之則為丶丶音主有所絶止丶而識之也曲之則為乙乙音軋乙乙難出之貌一象天陽也丨天氣下降於地陽統陰也丿繼乀象人乃陰精陽氣合而成之者也陳修園曰左丿為陽右乀為陰作書者遇丿處輕手揮之陽主乎氣輕清之象也遇乀處重手頓之陰主乎精重濁之象也先丿後乀氣以生形陽統陰也乀繼以丿形隨乎氣陰承陽也丿乀左右各自位置陰陽對待之道也丿乀左右不相離陰陽互根之道也丿乀合而為人合謂之抱又謂之交抱者負陰抱陽之義交者地天交泰之義觀人字字義而人之陰陽可知矣試以人之外形言之鼻為中土鼻下名人中人中以上鼻目耳皆偶竅人中以下口奇竅偶屬陰奇屬陽陰上陽下地天泰也頭項以下乳偶竅臍前陰後陰奇竅男子前陰內偶竅外奇竅女子前陰內外皆偶竅亦地天交泰也外形既如此而人所以生之之理不從可想乎夫人在天中而附於地上故後天胃氣為最重胃主地氣為倉稟之官為人身氣血生化之本故胃之為言匯也胃從田田乃五穀所匯而生之者也又胃者衛也布焌穀氣衛外而為固也經故曰四時百病胃氣為本脾為堤防之土乃散輸胃中水穀之精氣以傳於肺者耳故脾從卑卑者由下申上之義又脾者裨也裨助胃氣以散精者也肺從市市從從丨象天氣降於地而上下貫通者也從坰坰凶去聲坰空也象肺輕虛之體也又肺者沛也敷布水精行於臟腑沛然而莫御也心從從隱夫丨丿乀方以直隱圓而神字雖萬變未有能外丨丿乀以結構之者人心虛靈圓妙故出乎丨丿乀之外而從丶從隱即圓而神之義也又心為身之主故從丶心善思陸士衡文賦曰思隱隱其若抽故從隱又心者新也神明變化而日新也又心屬火小篆嘗言心字篆文只是一倒火字耳蓋火下交於水為既濟故顛倒之以見陰陽調燮之妙考五臟惟心有包絡蓋以心為五臟六腑之大主主不受邪故有包絡以為外衛曰包絡者即心外之脂膜形如油網包裹而散絡於心者也肝從干干從二從丨二偶數偶以象陰而貫通於上下者也然肝雖屬藏血之陰臟而在五行屬木肝者干也如木之有幹有枝也木於時為春後天震巽之木居東方而主生氣巽上坤下為觀觀之義崇陽而抑陰也上坤下震為復復之義見陰必從陽轉也故治肝以不伐生氣為上腎水也腎陰上交於心為既濟故腎字從臣從又心為君主臣所以輔君也又手也扶佑君主之義也又腎者神也妙萬物而為言也腎者任也主骨而任周身之事也甲乙經曰腎者引也引氣通於骨髓者也臟象如此腑象可知腑如府庫之府主聚而散焉者也胃為六腑之一前論五臟先言胃者以胃為後天化生之原也論五臟首言脾者以地氣必上騰天氣乃下降地天交泰之義也他如大腸屬金為肺之腑小腸屬火為心之腑人納水穀脾化精微之氣以上升小腸化糟粕傳於大腸而下降腸者暢也通暢胃中之氣也三焦屬火為心包絡之腑焦從火熱也滿腔熱氣布濩能通調水道下出而為溺者也膽屬木為肝之腑膽從詹人之勇怯於此詹之又膽者擔也有擔量方足以任天下之事故經謂十一經皆取決於膽又謂膽為中正之官決斷出焉蓋以人之勇怯擔量決斷皆生於氣肝膽屬木主仁而又主生氣仁之至者義自盡也膀胱屬水為腎之腑膀者旁也胱者光也謂其得三焦之氣化則津液旁達而肌膚光澤也此六腑字義與命名又各有精義者也余故曰醫宜識字
