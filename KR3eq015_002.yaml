body:
  text: 卷中聞聲須察陰陽論五音宮屬土商屬金角屬木徵屬火羽屬水肝在音為角在聲為呼心在音為徵在聲為笑脾在音為宮在聲為歌肺在音為商在聲為哭腎在音為羽在聲為呻此五音之應五臟也若病則有不盡然者獨是五音不外陰陽陰陽不外燥濕春山先生分平仄看法實有至理燥邪乾澀聲多屬仄或乾噦或咳聲不揚或咳則牽痛或乾咳連聲或太息氣短燥甚則經絡拘急拘急求伸故善太息化火則多言甚則譫狂其聲似破似啞聽之有乾澀不利之象濕邪重濁聲必低平壅塞不宣古謂如從甕中作聲者然或默默懶言或昏昏倦怠或多嗽多痰或痰在喉中漉漉有聲或水停心下汩汩有聲或多噫氣濕阻不宣故多噫氣周身痠痛沉重難展化火則上蒸心肺神智模糊呢喃自語或昏沉迷睡一派皆重濁不清之象流露於呼吸之間他如出言壯厲先輕後重者外感也出言懶怯先重後輕者內傷也妄見妄言為譫語無稽狂叫為狂言實也又有神虛譫語虛煩似狂二證當以脈證舌苔參之斷不可誤以為實若語不接續為鄭聲無人始言為獨語此屬虛居多又有言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也二者皆屬危候又如痰壅肺絡咳聲不揚金實無聲也勞瘵音啞金破無聲也腹形充大鼓之板實者實也腹皮繃急鼓之𪔣𪔣者虛也然則燥濕表裡虛實不皆可聞而知之乎而猶不止此聲出於肺而根於腎其有無還聲如鴉聲者乃肺腎將絶金水不交聲音不能發自丹田亦不能還至丹田故聲直而無回音耳然亦有痰閉肺竅使然者又當以辛潤清潤開痰利竅不可竟作不治論至喘促一證尤當辨認肺為氣之統腎為氣之根肺主出氣腎主納氣陰陽相交呼吸乃和若出納升降失常斯喘作焉實喘責在肺虛喘責在腎實喘者胸滿聲粗氣長而有餘虛喘者呼長吸短息促而不足實喘者出氣不爽虛喘者入氣有音實喘有水邪射肺有痰飲遏肺有客邪六氣之邪皆能致喘干肺上焦氣壅治宜疏利虛喘為腎不納氣孤陽無根治宜固攝虛實分途陰陽異治然則聞聲之道顧不重哉經故曰聞而知之之謂聖問證求病論病藏於中者也證形於外者也工於問者非徒問其證殆欲即其證見以求其病因耳法當先問其人之平昔有無宿疾有無恚怒憂思飲食喜淡喜濃喜燥喜潤嗜茶嗜酒大便為燥為溏婦人問其有無胎産月事先期後期有無脹痛再問其病初起何因前見何證後變何證惡寒惡熱孰重孰輕有汗無汗汗多汗少汗起何處汗止何處口淡口苦渴與不渴思飲不思飲飲多飲少喜熱喜涼喜熱飲不皆屬寒嘗有郁遏不通者亦喜熱飲以熱則流通故也思食不思食能食不能食食多食少化速化遲胸心脅腹有無脹痛二便通澀大便為燥為溏小便為清為濁色黃色淡二便最為緊要乃病之外見者也種種詳詰就其見證審其病因方得軒岐治病求本之旨豈徒見痰治痰見血治血而已哉切脈源流論經曰營行脈中又曰脈者血之府也又曰十二經皆有動脈按十二經動脈上部動脈在頭中部動脈在手下部動脈在足是為三部一部三候是為九候上部天兩額之動脈足少陽之頷厭也上部地兩頰之動脈足陽明之地倉大迎也上部人耳前之動脈手少陽之和髎也中部天手太陰之太淵經渠也中部地手陽明之合谷也中部人手少陰之神門也下部天足厥陰之五里也下部地足少陰之太溪也下部人足太陰之箕門也下部之天以候肝地以候腎人以候脾胃之氣中部天以候肺地以候胸中之氣人以候心上部天以候頭角之氣地以候口齒之氣人以候耳目之氣下部天女子則取太衝下部人胃氣則候於陽明之衝陽仲景謂之趺陽難經三部者寸關尺也九候者浮中沉也又是一法內經診法三部九候就十二經之動脈診之以決死生以處百病以調虛實而除邪疾部位分明毫釐不爽逮扁鵲興著八十一難經將十二經脈均診於兩手以圖簡便其法亦自內經得來經曰尺內兩傍則季脅也季脅包藏臟腑尺外以候腎尺內以候腹中內外者一部中之內外也浮為外沉為內非兩條脈也辨見金鑑柯韻伯云凡臟腑近背者皆候於外近腹中者皆候於內金鑑謂五臟皆當候於內六腑皆當候於外內經內外字是傳寫之誤中附上關部左外以候肝內以候膈按心肺居膈上肝脾腎居膈下五臟俱注於膈肝脾腎膽之脈俱貫膈而上心心包絡腎三焦腸胃之脈俱從膈而下是膈為十一經必由之道右外以候胃內以候脾上附上寸部右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後關前以候前關後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也或曰十二經脈手六經脈走手足六經脈走足不走手今皆診於手者何也曰崇其原也十二經脈根心而生而上通於肺以回於下心主血肺主氣氣為血帥故肺主藏氣而朝百脈十二經之氣皆受之於肺平旦寅初肺氣流布起於寸口寸口又曰脈口曰氣口乃寸關尺三部之總名非但指寸之一部已也運行十二經中周而復始一日一夜五十度畢按人經脈上下左右前後二十有八周身十六丈二尺人一呼脈行三寸一吸脈行三寸一呼一吸合為一息一息脈行六寸二百七十息氣行十六丈二尺一周於身人一日一夜凡一萬三千五百息氣行五十度周於身漏水下百刻凡行八百一十丈即十六丈二尺而積之也次日平旦寅初復會於寸口寸口者脈之大會故十二經之盛衰悉見於此經曰經脈者常不可見也經脈近筋骨走故肉厚處按之不覺跳動肉消處按之方見其虛實也以氣口知之此氣口所以獨為五臟主也人生不過氣血兩端萬病亦不過病氣血兩端心為主血之臟肺為藏氣以運血之臟心肺二經之脈皆走氣口探其源不可知其流乎曰脈有尺寸何說曰人身上下兩焦中有膈膜一層以分陰陽之界難經分寸為尺分尺為寸關上分去一寸余者為尺關下分去一尺余者為寸陰得尺中一寸陽得寸內九分蓋象乎此關以下至尺澤皆謂之尺而診脈則止候關下一寸關以下至魚際皆謂之寸而診脈則止候關上九分曰九分者其下一分為關耳關僅一分象膈膜故也曰關以前者陽之動也診心肺脈嘗見九分而浮過者法曰太過減者法曰不及若上魚際則為溢矣溢滿而出於外也關以後者陰之動也診肝腎脈當見一寸而沉過者法曰太過減者法曰不及若入尺中則為覆矣覆反而傾於內也內經云陽氣太盛陰氣不能營謂之格陰氣太盛陽氣不能營謂之關按三難及三十七難關格二字倒置故引靈樞脈度篇以正之陰陽俱盛不得相營曰關格關格者不得盡其命而死矣此數句出難經或又曰既以尺寸分陰陽又云脈有輕重者何謂也曰此亦診陰陽之法也曰初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來實者腎部也夫人呼出心與肺吸入腎與肝呼吸之間脾受穀味故浮者陽也沉者陰也脾在中州故其脈在中靈樞九針篇曰肺主皮心主脈脾主肌肝主筋腎主骨扁鵲從此悟出分輕重五等診候五臟本象之脈以別太過不及之為病實足輔翼經文而為診候之大法曰診法如此內經又以寸關尺分配臟腑者何謂也曰人正南面而立心屬南離故候於寸人之有心猶天之有日日出於東故心候於左寸肺主天氣故亦候於寸肺屬西方金故候於右寸肝膽屬震巽木故候於左關脾胃屬中央土故候於右關腎與膀胱屬坎水故候於兩尺三焦生右腎傍故候於右尺二腸為至濁至下之腑當候之於尺小腸與心相表裡候於左尺大腸與肺相表裡候於右尺按扁鵲十難據臟腑表裡之說將大小腸候於兩寸西晉王叔和遵之元明諸家力辨其非謂二腸為至濁至下之腑斷不能候於至上之寸部近代黃坤載又謂二腸腑雖至濁經行頭上則至清徐靈胎亦以為然喻嘉言羅東逸仍從元明諸公駁正之說御纂金鑑配二腸於尺部按內經尺內以候腹中一句當謹遵金鑑又按叔和謂左尺候腎水與膀胱右尺候命門相火蓋誤以三焦為命門也考命門之說內經不載內經所謂之命門指眼目而言後人以腎為人身之根蒂故謂兩腎中央為命門其實命門即兩腎之稱診腎即是診命門叔和右尺診命門之說其誤可知膀胱與腎相表裡腎候之兩尺膀胱亦當候之兩尺惟三焦在右腎傍當候之右尺再以三焦言之肺為華蓋居於至高故候於寸右肺大於左左肺二葉右肺三葉故經謂肺藏於右肺氣由右而降故候於右寸心象日故候於寸心居肺下而位乎中肺稍偏於右是心稍居肺左矣心血從心左下竅而生故曰候於左寸肝膽脾胃同居膈膜之下故候於關肝生於左故候於左關脾雖居胃之左而與胃相連胃之下口由右而降故候於右關腎居腰脊故候於兩尺大小腸膀胱三焦同位於下焦故亦候於尺內經三部分配臟腑蓋象乎此雖然古人亦據常理言之耳人身氣血一氣貫通區區一寸之地不必拘分亦不能盡驗他如男女左右及奇脈斜行之說更難盡憑東垣左手人迎主外感人迎穴名在結喉兩旁與肺脈同診右手氣口主內積之說六脈均謂氣口尤屬不經學者不可不知亦不可盡拘但能得其提綱則權衡在握矣曰診法何如曰診法之精無過內經經以浮沉緩急大小滑澀八脈辨表里寒熱虛實順逆曰諸浮者病在陽諸沉者病在陰諸急者多寒緩者多熱寒主收引故脈緊急熱主蒸散故脈緩數大者多氣少血小者氣血皆少滑為陽氣盛澀為陰血少即於八脈中分對待如浮沉滑澀相對待之類微甚如微浮甚浮微沉甚沉之類懸絶如太過至三倍四倍不及止一至二至絶無之類之三等以察病之進退順逆死生何其精且約乎及仲景以陰陽著脈為十以浮數動滑大為陽沉澀弱弦微為陰診陰陽之法又莫過於此逮叔和興繁脈象為二十四且撰出七表八里九道之名九道更不可解愈多愈亂皆由於未審夫脈之有大原也夫脈之大原緣於胃氣經曰五臟皆稟氣於胃臟氣不能自至於手太陰必因胃氣乃至於手太陰若邪氣勝精氣衰胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也病勝臟曰死又曰四時百病胃氣為本人無胃氣曰逆逆者死若是者胃氣顧不重哉然推胃氣之原又生於穀氣經曰食氣入胃濁氣即穀氣歸心淫精於脈脈氣流經十二經經氣歸於肺肺朝百脈輸精於皮毛毛脈即肺脈合精行氣於腑六腑府精神明六腑精氣神明留於四臟氣歸於權衡權衡以平肺主治節分布氣化以得其平氣口成寸以決死生又曰得谷者昌絶谷者亡審是穀氣不又為胃氣之本乎曰胃氣脈何如曰胃氣脈和柔輕緩勻淨分明三部九候皆要如此中候尤重非僅診於右關一部已也經曰春胃微弦曰平胃而微弦者輕虛而滑端直以長如循嫩竹竿梢之象弦多胃少曰肝病弦多胃少者滑硬彈指如循長竿者然其氣來實而長此謂太過病在外其氣來不實而微此謂不及病在中太過則令人善怒忽忽眩冒巔疾不及則令人胸痛引背兩脅胠滿但弦無胃曰死但弦無胃者中外急徑如按弓弦如循刀刃此真肝脈見也色青白不澤毛折乃死夏胃微鉤曰平胃而微鉤者圓滿滑利來盛去衰如連珠如循琅玕美玉鉤多胃少曰心病鉤多胃少者喘喘連屬其中微曲有急促相仍之象其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱膚痛為浸淫蒸熱不及則令人煩心上見咳唾下見氣泄但鉤無胃曰死但鉤無胃者前曲後居前曲者輕取則堅強而不柔後居者重取則牢實而不動堅而且滯如操革帶之鉤全失沖和之氣此真心脈見也色赤黑不澤毛折乃死長夏胃微軟弱曰平胃而微軟弱者和柔輕緩勻淨分明如雞踐地從容不迫弱多胃少曰脾病弱多胃少者輕疾不緩如雞舉足者然太過則令人四肢不舉濕勝不及則令人九竅不通經曰脾臟者土也孤臟以灌四傍者也今不能灌溉故不通名曰重強臟氣皆不和順但代無胃曰死但代無胃者弱而乍數乍疏如鳥之啄堅鋭不柔代而中止如屋之漏點滴不勻又或如水之流去而不返此真脾脈見也色黃青不澤毛折乃死秋胃微毛曰平胃而微毛者厭厭聶聶如衆苗齊秀者然輕浮和緩如落榆莢者然毛多胃少曰肺病毛多胃少者不上不下往來澀滯或如循雞羽輕浮而虛其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人氣逆而背痛不及則令人喘呼吸少氣而咳上氣見血下指氣下聞病因呻吟但毛無胃曰死但毛無胃者如物之浮空虛無根如風吹毛輕散無緒此真肺脈見也色白赤不澤毛折乃死冬胃微石曰平胃而微石者喘喘纍纍沉而圓實流利乃陰中藏陽之象石多胃少曰腎病石多胃少者堅搏牽連如引葛然其氣來如彈石此謂太過病在外其去如數者如數者動止急促有似緊數愈虛則愈數乃真陰虧損之象原非陽強實熱之數此謂不及病在中太過則令人解㑊寒不寒熱不熱弱不弱壯不壯脊脈痛而少氣不欲言不及則令人心懸如病飢䏚中清俠脊兩傍空軟處名䏚清冷也脊中痛少腹滿小便變但石無胃曰死但石無胃者散亂而徑如奪索如彈石此真腎脈見也色黑黃不澤毛折乃死凡此皆面兼二色者五行相剋之道也皆曰不澤者陰液銷亡色由無光而無體也皆曰毛折乃死者肺之化源絶也草木之枯萎也先本實而後枝葉其即毛折不澤之義也夫觀內經診法四時百病一以胃氣為本即以五臟本脈之微甚診病之太過不及以微甚之相去懸絶知胃氣已亡決之曰死理何其精法何其約乎且夫診法有以約為貴者亦有以博為貴者蓋以一脈能兼數病一病能兼數脈真僞固當辨認常變尤貴圓通試取景嶽十六脈而詳辨之浮在皮毛主陽主表主風固也然有真正外感初起陽陽氣為陰陰邪蔽脈反不浮者亦有緊數而略兼浮者審其發熱無汗頭身疼痛為表邪而開達之陽氣得通脈始轉浮更有里邪解後表邪外達沉小數實之脈轉為浮緩浮緩為外解之徵日內可冀得汗此先里後表病也其有里邪解後而脈反浮躁者此邪火傷陰病勝臟也名陰陽交陽邪交於陰分不治又有內傷陽氣虛者脈必浮而無力陰血虛者脈必浮而空豁浮而弦數是浮不可概言表即謂浮而無力為虛浮而有力為實似可不誤然有浮大弦硬之極甚至四倍以上者又非有力之謂乃真陰涸極孤陽無根胃氣已無真臟脈見不可不知又有兼脈如浮緊風寒浮數風熱浮虛傷暑暑月汗多傷陰傷氣所以脈虛浮緩傷濕浮大傷熱浮滑宿食浮芤失血之類更宜參看沉行筋骨主陰主裡主氣鬱主寒主水其病為停飲為癥瘕為脹滿為厥逆為洞泄沉細為少氣為寒飲為胃中冷為腰足痛為痃癖沉遲為痼冷為精寒沉滑為宿食為伏痰沉伏為霍亂為胸腹痛沉數為內熱沉弦為痰飲沉緊為胸腹痛然沉雖主裡亦有外感初起寒燥之氣搏束皮毛陽為陰蔽脈不能達反見沉緊而數者見有寒熱頭痛等證即是表邪是沉不可概言里更有沉而細者或為陽氣不舒或為陽虛氣陷又不得以沉專主氣滯凡此皆於有力無力辨之庶可不誤遲脈三至為陰為寒為虛氣寒則不行血寒則凝滯寸遲則氣虛不化精尺遲則精虛不化氣若遲兼滑大多主濕痰頑痹遲兼細小必是真陽虧損或陰寒留蓄於中則為泄痛或陽氣不衛乎表而生外寒以遲為寒為虛固也然有濕溫暑溫溫熱初起脈見沉遲此非虛寒也乃濕熱鬱蒸之邪口鼻吸入從里而發所以脈象模糊至數不清有類沉遲也遏而無力亦勿作虛視乃溫熱熏蒸散漫所以脈不鼓指也熱病初退餘邪未清正氣未復脈多遲滑是遲不可概言寒凡此於氣色舌苔神情見證驗之乃可無誤數脈六至有虛有實不盡主熱熱邪主蒸散脈多緩滑經曰緩者多熱緩而滑者為熱中又曰數則煩心及難經有數脈為熱之說舉世宗之要不可以不辨一傷寒在表脈必緊數此寒燥之氣搏束使然非熱也一瘧作時脈必浮數瘧止脈則和緩豈作則有熱止則無熱乎此營衛交爭使然非熱也一痢疾脈多數而弦數而澀仲景曰弦為陰脈沉弦為飲其數而弦者濕鬱氣血也其數而澀者澀字與遏字不同澀是乾澀有如刀刮竹之象燥傷血液也非熱也一癰瘍初起脈多數此邪壅氣血也非熱也一痙病脈多數表痙為風寒外搏里痙為血燥生風非熱也一癥瘕里疽脈多數而澀此血燥而結脈所以數澀不利也非熱也一胎脈多數而滑此衝任血旺也非熱也更有陽虛者數而緩大陰虛者數而弦澀愈虛愈數愈數愈危真臟脈見數而散亂數而堅徑豈可誤以為熱乎總之邪正相爭者多數脈陰虛成勞者尤多數脈數而有力為實數而無力為虛是熱非熱可無瘥矣洪脈狀如洪水來盛去衰是為陽脈洪而有力為陽實耗陰或為頭痛面熱煩渴咽痛或為癰瘍斑疹或為動血或為二便不通等證若洪而無力乃陰虛陽亢是洪不可概言實微脈纖細無神浮弱之極是為陰脈主氣虛陽虛或畏寒少氣或脹滿食不化或嘔吐泄瀉或腰腹痛或眩暈厥逆然亦有痛極氣閉營衛壅滯似微而實遏者是微不可概言虛滑脈往來流利如珠走盤陽也滑而和緩為營衛充實稟賦充厚婦人滑而圓滿經斷無他病為胎孕大抵沉分圓滑者多男浮分圓滑者多女若病人緩滑而大為內熱蒸散滑數有力為痰為食多見脹悶嘔吐等證凡病虛損者瀉痢久者脈多弦滑此脾腎受傷故也不得概以火論澀脈往來艱澀如刀刮竹陰也此陰字非陰寒也血主陰澀乃血少之象外感澀而緊數為寒燥搏束主身熱無汗或皮膚刺痛或咳嗽不爽胸臆牽疼內傷澀而弦數為血燥陰傷男子傷精婦人不孕多由七情不遂營氣耗傷血無以充氣無以暢在上有上焦之不舒在下有下焦之不運在外有筋脈之拘攣麻痹枯痿在裡有風勞蠱膈瘰癧內疽乳岩癥瘕等證總之皆血虛化燥由燥而結由結而堅致成乾澀內著之候弦脈彈指如張弓弦按之有餘陽中陰也仲景謂弦為陰脈陰非寒也乃病伏於裡之說觀下諸病便知弦而滑大病在陽在外弦而細澀病在陰在內外病為痰飲蓄水陽中伏陰或眩暈嘔酸或胸脅疼脹或為瘧痢痹疝瘧脈多弦弦為飲邪飲即濕也飲伏胸脅少陽部位阻遏清陽故脈多弦世認弦為少陽風邪又不盡然內傷為水虧木熾木強土弱為虛勞寒熱類中偏枯噎膈蠱脹等證凡人臟腑得胃氣所及則五臟皆和見肝木相侵則五臟俱病蓋以木之滋生在水培養在土若木氣過強則水土皆敗而且水又為肝陽所耗土轉被木賊而傷腎為精血之本胃為水穀之源根本受傷生氣敗矣所以木不宜強也故凡病脈見和緩者順見弦強者逆見弦甚者死為其臟陰已盡故也觀內經真臟脈見即與之期日可知芤脈浮大中空按如蔥管為孤陽脫陰之候主陰虛發熱失血脫血頭暈目眩驚悸怔忡喘急盜汗氣無所歸血無所附芤雖陽脈而陽實無根大虛之兆緊脈急疾有力堅實搏指陰多陽少乃陰邪擊搏之候主寒燥主痛緊數在表為傷寒發熱無汗頭痛項強等證或為痹為瘧沉緊在裡為心脅疼痛胸腹脹滿為中寒逆冷瀉痢陰疝痃癖等證在婦人為氣逆經滯在小兒為寒燥搏束生痙之候緩脈四至從容和緩浮沉得中胃氣衝和是為平脈必兼他脈乃可斷病緩而滑大多主實熱緩而遲細多主虛寒然實熱必緩大有力或為煩熱脹滿二便不利或為癰瘍或傷寒溫病愈後餘熱未清亦多有此脈虛寒必遲緩無力為陽虛畏寒氣怯眩暈痹弱痿厥飧泄疼痛精寒腎冷小便頻數等證在女子為經遲血少氣不統血等證凡病但得緩脈易愈以其未失沖和之氣故也結脈脈來忽止止而復起舊訣以數來一止為促促脈為熱為陽極緩來一止為結結脈為寒為陰極浮結為邪在表沉結為積聚在裡促結二脈又通謂為氣血痰食積聚癥瘕七情鬱結等證又動而中止不能即還良久復動動而復止止有常數為代主五臟無氣為呼吸存亡之候又為女胎三月衝任惡阻往往脈代不主於病觀舊訣所云是以結促為實以代為虛也以余驗之又不盡然暴病見結促代脈多主中有留滯鬱結等證久病見促結代脈多主憂思氣結血結使然但緩而結者多陽虛數而結者多陰虛代脈為氣血衰殘力不接續更屬虛極緩者猶可數者更甚代者尤劇此可以結之微甚察血氣之消長故總謂之結脈又有無病而一生見結脈者此稟賦之異也不可不知伏脈若有若無附骨乃見或火閉而伏或寒閉而伏乃一時陰陽潛伏阻塞氣機之象主霍亂痛極疝瘕閉結食滯水飲怒忿厥逆等證有心腹痛極而伏者有氣逆於經脈道不行而伏者有偶因氣脫不相接續而伏者然必暴病暴逆乃有之開其閉而脈自復矣若積困綿延脈本微細漸至隱伏者乃爐火將絶之兆安得尚有所伏哉虛脈無力無神經所謂按之不鼓是也浮而無力為血虛陰氣不內營也沉而無力為氣虛陽氣不外鼓也洪數無力為陰虛陰不潛陽也遲細無力為陽虛氣不化精也陰虛則金水虧傷龍雷易熾而五液神魂之病生焉或喘咳勞熱或驚悸盜汗或失血夢遺陽虛則火土氣衰真元日損而君相化源之病生焉或頭目昏眩嘔吐亡陽或胸膈脹滿泄則腹疼或溺有餘瀝寒精自滑救陰者壯水之主以制陽光救陽者益火之原以消陰翳漸長則生漸消則死實脈舉按皆強鼓動有力為三焦壅塞之候表邪實者浮大有力里邪實者沉小有力火邪實者洪滑有力寒邪實者沉緊有力然實脈有真有僞真者實而聚僞者實而散辟辟如彈石散亂如解索乃肝腎真臟脈也非實也須兼形證察之庶幾不誤凡此皆脈之有真有僞不可不辨者也試再言常變浮而無力為陽虛常也然陽虛者必反見陰脈陽愈虛脈愈沉細此真陽不能鼓舞也如沉極而反浮是微陽欲脫之兆若得補藥漸浮而僅得之中候乃為吉象倘忽然而浮浮而短澀無根是肺之真臟脈見浮而散大無根是心之真臟脈見陽將脫矣汗出如珠不流乃死沉而無力為陰虛常也然陰虛者必反見陽脈陰愈虛脈愈浮數此真陰不能潛陽也如浮極而轉沉是真陰將絶之兆若得補藥漸沉而僅得之中候乃為吉象倘忽然而沉沉而欲絶知陰將脫矣色黑黃不澤乃死暴病脈當有力而反模糊不清者此邪遏於內也非虛也其有沉弱細微至數分明者此正不勝邪也久病脈當柔軟而反弦澀細數者此真陰欲涸也浮沉辨表裡常也然沉脈亦有表證浮脈亦有里證凡察外感當以緊數與否為辨蓋表寒主收引脈皆緊數而浮溫熱從里發脈多緊數而沉更有脈息素小之人見似緊非緊較平日稍為滑急者即是外邪又有邪輕者或初起未甚者亦多如此是又不可不兼證察之若其脈緊急太甚和緩全無脈雖浮大自非表邪凡辨內傷見甚浮甚沉甚遲甚數甚大甚小甚微甚實皆是勞傷之候但漸緩則有生意若弦甚者病必甚數甚者病必危弦細再加緊數則百無一生以無胃氣故也又有始也為浮為大為滑為動為數五陽脈繼也反沉反弱反澀反弦反遲五陰脈此由表入里由腑入臟之機其病也進始也為沉為弱為澀為弦為遲繼也微浮微大微滑微動微數微字宜玩五陰脈雖喜轉陽若忽然暴見又是脫象此由里出表由臟出腑之機其病也退又有脈體本大而更加洪數此邪氣日甚也其病也進脈體本小而漸至緩大此胃氣將至也其病也退又有五陽脈終為陽而始為有力之強陽繼為無神無氣之微陽知陽將絶矣五陰脈雖喜變陽若忽然暴見知陽不附陰孤陽飛越反照之不長餘燼之將滅也又有不以部位拘者如諸弦皆屬肝脈諸洪皆屬心脈諸軟皆屬脾脈諸浮皆屬肺脈諸沉皆屬腎脈是也又如頭痛一證脈應在寸常也若少陽陽明之痛則不候之寸而候之關太陽里邪蓄水之痛又不候之寸而候之尺遺淋等證脈應在尺常也若氣不攝精心為熱灼又不候之尺而候之寸又如六脈中有一脈獨乖者即當於獨乖之一脈求之景嶽所謂操獨見也又有素大素小素陰六陰素陽六陽之脈此稟之先天非病也病則脈又不同矣總之脈以胃氣為本經曰脈弱以滑是有胃氣又曰邪氣來也緊而疾穀氣來也徐而和夫穀氣胃氣也胃氣為氣血之本原故無論何脈但得兼而軟滑和柔之象便是有胃氣雖病無危若今日尚和緩明日更弦急知邪氣之愈進今日甚弦急明日稍和緩知胃氣之漸至頃刻之間初急後緩者胃氣之來也初緩後急者胃氣之去也察邪正進退生死一以胃氣為主則得所指歸矣然又有一切痰脈不能以常情論者王中暘曰痰滯氣機往往脈見蝦游雀啄代止之形頃刻之間時有時無時大時小或尺寸一有一無或關上不見或兩三路亂動有素息多痰不時而然者有忽然而然者有僵仆卒中而然者皆非死脈也凡此皆其變焉者也知常知變乃可與言診且夫辨真僞察常變固貴求諸博而審病因觀進退決死生又貴返諸約蓋以天地不外陰陽陰陽不外燥濕春山先生分剛柔圓遏神氣六字看法最妙病有燥濕脈有剛柔病有進退脈有圓遏病有死生脈有有無神氣學者以剛柔圓遏神氣六字為綱以諸脈為目則由博返約綱舉而目張矣剛脈者即古所謂弦緊動澀牢革諸脈是也按之有尖滯彈指之象主陰虛之燥病凡物少雨露滋培勢必乾澀人少血液灌溉亦必乾澀有同然也故以剛脈屬陰虛化燥之病柔脈者即古所謂濡緩濫滑微細諸脈是也按之如絲線濕泥柔軟之象主陽虛之濕病凡物少風日暄動勢必軟濫人少火土蒸運亦必軟濫無二理也故以柔脈屬陽虛化濕之病夫陰陽以氣言剛柔以質言脈為血脈有氣有質者也故欲知陰陽之氣須辨剛柔之質不獨內傷為然也外感亦然但外感以剛柔二字審病因以圓遏二字觀進退剛而遏者為燥邪柔而遏者為濕邪再以浮中沉三候以察邪之淺深自有心得此皆氣血為邪所阻不能循其常席一遏字足以賅之暑濕之氣溫病即暑濕熱三氣夾雜之邪從口鼻吸受病發於內脈必似數似緩或不浮不沉而數或濡緩模糊至數不清皆遏象也至於風無定體者也兼寒燥者緊數而浮兼暑濕者濡緩而浮風為陽邪故脈兼浮火無中立者也六氣皆從火化化火在經在氣分脈必洪緩化火入胃腑與渣滓相搏脈必沉實而小甚則沉微而伏實而小微而伏亦遏象也逮里邪既下脈轉浮緩而不沉遏日內必得汗解若汗後脈仍沉數者邪未盡也汗後脈轉浮躁者邪勝正也汗後必身涼脈靜乃為邪盡夫靜者沉細之謂然脈雖沉細而至數分明與前之澀滯模糊者不同數日內食進虛回則脈轉圓浮矣圓脈與遏脈反遏者病邪遏伏也圓則氣血通調精神貫注何病之有昔人以胃根神三字為診家妙訣高鼓峰以脈圓為病愈此圓之一字又得胃根神三字之神髓矣夫胃根神三字猶不甚確蓋有胃即是有神和柔輕緩勻淨分明如雞踐地從容不迫所謂胃氣者如此所謂脈貴有神者亦如此至根字之說古人以沉候為根又以尺部為根中之根歌曰枝葉雖枯槁根本將自生診危證之脈必求根以為斷然以沉候尺部為根仍未得根中之氣嘗見五臟絶脈惟肺絶脈如風吹毛空而無根其他臟絶脈沉候尺部皆按之鼓指分外堅搏如彈石如循刀刃如雀啄如操帶鉤皆無神而有根者也然有根而亦死者何也蓋猶木根深入地中而死者不得氣故也夫木根雖下垂而根上旁須四面旋繞得四方之土氣氣盛方能旁見側出枝葉四布人之脈隱於肌肉之內不但下至尺深至筋骨亦必按之中間與肌肉相連一片如是則氣血交紐營衛未離謂之有氣有氣便是有根嘗見陰虧之輩以及年高之人其脈若獨然一條扛起似與肌肉不相連絡陰與陽分是謂無氣萬物非氣不能融貫通連故言根不若言氣言胃不若言神心主神肺主氣神氣二者非脈之大原者哉內傷大要論內經論內傷首言七情曰怒傷肝悲勝怒金勝木喜傷心恐勝喜水勝火思傷脾怒勝思木勝土悲傷肺喜勝悲火勝金恐傷腎思勝恐土勝水此七情之病還以七情治之也又曰百病皆生於氣怒則氣上怒則氣逆甚則嘔血及飧泄故氣上喜則氣緩喜則氣和志達營衛通利故氣緩若喜失之太過則心氣又渙散不收矣悲則氣消悲則心系急肺布葉舉上焦不通營衛不散熱氣在胸中故氣消恐則氣下恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣下驚則氣亂驚則心無所倚神無所歸慮無所定故氣亂勞則氣耗勞則喘息汗出內外皆越故氣耗思則氣結思則心有所存神有所歸正氣留而不行故氣結寒則氣收熱則氣泄寒則腠理閉氣不行故氣收熱則腠理開營衛通汗大泄故氣泄指外感言治法不外急者緩之甘散者收之酸抑者散之辛驚者平之酸甘鎮攝勞者溫之甘溫損者益之甘平結者散之辛潤寒者熱之熱者寒之之類難經論五勞謂自上損下者一損肺咳嗽二損心盜汗三損胃食減便溏四損肝善怒筋緩五損腎淋漏過胃則不治自下損上者一損腎遺濁經閉二損肝脅痛三損脾食減脹瀉肌消四損心驚悸不寐五損肺咳喘過脾則不治又曰損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精金匱謂肺勞損氣心勞損神脾勞損食肝勞損血腎勞損精與難經同義後人又於五勞推為六極六極者數轉筋指甲痛為筋極牙疼踵痛足痿不耐久立為骨極面無華色頭髮墮落為血極膚如蟲行體肉乾黑為肉極肌無膏澤目無精光羸瘦肌癢搔則為瘡為精極然則內傷首言七情者原病之所由起也分言五勞者明病之所由起所由傳也推言六極者窮病之所至極也一言以蔽之不外精氣神三者而已矣且夫精也氣也人身之一陰一陽也神者又貫乎陰陽之中相為交紐者也請徵諸天地天一生水水降於下其濁者凝而為土以成地地所生之草木為地毛石為地骨金為石之君亦地骨之類火雖生於地實即天之陽氣蘊蓄於地中者是天地者太極一氣之所化也水為天之精火為天之氣而水火默運於天地之間時行物生終而復始又為天地之神是天地者亦精氣神一氣之所生生化化者也天之神氣依地以為基人之神氣依形體以為歸宿故朱子謂太極為陰含陽邵子謂陽為陰之父陰為陽之母凡此皆言根陰根陽相為交紐而不可須臾離者也以人言之人身囫圇一個形軀稟父母之精血凝結而成猶水之澄清在下其濁者凝聚為土以成地體水為天一之原水即人之天也金為水源水天本一氣也故天與水隔則為訟水行天上則為需水之濁者凝而為地是地本水之渣滓凝結而成故人後天生於先天其形質皆為水類內外百體皆賴水養而火即寓於水之內包地之內外皆天氣也包人之內外皆陽氣也天之陽氣蘊蓄於地中人之陽氣蘊蓄於腎中天之陽氣天心默運於宇宙之間人之陽氣人心默運於形體之間人具百體心生最先西學謂妊胎二十日心已成模百體先死心死最後心本血結而成血為水類腎為先天心尤為先天心於卦為離離即先天之乾乾為天心即天也夫人形體皆屬陰物只有心中一點真陽得之有生之始以為本性之靈明生生之化機所謂真陽者心之神也經雖有心藏神肺藏魄肝藏魂脾藏意腎藏智水性活潑故主智之分而要皆心之所之而有所主者也雖有喜傷心悲傷肺怒傷肝思傷脾恐傷腎之分而要皆心之動而有所纍者也觀大學心有所忿𢜀云云便知古歌云別有些兒奇又奇心腎原來非坎離此以身為坎為地以心之神氣為離為天春山先生曰夫人日間為人事紛擾神氣外用不能內交心身是為否否者疲也否則為未濟夜間安寐如萬物歸根神氣來復內交心身是為泰泰者安也安則為既濟是為外坎離人能動靜交相養使神氣常交於心身則真陽之氣依形軀之陰以為歸宿心身之坎離交而心腎之坎離自斷無不交之理陰陽交則平不交則病相離則死故曰內傷百病不外精氣神三者而已矣精氣神三者又不外神氣與精交與不交二者而已矣請析言之勞力者傷氣經所謂汗出喘息內外皆越勞則氣耗是也氣耗則陽虛陽虛必生內寒內寒必生內濕虛則氣浮脈多浮虛豁大又或陽虛氣陷按之不鼓沉細無力故仲景謂脈虛為勞脈大亦為勞見證多怯寒少氣自汗喘乏頭眩心悸食減無味腹脹飧泄吞酸噯腐面黃而浮反不覺瘦或蒸蒸發熱必兼體倦自汗甚至中虛不運不能砥柱中流虛熱上浮吐血成碗面黃舌淡而無熱象此等虛熱用勞者溫之之法如建中保元歸脾之類分輕重用之所謂形不足者補之以氣是也尤須息勞靜養復其耗散之氣自可就痊否則陽虛不復傷及真陽陽痿精寒寒精自滑吸短偏臥又須加溫潤甘平及血肉有情諸品如枸杞沙苑菟絲蘆巴制首烏山藥扁豆破故鹿膠羊腎淡菜海參之類填補陰中之陽以固脾胃又或陽傷及陰氣不化精濕轉為燥脈變短數潮熱骨痛上咳下利此自上損下由肺及腎者也若過胃泄瀉則治療難矣另有一種勞力傷氣之病因一時負重偶然傷力氣逆於上胸脅疼痛甚則呼吸亦痛咳嗽帶紅此等傷氣宜用結者散之之法如蔞皮大貝紫菀杏仁枇杷葉輕降肺中逆氣吐紅加蘇子三七汁鬱金汁懷牛膝丹參藕汁之類辛潤以化之與肺勞損氣治法不同若勞心者傷神又重於勞力傷氣者也或卷牘煩劇或百計圖謀心神無片刻之靜心體無安養之時由是君火內沸銷爍真陰不但傷神並能傷精陽不依陰自陰不潛陽陰虛必生內熱內熱必化內燥脈多細澀甚而數澀或浮弦搏指皆陰虛化剛之象見證多驚悸怔忡心熱盜汗虛煩不寐甚則君火引動相火傷及真陰乾咳吐血遺滑淋濁骨蒸潮熱諸證叢生此亦自上損下由心及腎者也治法必以甘涼育陰及血肉諸品填補精液如補心固本復脈生脈三才六味二至二仙五陰之類隨其輕重用之所謂精不足者補之以味是也尤須安心靜養以後天真陰招攝先天真陽俾心陽下交於腎腎陰上交於心陰平陽祕乃克有濟更有七情傷神之輩為害尤甚嘗見情志怫鬱悲憂思慮過度心陽鬱結而肝脾肺之氣亦因之鬱結肝葉撐張則為脹為痛多怒多煩脾不輸精肺不行水則生痰生飲噯腐吞酸食減化遲大便作燥不燥則瀉在初起時宜用抑者散之之法夫散非發散之謂亦非辛香破耗之謂如逍遙散法不用散而用湯減去白朮借柴胡之微辛以達之酌加蔞皮薤白貝母杏仁柏子仁當歸酸棗仁遠志生穀芽之類辛潤以開之諸仁皆陰中含陽生機內寓最能調暢心神或再佐牡蠣決明龜板鱉甲之類咸柔以軟之桑葉叉斛之類微苦以清之稍久則氣結者血亦結或納穀不順或大便燥結或咽中作梗俗名梅核氣此噎膈將成之候又須加阿膠肉蓯蓉枸杞蔗汁梨藕汁牛乳白蜜韭汁薑汁之類甘潤辛潤咸潤以流暢之尤須怡情靜養庶可獲效乃世俗治法往往見其氣結即用香附元胡木香砂仁青皮厚朴烏藥諸燥藥以為辛香流氣不知此無形之結由於太虛之體默運無權遂至窒礙不通豈有用辛香破耗之藥重傷氣血而能轉為流暢之理且結則營衛澀滯氣不運水必然生痰生飲或雖見自利而艱澀不爽此皆因結而燥因燥而濕之見證與陽虛化濕者有霄壤之分又豈有用溫燥之藥而能治因燥致濕之理往往愈治愈結脹痛日增氣血益虛默運之權益窒由是成膈成蠱成勞不治者多不觀諸內經乎曰二陽之病發心脾有不得隱曲女子不月其傳為風消傳為息賁者死不治夫二陽胃也發心脾者謂二陽之病發於心脾者也思為脾志實本於心故張雞峰謂噎膈為神思間病心脾氣結飲食漸減病及二陽陽明為多血之經血乃水穀之精氣賴脾氣以散輸奉心君而化赤今心神受傷困及其子飲食不嗜生化無資衝脈上隸陽明陽明虛則血海沖為血海乾澀是以不月觀女子不月而男子少精可知血虛則生熱熱爍則化燥肌肉乾瘦如風消物故曰風消心火無制上爍肺金金燥則不能運布水精以歸正化津液留於胸中變為痰飲咳嗽不已傳為息賁氣奔迫而為喘也何治之有此郁損心脾化燥之一端也若悲怒恐驚更易耗傷心腎肝膽精血尤宜大劑潤養佐以鎮攝神志最忌耗散破削致之不救又見悲憂思慮過度郁損心神心主血諸脈皆屬於心心氣結而諸脈中營氣自不能循其常度將見始也氣結既也血結結則隧道拘攣往往腹中有硬塊成形之患肝膽經脈所過部位有瘰癧成串之患甚有生乳岩結核內疽附骨對口發背等證體干故堅硬內附筋骨故不紅腫血燥故潰後少膿肌肉堅硬故潰後生管甚則成硬弦多骨之類皆剛象也皆燥徵也與濕熱凝於肌肉外生癰腫易潰而多膿水者不同凡人膈膜以上屬天氣頭為諸陽之會背為陽中之太陽凡對口發背偏枯痿痹之類多屬燥病推原其故多由郁損心神耗及肝脾腎陰所致又或因吸受天之燥邪而發或因貪食煎煿及金石桂附諸燥藥而發經曰熱中消中不可服膏粱芳草石藥石藥發癲芳草發狂不可不知以上諸證皆當以養營潤燥為主佐辛潤以流氣參咸柔以軟堅投劑即安屢驗不爽勿以脈絡拘結為癥瘕妄用攻堅破積勿以瘰癧為痰核妄用行氣消痰勿以內疽為陰寒證妄用辛燥破削夫古人陰疽之稱謂其結於血分也非謂其為陰寒也或曰寒則凝滯冬月水澤腹堅非寒結乎曰必水少而腹始堅未有長江大河而腹堅者且寒與燥同源嚴寒乾結之氣即是燥邪故冬月地多堅白坼裂堅為剛象而非柔象此固理之顯見者也試觀王洪緒外科全生集中陽和二方以大劑熟地鹿膠潤補為主借芥子之辛潤流通營氣熟地與麻黃並用麻黃僅用十分之一藉以輕達衛氣因血結日久陽氣不得行於其間故稍佐薑桂之溫薑桂氣溫熱而體微潤在其人無熱證者服之神效若稍見熱證則又宜速去薑桂矣凡此皆郁損心神由氣及血化成燥證散見於內外者也若是者心為君主之官顧不重哉若勞色傷精之輩更有甚焉者先動心以傷神既勞力以傷氣終縱情以傷精傷精則陰虧陰虧則易動相火愈動愈傷一旦精神氣三者皆耗多致不起脈證較勞心傷神者更重治法亦不外填補真陰但久則陰虛不復真陰不能招攝真陽真陽即不能歸附真陰由是龍火上炎一火興而五火熾滿腔皆虛陽充塞而見顴紅面赤喉干咽痛咳喘音啞五心如烙筋急痠疼骨痛如折上咳下利種種危證古法往往見龍雷飛越用知柏苦寒直折非徒無益於真陰而又戕害乎脾胃春山先生曰龍雷為水中之火春夏濕升水旺之時龍雷多動雨勢愈大電光愈騰必得西方風起天之燥氣下降龍雷乃藏介類稟乾金之燥氣得坎水之陰精滋陰潛陽較勝於丹溪用知柏多多矣古法又有用桂附六味以為導龍歸海在陰不甚虛者或陰虛夾寒濕者暫用有效若陰液大虧之人再以剛燥耗陰受其害者多矣或曰景嶽先生云丹田暖則火就燥下元固則氣歸精甘溫能除大熱又何不可用之乎曰是也夫陰中之陽如溫泉之氣試觀溫泉之氣其為燥陽之氣乎抑為霧露之溉乎春日陽從地起太和元氣且溫且潤故草木得之含液而萌芽腎氣亦猶是也知此則當揀體質溫潤者用之質潤屬陰氣溫屬陽方與腎之本體相合許學士云補腎不若補脾夫補脾非燥脾之謂凡甘平甘淡皆能補脾孫真人云補脾不若補腎夫補腎非涼腎之謂凡清潤溫潤平潤而味甘者皆能補腎中之脾胃補脾補腎原兩不相礙也草木有汁則長青而不枯人有液則長濡而不燥欲作長明燈須識添油法古人豈欺我哉此治內傷大法也然內傷藉資藥石以無情之草木療有情之形軀猶落下乘古稱真心為大藥又有以心醫心之法乃是最妙上乘蓋七情五勞惟勞力傷氣者由辛苦而成高年虧損者由衰老所致此外無不由心火妄動耗散真陰而起經曰君火以明謂其無形無質寂然不動感而遂通也相火以位謂宜安其位而不出也火生於天而成於地金木水土中皆有之但靜則不見動之則生靜中之火自然之火能生萬物經故曰少火生氣動中之火搏擊之火能害萬物經故曰壯火食氣相火安位則不病心君引動則為病不獨房勞能引動一切人事煩勞皆能引動動則心病心病則神病神病則形病人身一個囫圇形軀百脈相通內外貫徹斷無此虛彼實之理不過略有先後輕重之分故神形每相繼為病心腎真陰即被煎熬而津精涕唾氣血液七般陰物以及形體之陰無一不被煎熬陰傷則病陰盡則亡相火無所歸附隨君火同去而死矣悲夫世之患內傷者趁此陰陽未離早用養心功夫孟子曰養心莫善於寡欲蓋寡欲則心虛虛則靈靈則生神神生氣氣生精精生形常人由形生精精生氣氣生神賴後天之真陰招攝先天之真陽此由神生氣氣生精精生形本先天之真陽以復後天之真陰蓋返還之道也嘗見養之日久神與形交坎離既濟遍身骨節歷歷有聲百脈既通百病自愈一息尚存皆可覆命不獨內病全消即外邪亦不為患一心療萬病不假藥多方古人之言洵足信也或曰孩提之童亦有不足之病豈亦由心生乎然赤子雖無心良由父母氣質薄弱胎元早已有虧況今元會氣薄少年知識早開往往童子之病亦多自心始汪訒庵先生云小兒喜怒悲恐較之成人更專且篤不可不察人果能寡欲清心喜怒哀樂情不妄發由是致中致和天地位而萬物育豈徒為一身卻病延年計乎聖賢誠意正心學問在此修身俟命功夫亦在此然則養心之學其所繫豈淺鮮哉濕氣論蓋聞坤土主濕濕土寄旺四季而春夏為甚季夏為尤甚人知避風寒不知避濕能避風寒不能避濕者以風寒傷人顯而急濕傷人隱而緩隱則莫見而受之也深緩則不覺而發之也遲濕生於土本氣屬陰陰為寒濕後乃漸化為濕熱然陰氣必得陽氣而後升所以盛夏熱甚濕生萬物皆潤溽暑蒸淫自下而上升於太虛為雲霧雨露則濕之化氣又為陰中之陽陰中之陽為濕熱為溫病濕熱溫病固同氣異名者濕熱為病濕與熱猶分為二溫病濕與熱直合為一濕中有熱熱中有濕濁熱黏膩故謂之溫治之者須要分別為本氣為化氣為分邪為合邪為外感為內傷於外感中又須分別兼風兼寒兼暑之因於外感內傷中又須分別濕多熱多化燥化火之變傷人身天氣地氣之次第入氣分血分之淺深大抵濕之化氣多從上受邪自口鼻吸入故先傷天氣次及地氣經曰傷於濕首如裹又曰濕上甚為熱是也濕之本氣多從內受總由脾腎陽虛不能化水所致故先傷地氣後及天氣經曰諸濕腫滿皆屬於脾又曰腎主水腎為胃關關門不利故聚水而從其類是也濕之本氣又或從外受下受傷天氣並及地氣經曰風濕之傷人也氣血與邪並客於分腠之間寒濕之傷人也皮膚不收肌肉堅固營血澀衛氣去又曰陰受濕氣又曰傷於濕者下先受之又曰地之濕氣感則害人皮肉筋骨是也夫皮膚肌肉經絡筋骨雖有形質屬地而其空竅之運行實皆天氣主之此天包乎地之說也界乎人身天地之間者則有膈膜膈膜之下肝膽布焉三焦右腎旁三焦腑之經脈行焉相火寄於肝膽濕邪傷肺脾胃之表肺之表皮膚也脾之表四肢也胃之表肌肉也表屬氣分故多兼少陽膽與三焦病濕邪傷肺脾胃之裡里屬血分故多兼厥陰肝病蓋以肺與脾胃為濕熱鬱遏則天氣不得清肅下降地氣不得承順下行肝膽三焦適當其沖上下為邪所阻不得遂其條達之機其所寄之相火必與濕熱同升為病而見寒熱往來耳聾口苦乾嘔脅痛停飲膈痛等證居乎人身前後之間者又有膜原膜原前近胸腹後近腰脊即上中下三焦之沖衢人身半表半裡之中道也蓋濕土鬱蒸之氣濕中有熱熱中有濕其穢濁黏膩之邪由地而上從口鼻傳入直趨中道流布三焦故膜原為藏邪之淵藪伏邪多發於此焉邪傷毛竅經絡之表與臟腑之裡皆隨感隨發惟膜原空隙如夾牆腹裡一般最易藏邪逾時乃發名曰伏邪溫伏邪也金之劉守真論溫病主三焦明吳又可又於三焦中揭出膜原膜原本自靈樞經二公之論皆獨超千古伏邪往往因風寒而發得藥開通肺氣在經之邪從汗而解暫覺病退而半日一日之間忽然轉重此無他膜原濕熱互釀之邪從中而作斯時也必視其所傳而藥之傳表則從汗解邪氣遏伏重者則從斑疹解傳裡則依附胃腸糟粕必從大便解濕為濁邪以濁歸濁故傳裡者居多藥之邪退遲一二日復作復傳反覆循環往往經屢下而邪始盡吳氏又可所謂九傳是也其進鋭者其退速其進緩者其退遲在春夏發者退速在秋冬發者俱遲愈期速者兩候五日為一候三候遲者五七候不等凡溫病及伏暑晚發暑濕瘧痢多見如此虛者尤甚請析言之濕之化氣為陰中之陽氤氳濁膩故兼證最多變遷最幻愈期最緩其見證也面色混濁如油膩口氣濁膩不知味或生甜水舌苔白膩膜原邪重則舌苔滿布厚如積粉板貼不松脈息模糊不清或沉細似伏斷續不勻脈為邪遏有似虛寒之象誤治為害非輕神多沉困嗜睡斯時也邪在氣分即當分別濕多熱多濕多者無煩渴熱象天氣為濕阻遏不能外達下行則必凜凜惡寒甚而足冷頭目脹痛昏重如裹如蒙身痛不能屈伸身重不能轉側肢節肌肉疼而且煩腿足痛而且酸胸痞者濕閉清陽道路也午後寒熱狀若陰虛者申酉戌時金氣主令又濕邪本旺於陰分也小便短澀黃熱者肺不能通調水道下輸膀胱天氣病地氣因而不利也大便溏而不爽或濡瀉者肺與大腸相表裡心與小腸相表裡天氣病地氣因而不調也治法總以輕開肺氣為主肺主一身之氣氣化則濕自化即有兼邪亦與之俱化濕氣瀰漫本無形質宜用體輕而味辛淡者治之辛如杏仁蔻仁半夏厚朴藿梗淡如苡仁通草茯苓豬苓澤瀉之類啓上閘開支河導濕下行以為出路濕去氣通布津於外自然汗解經曰水鬱折之謂水上泛折回而使之下也賈真孫曰治濕不利小便非其治也兼風者汗出惡風兼寒者惡寒無汗前法酌加蘇梗桔梗豆豉蔥白生薑之類邪在經絡一身掣痛酌加桂枝水炒防己秦艽之類以開毛竅經絡之壅兼暑者面赤口渴心煩前法去蔻仁酌加扁豆花鮮荷葉清香闢穢連翹山梔滑石輕清微苦淡滲以解暑濕熱之結熱多者及濕熱合邪病溫者前論氣色苔脈諸證畢見更加神煩口渴亦用前辛淡法酌加蘆根淡竹葉滑石輕淡辛涼之類清金泄熱肺得清肅之權自能化濕熱於無何有之鄉肺是人身天氣天氣下降濁邪焉有不降之理或從汗解或從小便解濕熱內郁時溺赤而清濕熱下注則溺赤而渾濕熱治肺千古定論也余氏春山曰陽為濕鬱不能外達下行每見惡寒足冷若拘傷寒惡寒之說投以溫散其寒反甚但用蘆根燈草甘淡通陽利竅滾煎熱服下咽即覺熱從外達津津汗出而解屢驗不爽此其證也其有初起神煩而昏者此濕熱鬱蒸過極內蒙清竅前辛涼淡法去蔻仁厚朴加細辛二三分白芥子錢許辛潤行水開閉合之蘆根滑石等味輕清甘淡泄熱導濕矇蔽即開亦屢驗不爽若初起神智模糊不能言語舌苔白膩無熱象者此寒燥之氣搏遏水濕內蒙清竅急用辛開淡滲法如杏仁牛蒡桔梗芥子細辛通草茯苓澤瀉之類其辛香辛燥升散諸品切勿沾唇即生薑辛潤不燥亦不可用以其性升故也紅糖甘緩填中糜粥濃厚膩邪均在禁例愈後亦須忌一二日此病與痧麻霍亂治法宜忌皆同其大便不利者用蔞皮薤白辛滑流利氣機氣機一開大便自解即汗亦自出隨證均可加入假使不知濕家忌汗忌升汗則亡陽升則上蔽閉證忌燥忌升燥則閉而且結升則蒙而益蒙誤以頭身疼痛惡寒無汗隱疹而用升散如薄荷蘇葉荊芥防風羌獨活等味誤以濕蒙清竅痧麻霍亂諸閉證而用藿香葉香薷佩蘭葉蔻砂桂姜等味升散走竄香燥濁烈則是濕熱之氣本是蒸騰最易矇蔽而藥復升之燥之必致未閉者閉已閉者益閉輕則多言譫語重則神昏煩躁內竅閉極則目瞑不言目睛頻轉亦必致肝膽三焦少火化為壯火耳聾乾嘔甚則痙厥又必致邪走皮膚肌肉發疹發斑茲不具論論其化熱其化熱也氣分邪熱郁遏灼津尚未傳入血分面色紅黃黑混口氣穢濁舌苔黃膩舌之邊尖紅紫缺津或底白罩黃混濁不清重者厚而且滿板貼不松脈息數滯不調神煩口渴濕邪化熱多見此象濕熱合邪病溫初起時亦見此象宜用前辛涼淡法加以微苦如連翹山梔之類或加姜水炒木通之苦辛內通外達表裡兩徹以冀汗解濕熱交合加半夏姜水炒黃芩重者加姜水炒黃連三四分苦辛通降漸欲化燥加知母清滋肺金肺氣為濕熱鬱蒸不能敷布水精外達下行必見煩渴多汗斑疹停飲等證如熱汗時出大渴引飲輕者用前辛涼微苦法加花粉銀花之類重者用白虎湯辛涼重劑清肺泄熱虛者加南沙參蓋濕熱清肺如溽暑炎蒸金風驟起頃刻濕收熱退如登清涼界中其邪走皮膚髮疹邪走肌肉發斑隱隱不見者用杏仁牛蒡桔梗蔞皮大貝銀花連翹淡竹葉通草之類辛涼開達最忌多用辛燥如蘇葉薄荷荊芥柴胡之類斑疹已出熱重者用白虎湯酌加元參銀花蘆根以化之其飲停胸膈者必見胸膈悶痛心煩乾嘔渴欲飲水水入則吐等證斯時須辨舌苔如舌苔白膩則屬飲重熱因飲鬱而生宜辛淡化飲辛能行水辛潤又不爍津加芥子最妙重者加細辛二三分尤妙淡如通草茯苓豬苓澤瀉苡仁之類或用五苓散清淡如滑石淡竹葉蘆根之類如飲熱並重濕熱與氣互結舌苔黃膩宜苦辛通降佐以淡滲如小陷胸湯半夏瀉心湯去參草大棗以薑汁炒芩連代乾薑加通草茯苓栝蔞皮薤白等味黃芩滑石湯杏仁滑石湯黃連溫膽湯均可選用濕熱遏郁肝膽三焦經脈耳聾乾嘔者亦宜用上法苦辛開化脅痛及欲痙者加鱉甲石決明牡蠣以咸降之既能柔肝又能化濕兩不相悖邪傳心包神昏譫煩亦須辨舌苔如舌苔黃膩仍屬氣分濕熱內蒙包絡與前同一病因宜用半夏瀉心陷胸等湯或用杏仁芥子姜水炒木通鹽水炒黃連連翹滑石蘆根淡竹葉栝蔞皮之類辛潤以通之鹹苦以降之清淡以泄之其濕熱濁邪自化其閉自開涼膈散亦可間用妙在用散寧上丸普濟丹亦效更有邪傳包絡化燥傷陰神昏譫妄舌赤無苔此證與前證同一神昏而虛實相反前系舌苔黃膩濕熱明徵此係舌赤無苔傷陰確據斯時用藥最要空靈神昏為內閉之象閉則宜開心宮乃虛靈之所虛則忌實宜犀角鮮地黃連翹銀花鬱金鮮石菖蒲蘆根梨汁竹瀝和薑汁少許滾煎熱服再用寧上丸或普濟丹開閉養陰較牛黃至寶尤勝地黃用鮮者取其滑利少加薑汁涼藥熱飲取其流通此即陰陽開闔之理蘆根尤宜多用輕清甘淡兩清金水又能泄熱化濕從膀胱而解如此治法斷無不效之理心宮之邪本屬鬱蒸之氣無質無形最忌一派苦寒冰伏陰柔濁膩如三黃解毒三黃地冬犀角地黃清營清宮等湯集而用之有闔無開毫無方義今時習俗尤誤於溫病傷陰之說不知氣分熱鬱灼津之理每見舌絳便用大劑陰柔是濁熱已遏上焦氣分又用濁藥兩濁相合逼令邪氣深入膏肓深入骨髓遂成錮結不解之勢又或舌苔黃膩明系氣分濕熱熏蒸法宜苦辛開化乃不用開化而用大劑涼藥如三黃白虎三石玉女煎之類有闔無開亦足逼令邪氣深伏邪伏則胃氣不得上升舌苔因之亦伏轉成舌絳無苔見其舌絳無苔又用犀角地黃清宮增液諸湯更令邪氣深伏藥愈清滋舌肉愈燥愈赤愈黑甚至音啞神昏竅閉斯時若邪在心包勢必閉而益閉變在須臾若邪在膜原中道又必逼令下傳肝腎銷爍真陰陰涸乃斃變期稍緩二者均屬難救於難救之中而求救法其邪閉心包者酌用連翹銀花蘆根梨汁竹瀝薑汁鮮石菖蒲之類和寧上普濟丹丸以開之邪入肝腎神智尚清者用復脈湯之類屢進而墊托之陰液托足傳送邪氣由里還表從戰汗而解邪盛正虛故汗必先戰又有神昏譫煩舌苔黃燥黑燥而有質地此胃腸實邪地氣壅閉天氣因之亦閉宜承氣湯急下其邪以決壅閉陰虛者加鮮生地元參蘆根清輕滑利之品滋燥養陰足矣若陰柔滋膩藥多雖用大黃亦恐不解是滋陰轉致傷陰也濕熱化氣病人之天氣及膈膜肝膽三焦者如此濕熱病天氣若脾腎不虛即從天氣而化不致內傳若脾腎素虛或誤於藥或膜原之邪本重皆令內傳邪既內傳不能還表即從里治從里治最要辨其人之體質陰陽濕多熱多即可知虛實之分若其人色白而肥肌肉柔脆素有寒濕此金水之質其體屬陰濕邪不易化熱多病太陰脾土病脾土則舌苔腐白或底白灰滑見證多胸痞脘悶不飢不食不便或大便溏滑或濕鬱為熱走入肌肉發為陰黃黃而昏暗如熏黃色而無煩渴熱象或漸次化熱舌苔黃滑口乾而不多飲其未化熱者宜苦辛淡溫法如除濕湯吳氏加減正氣散之類已化熱者宜苦辛淡清法如加減正氣散加清藥溫膽湯清熱滲濕湯之類發黃酌加茵陳黃柏梔子之類斯病也若誤以脘悶等證為食滯而消之下之則脾陽下陷濕邪內漬轉成洞泄脹滿諸病如是則又當急救脾腎之陽用寒濕門方法治之若其人蒼赤而瘦肌肉堅實素有濕熱肝熱此木火之質其體屬陽濕邪最易化熱多病陽明胃土病胃土又要分別有形質與無形質若無形濕熱與氣相搏舌苔黃滑而無質地或有質地而黃膩見證多嘔逆心煩口渴間有譫語胸脘痞悶按之不痛或濕熱瘀遏走入肌肉發為陽黃黃而鮮明如橘皮色法宜苦辛通降如黃芩滑石湯半夏瀉心等湯量加栝蔞以通之陰虛者加以育陰如舌苔黃厚脈息沉數中脘按之微痛不硬大便不解此無形濕熱與有形渣滓相搏按之不硬多似敗醬色溏糞宜兼用酒煮大黃為丸緩化而行重者加熟大黃元明粉磨蕩而行設使大劑攻下走而不守則必宿垢不行反行稀水徒傷正氣變成壞證若舌苔黃如沉香色或黃黑而燥脈沉實而小甚者沉微似伏四肢發厥或渴喜熱飲此皆裡氣不通之象酌用三承氣湯急下之中脘痞滿按痛邪在胃腑宜小承氣湯當臍及小腹按痛邪在小腸胃脘下口及臍兩旁按痛邪在大腸熱結旁流按之硬痛必有燥矢均宜調胃承氣湯鹹苦下之脘腹均按痛痞滿燥實堅悉具痞滿為濕熱氣結燥實堅為燥矢甚則上蒸心包下爍肝腎煩躁譫語舌卷囊縮宜大承氣湯急下之陰傷者加鮮生地元參知母蘆根之類足矣蓋速下其邪即所以存津液也少腹按痛大便色黑如漆反覺易行其人喜笑若狂是腸胃蓄血上干包絡小便色黑自利是膀胱蓄血均宜桃仁承氣湯急下之或合犀角鮮地黃湯以清包絡發黃小便不利腹滿者茵陳蒿湯下之其有氣虛甚而邪實者宜參黃湯陰虧甚而邪實者宜護胃承氣湯去芒硝或增液承氣湯下之即虛極不任下者宜用鮮生地汁小生地汁元參知母栝蔞麻仁蜂蜜梨汁稍加薑汁之類滑以去著辛以潤燥慎勿當下不下徒用滋膩俾邪無出路轉致傷陰亦勿遲回顧慮致令失下虛人尤不可失失則邪愈盛正愈衰後即欲下而不可得矣更有邪熱化燥傷及腎陰旦慧夕劇面少華色或邪傷肝之經脈發痙發厥審其有熱無結則又惟有酌用增液二甲復脈等湯養陰托邪而已又有發黃小便不利而渴腹不滿者及熱入膀胱小便澀痛者桂苓甘露飲最妙其或病中遺滑濕熱襲入精竅小便澀痛者甘露飲加龜板石決明蘆根一面養陰一面化濕兩不相悖濕熱化氣病人之地氣者又如此至於暑即濕熱合邪醞釀為害與前證無異伏暑及伏暑晚發較春夏溫病來勢稍緩而病實重初起微寒發熱午後較重狀似瘧疾而不分明繼而但熱不寒熱甚於夜天明得汗身熱稍退而胸腹之熱不除日日如是往往五七候始解推此病之由總緣陰虛之質夏月汗多傷液內舍空虛陽浮於外暑濕合邪深踞膜原夏月伏陰在內陽邪處於陰所相安無事然雖暫無患必有焦煩少寐飲食少納面少華色之象秋來陽氣漸斂邪與正爭而病作矣初起邪在氣分必須分別濕多熱多尤須知此病從陰虛而得邪熱一傳陰分即當以育陰養液托邪為第一義余前謂陰柔滋膩不可誤用者謂邪在肺經氣分氣為邪郁不能敷布水精而見煩渴舌赤諸燥象自當輕清開化若用陰柔則肺氣愈遏金不生水燥必轉甚邪近心宮邪閉心宮亦當輕虛開泄若用陰柔則心氣愈遏邪無出路閉必益甚邪已傳裡即當攻下若但用陰柔是揚湯止沸非釜底抽薪此皆不當用而用之者也余豈謂陰柔養液之不可用乎況伏暑本由陰虛得乎雖然亦自有辨伏暑有濕多有熱多濕多者舌苔白膩或變黃黑而舌邊仍白脈息模糊口乾不喜飲宜且前辛淡法忌用涼藥熱多者舌苔黃滑或黃膩脈息細數而遏口乾頻飲而不能多宜用前辛涼淡法邪在膈膜上下乃由表傳裡之漸舌苔黃膩而厚胸痞脘悶乾嘔心煩口渴乃濕熱與氣相搏雖近乎里卻仍在氣分宜用前辛苦通降法邪傳心包用寧上丸開法若傳及肝腎見有陰虛諸證即宜加養液如南北沙參元參細生地麥冬鮮石斛玉竹龜板阿膠之類邪未傳裡時寒已退而熱不解者亦用此法若邪已傳裡而入血分暑濕無形之熱與有形糟粕相搏舌苔黃膩而厚脘腹按痛大便不解或雖解無多或雖多而仍覺不爽宜於辛苦劑中加熟大黃栝蔞緩通之或酒煮大黃為丸緩化之往往服一二錢大解一次再服再解不服不解如此服五七次行五七次而邪始盡非病者多食之過也亦非宿滯之多也乃膜原伏有暑濕脾胃因散輸不力小腸亦變化機遲所進穀食皆化糟粕不化津液所以屢解不盡暑濕本屬濁邪以濁附濁膠滯纏綿焉能脫然而解若初起誤用辛散傳裡又誤用峻下必致亡陰變成神昏痙厥脫厥不救其有里邪已盡熱仍不退者審其舌無多苔或苔薄而無質地則一以育陰養液托邪為主如北沙參大生地玉竹元參麥冬龜板之類虛甚而神氣消索無熱象者甘涼猶不中窾宜用甘平甘潤之劑如六味地黃湯復脈湯之類頻進而墊托之切勿見其不效中途易法致令不救往往上焦之邪因中無砥柱內舍空虛乘虛內陷得育陰墊托從中下焦血分復還氣分發白㾦而解白㾦細小色白有水多發於胸腹缺盆肩頸肘臂部位白者肺之色水者濕之氣所發部位皆屬肺經所行之地若枯白無水則又為陰涸之象亦有育陰墊托由里還表邪從汗解將欲汗時脈必浮緩苔必宣松汗解後舌苔有即退者有遲一二日始退者必得苔淨脈靜身涼舌之兩旁生薄白新苔方為邪盡一切外邪伏邪均系如此更有婦女經水適斷適來而病溫者熱入血室旦明夕昧夜更神昏低聲囈語如見鬼狀甚有當面與言若罔聞知而戶外之事反能聞之見之者人咸以為怪而非怪也蓋肝藏魂肺藏魄魄強者魂乃安今熱入血室血液耗盡肝為將軍之官最惡血燥肝血既燥又加水竭金枯腎水不足以涵濡肺金不足以灌溉肝遂不能自藏其魂而飛揚外越名曰離魂離魂則出入無時故戶外之事皆能聞且見之也又有病者自覺己身化作兩人並臥者亦離魂所致虛勞等證往往如此治法一以大劑甘潤育陰為主初病熱入血室仲景嘗用小柴胡湯領邪外出余嘗以青蒿易柴胡加生地當歸元參麥冬養血養陰山梔澤瀉導血室之邪下行膀胱以為出路有瘀少腹按痛者加赤芍桃仁鱉甲龜板化瘀滋陰暑未盡者黃芩半夏苦辛化邪最忌攻下即有實邪亦必審其舌苔黃燥而有質地脘腹按痛大便不解或經水適來邪搏瘀停少腹板痛或大便色黑如漆實有熱結停瘀見證方可用桃仁承氣湯下之尤須加生地當歸元參麥冬養血滋陰以固其本蓋水淺者舟停水足則舟自行也婦人産後病溫亦當如此其有産前病溫者見有里證當下則下蓋胎因邪不安去邪即是安胎但宜加養血藥又有暑濕合邪病瘧或伏暑晚發轉為瘧疾此與尋常瘧疾不同脈苔見證皆與伏暑無異但作止有期病勢較減治法與伏暑無異亦要分別濕多熱多酌用辛淡辛涼辛苦等劑按暑濕瘧邪伏於膜原半表半裡與少陽半表半裡無涉今時概用小柴胡湯不獨不效往往致肝膽相火與濕熱同升為病而見發嘔發痙發驚等證夫傷寒病邪在少陽寒熱往來是寒已而熱熱已而寒往來不斷而無止期故曰往來不曰來往暑濕瘧疾先寒後熱衛氣行於膜原入於陰爭外無所衛則惡寒出與陰爭陰無所護則發熱熱後汗出即退是寒來熱往作止有時與少陽之寒熱往來無止期者大相徑庭又有一種伏暑瘧疾詳載內經經曰當暑汗不出者秋成風瘧又曰痎瘧皆生於風又曰夏傷於暑秋成痎瘧又曰夏傷於暑熱氣盛藏於皮膚之內腸胃之外此營氣之所舍也此指暑熱令人汗空疏腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日作其篇首論蓄作有時先寒後熱曰陰陽上下交爭虛實更作陰陽相移陽並於陰衛氣內行於營則陰實衛氣在內而陽虛衛氣內行於營外無所衛故虛陽明虛則寒栗鼓頷巨陽即太陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛衛氣復出於外則外熱陰虛則內熱外內皆熱則喘而渴故欲飲冷觀暑熱傷營風濕傷衛之說又與暑濕合邪深伏膜原者不同觀營氣之所舍一語明指半表半裡之營分非但指少陽一經可知觀陰陽相移及三陽俱虛之說更非但指少陽一經可知古今來謂瘧疾但屬少陽經病者一誤解於寒熱往來再誤解於半表半里夫寒熱往來即終而復始之意已明辨之再言半表半裡夫少陽經乃人身兩側面之半表半裡營舍屬經脈乃皮膚內腸胃外之半表半裡膜原乃人身前後間空隙處之半表半裡部位不同病邪亦異是辨之不可不早辨也或曰脈苔證治當何如曰暑濕合併為濁邪脈必模糊苔必濁膩寒熱作止不甚分明治法與伏暑無異其暑熱傷營風濕傷衛者是營分暑熱本重衛分又感風濕衛氣行營並而後發脈必浮弦而數苔必淡白滑白而不膩重者舌肉必深紅先寒後熱寒輕熱重後漸不寒而熱夫浮弦為風象弦而數乃暑熱在營為衛分風濕所搏邪正交爭欲出而不得出之象治宜桂枝白虎湯疏衛清營衛分邪重者用桂枝湯疏衛護營其當暑汗不出而成瘧者是夏月當風取涼以水灌汗逼令暑邪深入不復汗而傷於內脈必浮弦發時亦必弦數脈訣謂弦為陰脈弦數不盡屬熱乃營分之邪欲出而不得出之象苔亦必淡白滑白而不膩但舌肉不深紅先寒後熱寒重熱輕後方轉為寒輕熱重治宜桂枝甘草湯疏衛為主營熱衛寒兩重者桂枝湯疏衛護營若風寒遏郁衛分較甚者用小柴胡湯領邪出外也可即用三陽表藥領邪外出亦可凡夏月風寒伏暑秋成痢疾者雖病各不同而究其由來同屬暑為涼伏因秋風而發皆從瘧例治之用小柴胡湯亦無不可喻氏嘉言治痢用小柴胡倉廩湯逆流挽舟即此意也又有濕鬱成霍亂者吐瀉腹痛惡寒頭身均痛此非寒也乃濕勝耳三陰痎瘧亦因濕勝而得但痎瘧為濕鬱脾經其勢緩霍亂為濕閉氣機其勢急肺為濕閉則各臟腑之本氣亦閉氣閉則不能行水清氣不得下行濁氣轉而上干清濁混淆霍亂乃作脈必沉細而遏甚則沉伏苔必水白白膩重者舌肉亦水白而不紅活此病最忌升散溫燥以及甘藥然間有服溫藥而愈者乃濕未化熱者耳若屢進必誤夫溫燥之品助濁氣上幹一也六氣皆從火化霍亂瀉多亡陰化燥最速二也法宜五苓散去蒼朮化膀胱之氣以導下流尤須加辛通下達之品以開氣閉氣為水母氣開乃能行水夫辛通下達無過細辛細辛辛潤而細故能開達次則芥子芥子辛潤而圓故能流走再次則杏仁牛蒡子仁也子也皆寓生機者也能開表又能通里杭郡塘棲痧藥及丹平散所以靈效者皆細辛之力居多余屢驗不爽但不宜多用其功大者其力必猛不可不知再以外感寒濕言之寒濕為濕之本氣本氣為陰邪其見證也惡寒戰身戰栗心栗周身疼痛或外邪郁遏內熱疼而且煩但舌苔白滑不渴不飲內無熱象故為寒濕必須分別傷表傷里表虛里虛化熱化燥表雖屬毛竅經脈而肺實統之里雖指各臟腑而腎實主之其濕兼風寒傷表也雖當發汗但忌發之太猛犯濕家忌汗之戒金匱云風濕相搏一身盡痛法當汗出而解值天陰雨不止發其汗汗大出者風氣去濕氣在亦不愈治風濕者發其汗但微微似欲汗出者風濕俱去也蓋風為陽邪輕浮易去濕為陰邪凝滯難驅微微似欲汗出即經所謂漬形以為汗是也妙在漬字有浸潤透徹之義又曰病者一身盡痛發熱日晡益劇名風濕此痛傷於寒汗出當風或久傷取冷所致可與麻杏苡甘湯又曰濕家身煩疼可與麻黃加朮湯麻黃加朮緩中燥濕一發一補即微微似欲汗出風濕俱去之意也唐宋以後諸方或不用麻黃或用麻黃並雜用薄荷蘇葉荊防羌獨升燥走竄之甚於麻黃者皆由於未嘗藥辨性之故夫麻黃誠不可多用若當用而用止三四分則較勝於雜用他藥者多矣即或不用而以杏仁蘇梗代之原無不可但勿雜用升燥走竄藥致濕邪內蒙包絡變為神昏下傷肝膽變為痙厥則善矣書曰濕家忌汗汗多則亡陽汗為心液汗多則心液受傷太陽不能外衛故脫又曰濕家忌汗發汗則病痙汗多血耗肝無所養故痙洵不誣也其寒濕傷里也以利小便為主最忌誤下金匱云關節疼痛而煩脈沉而細此名濕痹小便不利大便反快但當利其小便夫關節煩疼雖屬表濕鬱而生熱而脈沉細小便不利大便快濕在裡者居多故即從里治利其小便又曰濕家但頭汗出背強欲覆被向火若下之早則噦或胸滿小便不利舌上白苔者以丹田有熱胸中有寒熱為寒搏故渴欲飲水而不能飲口燥而煩按濕家本多汗頭汗出者寒氣凝斂於上也背強欲覆被向火者太陽經脈行身之背為寒濕相搏也噦而胸滿者誤下虛氣上逆也小便不利者誤下津液內竭也下后里虛上焦陽氣陷入下焦為丹田有熱舌苔白滑誤下表寒陷入胸中為胸中有寒惟丹田有熱則渴欲飲水惟胸中有寒濕雖得水而不能飲但口燥而煩也又曰濕家下之額上汗出微喘小便利者死若下利不止者亦死蓋濕在表下之則虛其里額為諸陽之會額上汗出孤陽無根而上脫也微喘裡熱不守而上逆也小便自遺或下利者陰氣不藏而下泄也陰陽脫離故死觀此可知在裡之寒濕宜利而不宜下也明矣其濕合風寒傷人致表虛里虛者表虛則固表裡虛則溫陽蓋固表則陽氣外衛陰氣自消溫陽則離照當空陰霾自退君子道長小人道消理固有一定者也故仲景治風濕脈浮身重見其汗出惡風知為表虛主防己黃耆湯疏而固之治風濕相摶身體煩疼不能轉側不嘔不渴里無邪也見其脈浮虛而澀知為陽虛主桂枝附子湯和而溫之若大便堅小便自利者知在內之津液不足主桂枝去桂加白朮湯溫而潤之甜術生用氣雖燥而質潤既能勝濕又不傷津治風濕相搏骨節疼痛煩掣不得屈伸近之痛劇小便不利或身微腫見其汗出氣短惡風不欲去衣知為表裡兩虛主甘草附子湯溫以化之此漢儒醫學也繼此而知之者則惟有喻氏嘉言其曰人身陽盛則輕矯濕盛則重著乃有身重如山百脈痛楚不能轉側此猶不用附子回陽勝濕更欲何待在表之濕其有可汗者附子合桂枝湯驅之外出在裡之濕其有可下者附子合細辛大黃驅之下出在中之濕附子合白朮溫中燥脾然則喻氏之學其直登張氏之堂也乎更有濕化為熱者如經所謂風寒濕三氣雜至沓合而成痹本論又合風寒濕熱四氣名濕痹是始則濕與風寒合繼則濕與熱合濕與熱合又當用辛涼淡法如蒼朮白虎湯治痹防己湯或細辛石膏並用俾天氣清肅下降則經絡濕熱自隨之以降而痹者通矣又有濕熱化燥者如經所謂諸痙項強皆屬於濕又曰濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿又曰經熱則痹絡熱則痿又曰肺葉焦萎則病痿躄之類濕化為燥燥中猶有餘濕須治濕不礙燥如防己湯中加龜板決明牡蠣金叉石斛之類化燥而無餘濕須治燥不動濕如熟地炭蓯蓉枸杞玉竹沙參制首烏胡麻之類乃世俗治拘攣等證慣用木瓜且盛稱其養筋舒筋之功抑知木瓜味酸澀而質燥斷無養筋舒筋之理此說創自明人神農本草原無是解宜陳氏修園非之更有藤屬如絡石藤海風藤薜荔藤等味慣用以治痹抑知此類藤屬辛燥走竄穿經破絡化熱化燥愈服愈痛夫濕為寒搏寒搏則燥生初起即當辛潤濕潤以解外燥參以淡滲治濕濕熱化燥即當治以清潤重者清潤不效又當治以濕潤即以痹論痹為濕痹治濕為本風寒兼之方合聖經治病求本之旨若謂藉以引經彼桂枝桑枝當歸牛膝諸品不獨引經且能流利關節不較勝於藤屬多多乎再以內傷濕熱言之其病天氣也肺傷濕熱清肅不行或多自汗或成膚腫或淋閉或火瀉或痢如西瓜水等證如溽暑蒸騰必得涼風至白露降溽暑乃收且上竅一開下竅自注治法不外辛淡清淡如白虎湯甘露飲加杏仁芥子苡仁通草之類其病地氣也濕熱傷脾胃之陰上而熏蒸肺肝下而壅塞二腸膀胱或生痰生飲或吞酸吐酸或嘔逆吐瀉或土壅木遏山有風而成蠱或下塞上閉天地隔而成否或濕熱滯於中而為噤口痢疾或水濕溢於外而為皮膚水腫土屬雜氣為病最多治法總不外辛通苦降如五瀉心湯二妙散清熱滲濕湯資生丸六君加黃連鱉甲澤瀉薑汁竹瀝之類其有痞滿嘔逆上下不通者乘其初起元氣未衰投控涎丹十餘粒通之或用小溫中丸數服化之及早圖治切勿養癰致貽後患其由中土而病及下焦也或濕熱傷腎水不濟火而為夢遺為黃濁傳入大腸而為痢或濕熱傷肝流入筋脈而為疝或濕熱傷脾而為泄瀉治法亦不外苦辛淡滲如豬肚丸知柏生地黃湯宣清導濁湯黃芩芍藥湯滲濕斷下湯桂苓甘露飲五苓散牡蠣澤瀉散之類其有化燥者始為濕熱繼又陰虛上實下虛火升痰湧或胸痞脅滿或喘嗽眩暈或四肢乏力或周身疼痛或血溢便閉或面赤足冷或痿痹癱廢治法又與尋常濕熱不同若淡滲燥濕必致真陰下竭若柔膩滋陰又助痰濕上壅務使燥潤得宜剛柔並濟如知柏地黃丸虎潛丸之類復有陰陽兩虛真元下衰濕熱上乘乘於內則痰熱喘滿眩暈溢於外則肢體疼重麻木如此則將有類中之虞如痰厥昏僕舌強語澀口角流涎口眼喎斜半身不遂等證宜用劉守真地黃飲子多加薑汁竹瀝送下或服黑錫丹一分服後半日許乘其氣息稍平急進大劑參湯和竹瀝薑汁童便分服之若過此時則痰火復升補氣之藥難於突入重圍矣其喘滿多熱汗者急進生脈散以攝陰氣喘滿多冷汗者急進參附湯以回陽氣或用理陰煎以收攝陰陽二氣治濕熱化燥有如此者再以內傷寒濕言之或因於天或因於人或外無所因而濕從內起因於天者久雨濕勝外濕引動內濕因於人者夏月納涼飲冷或嗜食茶酒瓜果急者當時為患緩者秋後乃發外無所因者乃水穀之濕停蓄於中三者之原總由陽虛不能輸水所致其病天氣也肺陽傷則水冷金寒氣不化水有霾霧蔽空之象肺陽遏心陽亦為其所掩有陰雲蔽日之象或水泛高原為喘滿為痰嗽或飲邪凌心為心悸或上干於頭為眩暈嘔吐治法以辛淡為主表輕者六安煎表重者小青龍湯有汗小青龍去麻黃或如苓桂術甘苓桂術薑外臺茯苓飲之類其陽虛濕重及喘滿多冷汗者又非參附湯真武湯回陽勝濕不克即前所謂離照當空陰霾乃退之義其病地氣也脾胃陽傷水多土濫脾陽傷則見脘痞腹脹腹痛腫脹便溏洞泄三陰痎瘧等證法宜溫中燥濕如附子理中真武等湯之類胃陽傷則見脘脹嘔逆不飢不食不便等證法宜辛溫淡滲如平胃散胃苓湯除濕湯之類亦有濕鬱化熱舌苔先白滑灰滑而後轉黃燥口渴不飢小便澀痛大便堅實即古稱濕火是也治法又宜苦辛涼淡如半夏瀉心等湯要之濕為陰邪傷人之陽也得理之常傷人之陰也乃勢之變其病地氣而及地中之水火木也腎陽虛則三焦不能化水滲入膀胱而見濕痢滑泄五更泄瀉腰腿痠痛等證邪水旺一分則真水虧一分治法以溫腎陽泄膀胱為主溫腎陽即所以生脾土泄膀胱即所以安腎陽溫腎陽如真武湯金匱腎氣湯參茸湯之類泄膀胱如五苓散之類其病肝木者何蓋木賴水生水多則木泛木泛則不得遂其生髮之性而疏泄無權樞轉不力即內經所謂風濕交爭風不勝濕之意治法宜逍遙散小柴胡湯補中益氣調中益氣等湯以復其風木之性則水隨氣轉由決瀆入州都而汜濫者治矣此治內傷寒濕之大較也學者博覽群書自知所論不誣矣
