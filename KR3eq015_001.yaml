body:
  text: 卷上人身一小天地論人稟陰陽五行之氣以生於天地間無處不與天地合人之有病猶天地陰陽之不得其宜故欲知人必先知天地易曰立天之道曰陰與陽立地之道曰柔與剛蓋剛柔之質即陰陽之氣所凝結故程子曰凡有氣莫非天凡有形莫非地又曰地氣不上騰則天氣不下降天氣降而至於地地中生物皆天氣也朱子曰地居天中央不動不是在下天之包地如鳥卵之含黃天大地小表裡皆水地名地球天圓而地亦圓曰地方者謂地之德方靜而承天者也使天有一息之停則地須陷下此天包乎地之義也以人言之膈膜以上肺與心與心包絡象天膈膜以下肝膽脾胃小腸大腸腎三焦膀胱象地經云天樞臍穴以上天氣主之天樞以下地氣主之是以天樞居腹之中間者言之也余以膈膜上下分天地者以氣之輕清者為天氣之重濁者為地言之也然膈膜以下主之者地氣而統之以運行者實皆天氣匪直此也凡皮膚肌肉經絡筋骨臟腑之有形質而凝靜者皆象地皆屬陰而皮膚肌肉經絡筋骨臟腑之有空竅以運行者皆象天皆屬陽精兩神相摶合而成形常先身生是謂精津腠理發泄汗出溱溱是謂津涕淚也唾口液也氣上焦開發宣五穀味熏膚澤毛若霧露之溉是謂氣血中焦受氣取汁變化而赤是謂血液谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液猶天地之有月與水也陽氣猶天地之有日與火也故曰人身一小天地考天有九重最上一重為宗動天左旋其內八重天恆星天土星天木星天火星天太陽天金星天水星天太陰天右旋逐日為宗動天裹之左旋是宗動天者乃一氣運行群動之宗也中學謂天道左旋日月亦是左旋此主七政天隨宗動天以行也西學謂宗動天是左旋七政天是右旋此主七政本天之行以言之也人之身肺為華蓋居於至高一呼一吸與天氣相通體極輕虛用主肅降肺固人之天也不獨肺之本臟為天凡臟腑間經絡及內外空竅之能通氣者皆莫非天雖各臟腑之經絡空竅有各臟腑之本氣以運行如七政本天之運行一般而要皆隨肺氣以運行皆為肺氣所貫通肺固人之宗動天也故曰肺主天氣肺氣故名宗氣又名大氣地居天中人在氣中天包乎地氣包乎質天地與人同一理也夫在天則有日在人則有心心系於肺猶日系於天天為陽日為陽之精肺氣為陽心為陰中之太陽天行健一日一夜周三百六十五度四分度之一又進過一度日行稍遲一日一夜周三百六十五度四分度之一因天進一度則日為退一度人身肺之宗氣統心之營氣一日一夜五十度周於身每日自寅始至醜終終而復始七日行足方與天合度故易曰七日來復以見天心蓋營氣之行必隨宗氣以行所以十二經脈首從肺起每日寅時百脈上朝於肺人生於寅肺主天氣其明證也夫人周身經絡皆根於心而上通於肺以回於下如樹之有根有干有枝百體內外一氣流通運行血脈以相出入經故曰心生血又曰諸脈皆屬於心按經絡功用不同隱見亦異經曰經脈者常不可見也脈之見者皆絡脈也蓋經脈主發血由臟腑而外行近筋骨故肌肉厚處按之便不覺跳動絡脈主回血由外而還行臟腑近肌肉故易見藍色無脈者皆是經脈由里而外其氣旺旺則行速速則有血有脈其血赤絡脈由外而里其氣緩緩則行遲遲則有血無脈其血紫西學所謂生血管者經是也回血管者絡是也房者心竅是也經脈從心左下竅而生行心左上竅而上與左肺葉內經脈相通由肺回曲而下循手經下達足經以入孫絡絡之細者逮由孫絡以至絡脈漸行漸緩其色遂變為紫於是紫血由絡脈而行上至心右上竅兩絡脈中還行心右下竅絡脈上入右肺葉內絡脈紫血復變為赤陰從陽化回心左上竅還行心左下竅經脈右旋而復行於左往來運行如環不絶經生血故左旋絡回血故右旋左旋者陽統陰右旋者陰從陽與河圖洛書無異其實是一氣旋轉並非兩氣觀此與天之左旋速右旋遲者適相合矣與天之左右旋而統歸一氣者更無不合矣經絡如此臟腑可知臟腑中皆有經絡貫串以通於內外凡可通者皆屬天氣六腑如器更無不然不獨賁門幽門闌門三焦之門之通天氣也更不獨喉通天氣咽通地氣以上承天氣也此身以內之天也再以身外之天言之經云頭圓象天頭為諸陽之會頭主天氣固也天氣遏郁頭重頭痛固也即足之至下亦天氣所貫通所以人病肺痿足即痿躄不能行外感阻遏肺氣足即痠痛甚則足冷皆其證也所謂天包乎地也經曰天氣通於鼻又曰鼻為肺竅一經外感咳嗽喘滿鼻竅即塞而不利是鼻竅與肺最切近者也他如心寄竅於耳膽脈上絡於耳腎開竅於耳肝開竅於目脾開竅於口腎又開竅於二陰乳竅下通於肝胃臍竅後通於命門臍竅與兩腎中間之命門針鋒相對雖各竅自有其本氣而要皆宗氣所貫通也請析言之心膽腎因虛燥而耳鳴心膽腎因濕阻而耳聾心膽腎之本氣自病也嘗見外感阻遏宗氣燥勝則耳亦鳴濕勝則耳亦聾肝受燥風濕熱則病目肝之本氣自病也夫五臟之精華皆上注於目腎又為五臟之氣之根腎中真陰真陽虛而目昏昧經故曰脫陰者目盲脫陽者見鬼五臟之根氣自病也嘗見外感阻遏宗氣燥勝則熱熱則不能化陰外達而目無淚而干濕勝則濡濡則不能化水下降而目多淚而爛脾有濕熱則口疸而生甜水脾有燥熱或膽經燥熱乘脾則口苦而多煩渴脾之本氣自病也嘗見外感阻遏宗氣肺陽鬱於上不得化陰於下亦為唇燥口渴腎之陽虛不能約水而為遺溺不能行水而為自利腎之陰虛不能濡腸而矢燥結不能濡膀胱而溺短數腎之本氣自病也嘗見外感阻遏宗氣而亦為腸祕為癃閉或燥勝為窘迫下利或濕勝為五泄肝胃陰虛無由升化乳汁肝胃陽結不能上通乳竅肝胃之本氣自病也嘗見外感阻遏宗氣濕熱壅於血分營衛不從逆於肉裡致生乳癰其七情致傷心氣燥熱結於血分者則為乳岩凡外感燥濕種種見證雖各臟腑本氣自病而要皆關乎肺以肺為群氣之宗天無二氣故也不獨空竅之大者為然也即皮膚外八百萬有奇之汗空汗空名玄府又名鬼門亦無不然經故曰肺主皮毛其內傷肺氣氣不化水自利氣不攝津自汗氣不統血氣不固精即見自利自汗脫血脫精陰脫陽厥絶汗出諸證故曰天有一息之停則地須陷下若外感阻遏肺氣不得外達又不得下降宗氣自病致他臟腑經絡之本氣亦病肺氣不得外達即見憎寒發熱頭痛身痛腰痛手足痠痛諸證肺氣不得下降即見腹痛胸痹咳嗽嘔吐喘逆諸證感風燥暑燥寒燥之氣搏束氣機不得外達而為無汗感風濕自汗寒濕冷汗暑濕濕溫熱汗之氣阻遏氣機不得下降橫溢而為自汗冷汗熱汗又或燥結血分而為熱厥濕阻氣分而為寒厥燥降太過熱甚迫津而為火瀉濕鬱太過氣不行水而為五泄抑或為溺塞便閉譬如注水之器上竅閉塞則下竅點滴不通下竅閉塞則上竅壅遏不開種種見證皆關乎肺肺主天氣洵不誣也若夫地固承天者也地氣不上騰則天氣不下降胃固人之地氣也腎乃天氣蘊蓄於地中者也胃為水穀之海又為倉廩之官胃之發育又藉腎之真陰真陽以與為發育者也經故曰腎為胃關又曰四時百病胃氣為本得谷者昌絶谷者亡又曰營出中焦又曰精氣生於穀氣又曰飲入於胃遊溢精氣上輸於脾脾氣散精上輸於肺是地氣上騰也通調水道下輸膀胱水精四布五經並行是天氣下降也又曰水穀之悍氣為衛水穀之精氣為營其營血之精者得肺氣以敷布之入膽化膽汁入腎化精上行頭化腦內行骨空化髓故曰天氣降而至於地地中生物皆天氣也其水隨肺氣呼吸攝入腸胃間微絲血絡即孫絡西學驗孫絡有二千餘根以入絡脈由絡脈過肝入心運行周身由肺升出為氣由毛竅滲出為汗余入內腎得三焦之氣化滲入膀胱為溺故曰氣為水母又曰水行天上然水血並行絡中而不相妨者何也蓋血有血輪以統之者也按內經刺血絡出清汁便知水血並行血絡其渣滓變化於小腸小腸為火腑故能變化以傳道於大腸是皆肺氣所統布也是陰從陽也夫天之真陰真陽發於地上以生萬物實藏於地中而為萬物所由生人身肺之真陰下布於腎而為水肺之真陽下納於腎而為火所謂地居天中天包乎地也兩腎中間名曰命門為人身之根柢一陽藏於二陰之中水火互宅在卦為坎肺一呼一吸與腰間腎氣息息相通經故曰腎上連肺至於脾猶地上堤防之土為胃散精以上輸於肺者耳肝猶地上之木以樞轉地中生髮之氣者耳六經為川腸胃為海猶地之有涇渭運清而行濁者耳由此觀之人身不誠一小天地哉肺腎也胃也非又人身所最重者哉陰陽互根論易曰太極生兩儀兩儀生四象四象生八卦八卦相錯萬物生焉太極陰含陽也儀象陽分陰也陽不能自立必得陰而後立故陽以陰為基而陰為陽之母陰不能自見必待陽而後見故陰以陽為統而陽為陰之父根陰根陽天人一理也以定位言則陽在上陰在下而對待之體立以氣化言則陰上升陽下降而流行之用宏請以卦論乾為天乾之左為坎水右為兌水是水行天上也而非水也乃水之陰氣上升於天也若陰升於天而氣化之不及則陰霾四起而天象變矣坤為地坤之左為震之雷火巽之風火離之正火是火出地下也而非火也乃火之陽氣下降於地也若陽降於地而氣運之不周則赤滷不毛而地象變矣然論卦象猶虛也請實徵諸時試觀一歲之間夏至以後酷暑炎蒸若非陰氣潛生大雨時行則大地皆成灰燼矣陰氣上升其明證也且陰氣上升於天得天之布濩而陰氣乃彌綸於無際冬至以後陰凝寒沍若非陽氣潛藏水泉流動則世人皆成僵凍矣陽氣下降其明證也且陽氣下降於地得地之醞釀而陽氣乃發育於無窮獨是陰氣上升而非自升必得陽氣乃升地之陽即天下降之陽以陽助陰升故不曰陽升而曰陰升陽氣下降而非虛降必含陰氣以降天之陰即地上升之陰以陰隨陽化故不曰陰降而曰陽降若是陰陽互根本是一氣特因升降而為二耳以人言之人之陰升脾胃水穀精微之氣上升於肺如經所謂飲入於胃遊溢精氣上輸於脾脾氣散精上輸於肺是即水行天上也氣中有水故曰陰升然水不離乎氣也若非氣水蒸騰而為邪水上泛則水溢高源而肺脹喘嗽諸證生矣然氣水既生於胃必胃中水穀充滿而後陰氣乃旺經故曰精氣生於穀氣若胃氣自病則生化之源絶安望陰升乎且夫陰氣非能自升必藉陽氣乃升腎之真陽即肺下降之陽惟肺陽下歸於腎得腎之含納而陽氣乃收藏不越人之陽降肺之陽氣下降於腎如天之陽氣潛藏於地是即火出地下也水由氣化故曰陽降然氣不離乎水也若非氣水涵濡而為燥陽下降則金枯水竭而勞咳骨蒸諸證生矣然則陽氣不可虛降必含陰氣以降肺之真陰即脾胃腎上升之陰惟脾胃腎之陰上升於肺得肺之敷布而陰氣乃充周一身經故曰腎上連肺又曰無陽則陰無以生無陰則陽無以化然而陰陽升降不可得而見也請借證釜甑釜中之水穀水也釜底之火火也釜上之氣即為陽氣氣中之水即為陰氣然必釜中水穀充滿又得釜底之火以熏蒸之釜上之蓋以統束之而後氣中之水絪縕煦育上蒸下布氣中有水即是陰升水由氣化即為陽降若釜中水穀不充則無米之炊將見釜底之火僅存虛陽釜上之蓋亦為虛器又或釜中雖有水穀而釜底無火不獨精氣不能蒸運即渣滓亦難銷熔釜上無蓋不獨統攝無權亦且漫溢不治然則陰陽二氣非相需而不可須臾離者哉然就二氣而權衡之陰承陽陽統陰陽氣一分不到即病陽氣一分不盡不死人自當以陽氣為重然陽氣固重陰氣亦重何也人事與病多致陰傷者也經云靜則神藏動則消亡日用操勞皆動機也動則所生之少不敵所耗之多病亦動機也動則六氣皆從火化化火則必傷陰則又當以陰氣為重譬如行舟行者氣也行之者水也水足氣始旺也再譬諸燈燈火火也油水也油足火始明也氣為血帥血又為氣航此陽統陰而基於陰之理也若無陰則陽氣亦無依而亡矣陰液脫者死大肉脫者亦死故陰陽二字不讀曰陽陰而讀曰陰陽其亦可以恍然悟矣五行生剋論水木火土金五行生剋一陰陽升降之旋相為宮也生為長養即為陰升克為制化即是陽降然必陰先升而後陽乃降亦必陽能降而後陰轉升五行不克則不生如有妻而無夫也乃相生之道人皆知之相剋之道人多不察請詳言之腎主地主陰主水五液亦皆主地主陰主水腎中真陽之氣絪縕煦育上通各臟腑之陽而腎中真陰之氣即因腎陽蒸運上通各臟腑之陰陽助陰升以養肝木則木氣敷榮血充而氣暢矣由是肝得上升之陰氣而養心火則火氣溫潤血生而脈行矣由是心得上升之陰氣而養脾土則土氣健運統血而散精矣由是脾得上升之陰氣而養肺金則金有治節調元而贊化矣肺得上升之陰氣轉降而入腎則水精四布五經並行矣此五行一氣相生始於腎終於肺地所以上交乎天也肺主天主陽主氣敷布陰液以柔肝木木得下降之陽氣所制則溫柔和緩不似燥急難平矣由是木來疏土土得下降之陽氣所制則宣松運化不似困鈍不靈矣由是土來治水水得下降之陽氣所制則知周輸泄不似汜濫無歸矣由是水來濟火火得上升而復下降之陽氣所制則心腎相交不似火炎水燥矣由是火來暖金金得上升而復下降之陽氣所制則津液分布不似金寒水冷矣此五行一氣相剋始於肺終於肺天所以大包乎地也然則五行之生雖五臟之陰遞升而生實腎之陽助腎之陰遞升而生陰之升天統之而地承之也五行之克雖五臟之陽遞降而克實肺之陽統肺之陰遞降而克陽之降地承之而天統之也生固為生克亦為生生克二者非即陰升陽降循環而不窮者哉然而生克又不可太過也太過則非真陰真陽升降以為生而為邪水邪火升降以為害也木賴水生水泛則木浮木浮則火濕火濕則土困土困則金埋金埋則水愈泛五內有水而無火則瀉利腫滿諸濕病生矣火賴水克水盛則火滅火滅則金寒金寒則木濕木濕則土困土困則水濫水濫則火愈滅五內有水而無火則瀉利腫滿諸濕病生矣火賴木生木盛則自焚火焚則土燥土燥則金枯金枯則水涸水涸則木愈焚五內有火而無水則風勞蠱膈三消諸燥病生矣土賴木克木強則土弱土弱則水泛水泛則火衰真火衰則虛火旺陽無以生陰無由化陰不化則金燥金燥則木愈強火既虧而水亦虧土無火必濫則痞滿腫脹泄瀉諸濕病生土無水必干則蠱膈三消諸燥病又相繼而生矣土賴火生火炎則土燥土燥則金熔金熔則水虧水虧則木熾木熾則火愈炎五內有火而無水則譫狂膈消諸燥病生矣金賴火克火炎則金燥金燥則木熾木熾則土焦土焦則水涸水涸則火愈熾五內有火而無水則肺勞肺痿咳血諸燥病亦生矣金賴土生土重則金埋金埋則水泛水泛則木浮木浮則火困火困則土雜五內交困於水火土包五行故多兼病則痞滿脹痛燥濕諸病又雜沓而生矣水賴土克土燥則水竭水竭則火炎火炎則金爍金爍則木枯木枯則土愈燥五內有火而無水則膈消窘迫下利諸燥病生矣水賴金生金寒則水冷水冷則木濫木濫則火濕火濕則土困土困則金埋金埋則水愈冷五內有水而無火則喘嗽腫脹瀉利諸濕病生矣木賴金克金亢則木削木削則土陷土陷則水虧水虧則火炎火炎則金愈亢五內有火而無水則勞咳咽痛窘迫下利諸燥病生矣生克一有太過則克固為克生亦為克且人身真陰真陽只有此數凡見太過實由不及太過不及則為濁陰為燥陽濁陰則不為陰而為水燥陽則不為陽而為火五行生剋不外水火生克太過不及為病亦不外水火水流濕火就燥故水火二氣為五行之生成燥濕二氣為百病之綱領陰陽以氣言水火以形言坎為水水色黑黑屬陰然水外暗而內明空靈活潑實為陰中之陽故坎中滿離為火火色赤赤屬陽然火外明而內暗且返本歸根則其色黑實為陽中之陰故離中虛以形質言水火質虛木金土質實是水火又為木金土之先天矣火有形無質必依附於物而乃有質水雖有質而極虛故論五行生成之序則水一火二木三金四土五論五行生剋之序則生始於水克始於金知五行氣質陰陽生克乃知天人一貫道理玩集中各論自明陰陽治法大要論陽天道也陰地道也非天之陽地亦不凝而萬物不生非地之陰天亦無依而萬物不成天主動無一息之靜使稍不動則失其健運之機而萬物屯矣地主靜無一息之動使稍不靜則失其貞凝之義而萬物否矣人身之陽法天者也一失其流行之機則百病起人身之陰法地者也一失其安養之義則百害生陰陽二氣固不可稍偏而或失也夫所謂陽者乃人身之真陽真陽陰中之陽非燥烈無濟之亢陽亢陽無陰則為火如天之久旱酷暑不得不藉甘霖以消其亢厲故丹溪發補陰之論補陰正所以濟陽也王太僕謂壯水之主以制陽光者此也所謂陰者乃人身之真陰真陰陽中之陰非堅凝寒結之濁陰濁陰無陽則為水如天之重陰凜冽不得不藉皓日以致其睛和故先哲發扶陽之論扶陽正所以濟陰也王太僕謂益火之原以消陰翳者此也夫乾為陽坤為陰乾坤化為坎離是天地為陰陽之體水火為陰陽之用用傷則體害水火有過不及之弊在天地則不能無旱潦之災在人則不能無燥濕之患其理一也陰人之形也陽人之氣也大凡形質之失宜莫不由氣行之失序故地之萬物不生又皆由天之旱潦失節人身一分陽氣不到之處則此處便有病然陰陽互根凡陽所到之處皆陰所到之處若陽到而陰不到則此處亦有病陰陽又當審其虛實外感實證先病陽內傷虛證先病陰病陽者肺主之病陰者脾胃腎主之外感上焦陽氣鬱閉治以開豁通天氣也中焦陽氣燥結治以苦辛攻下苦辛開化平地氣也治實火要使邪有出路若純用苦寒逼邪深入而無出路非徒無益而有害之乃晉唐以後醫道失傳如三黃解毒諸方毫無法律不可從也內傷中焦陽氣下陷不能上升於肺治以升補使地氣上騰乎天也下焦陽氣外越不能下歸於腎治以溫納使天氣下降於地也蓋先天真一之氣自下而上與後天胃氣相接而生而為人身之至寶若人真陰受傷致精不能化氣氣即不能歸精於是腎中龍火內爍而見骨蒸等證龍火外越而見發熱顴紅面赤等證一火興而五火熾將見肝之風火雷火心之離火胃之燥火又必相因而起而見有餘之象非有餘也實下元不足所致耳經曰少火生氣壯火食氣火在丹田以下為少火即真火火離丹田而上為壯火即虛火虛火水中之火不得再以水滅之固也奈何世執丹溪法而用知母黃柏之苦寒以撲滅之勢必愈治愈劇如雨愈大龍愈騰欲其潛藏也得乎不獨苦寒不可用也即甘涼亦當慎投其在初病本原未傷者甘涼清潤猶可獲效若高年以及久病本原已傷者法當治以溫潤引火歸原如雲開日出而龍乃潛也濁陰可溫桂附乾薑辛熱之屬不得不用若陰中陽虛而藥偏剛燥恐陽未能扶而陰又被劫法當治以溫潤納氣歸原經曰氣納為寶蓋氣納則歸腎不納則不歸腎氣不歸腎者謂肺氣不得歸腎並謂脾胃之氣不得歸腎也夫腎為先天五臟之始始數一一水數也金為水源水天本一氣也脾胃為後天五臟之成成數五五土數也土為萬物之母故精神氣血皆胃氣所生又皆腎氣助之以生胃為人之地腎為地中之天氣胃腎又本一氣也經故曰腎為胃關夫所謂胃氣者穀氣也經曰營為水穀之精氣衛為水穀之悍氣又曰精氣生於穀氣故氣字從氣從米精字從青從米米乃谷之精者也胃主納穀亦主銷谷脾主散精水穀精氣生於胃輸於脾由脾上輸於肺則為氣從肺回下入心化血入腎化精是生之者胃升之者脾降之者肺地天交泰胃脾肺又本一氣也經故曰脾為諫議之官知周出焉俗謂脾主銷谷以能食不能化為脾不健是不知脾之功用也是指鹿為馬也或曰飲食傷脾則又何說曰飲食不節遏郁脾氣脾氣為其所郁則不能散精而濕斯停矣是謂傷逆非脾之過也良由飲食不節所致耳夫人生天地間天氣固重地氣尤重蓋人在天中離地而上凡空處皆謂之天人在天中非在天下以天本無上下之極者也而附於地上生於天中一呼一吸與天氣相通而人莫名其妙亦莫得自主故凡天之六氣病人之天氣者人不能盡避之附於地上實而可據人得以自主故凡七情之病由人事所致者多病人之地氣以及天氣病地氣則胃腎為重然腎雖主地氣而實為地中之天氣腎屬天一所生之水而為人之先天者此也其有胎元薄弱先天不足者人不得而主之又恃調攝後天以補先天之不足若是者胃氣不尤重哉重胃氣非即所以重腎氣哉夫胃為中土胃氣賴五臟之氣以生化如地無堤防之土則水無收束無水則燥無火則濫無木則實無金則死是也然五臟之氣又賴胃氣以成功如金無土則不生木無土則不載水火無土則無本原脾土無胃土則不滋潤是也故脾胃穀氣不得到肺則肺之脾胃虛脾胃穀氣不得到心則心之脾胃虛脾胃穀氣不得到肝則肝之脾胃虛脾胃穀氣不得到腎則腎之脾胃虛胃之穀氣不得到脾則脾之胃虛若是者脾胃顧不重哉內傷百病可不首固脾胃哉請申言之肺之脾胃虛則熱自內生熱則不能生水而見虛喘乾咳諸燥證是肺氣不得歸腎也又或肺之脾胃虛則寒自內生寒則不能化水而見喘嗽腫滿諸濕證是亦肺氣不得歸腎也醫學云喘在腎為虛在肺為實夫所謂實者非真實也乃肺之陽虛不化致水上溢高源耳金寒水冷非溫潤納氣不可邪水射肺非辛淡輸水扶氣不可心之脾胃虛則熱熱則燥君弱者臣自強血虛者肝自旺火水未濟致生虛煩心熱不寐等證是心氣不得歸腎也或曰心屬火火性炎上如何下降腎屬水水性就下如何上升曰心屬火而心中有血是火中有真陰故心火隨真陰下降以交於腎水腎屬水而腎中有氣是水中有真陽故腎水隨真陽上升以交於心火夫真陰真陽者心腎中之真氣也故欲補心者先實腎使腎得升欲補腎者須寧心使心得降肝之脾胃虛則熱熱則燥肝血一虧肝氣即亢或風雷激搏致生頭疼嘔吐等證或木火刑金致生乾咳吐血等證或燥木侮土致生脅痛嘔吐蠱膈等證是肝氣不得歸腎也夫治肝較他臟尤難他臟之邪可移之出腑若膽雖為肝之腑而一囊膽汁藏而不瀉而無出路雖屬腑而與臟無殊故肝病較他臟為難治則惟有清潤以濡之咸柔以潛之沃水以生木也甘潤以緩之培土以載木也微苦以降之使木火不上僭也平潤以納之導木火得下潛也血能含氣氣不耗血而肝自平矣其肝有濕熱者方可用苦降辛通酸泄之劑氣不條達者方可用木鬱達之之法彼破氣耗血諸品豈可妄用以伐生氣以耗肝陰也哉腎之脾胃虛則熱熱則燥腎陰一虧腎陽即亢或骨蒸發熱或吐血夢遺或上咳下利是腎氣不得歸腎也治法亦不外清潤溫潤以增水養火而已矣甘潤甘平以固水火中之脾胃而已矣脾之胃虛則中土自病或因思慮過度或因飢飽失宜以致氣結化濕血結化燥濕困脾陽燥傷脾陰等證胃病則不能散輸精氣於脾脾病則不能上輸精氣於肺地氣不上騰則天氣不下降是脾胃之氣不得歸腎也此則非寒熱溫涼所能納也法當病燥則治燥病濕則治濕取純甘之味扶土生金順其升降之性以納之耳總之內傷百病不起於先天即起於後天起於後天又必病及先天五臟中有一臟不秉生成之氣則形氣病形病不能無害於氣氣病不能無害於形此不易之道相因之理也但治之者不可無標本先後之分夫陰陽臟腑氣血有各自為病者有相因而至者有去此適彼者用藥之法如腑病宜開通不得以臟藥犯之臟病宜補益不得以腑藥犯之腑病將及臟治腑尤須顧臟臟病將入腑治臟必兼理腑腑入臟臟入腑又有輕重之異藥亦不得不隨其輕重而用之更有病雖在腑而原起於臟則重在治臟病雖在臟而原起於腑則重在治腑蓋病雖在此不必治此治此反劇病已去此猶當顧此不顧此則損此陰陽標本先後輕重之大略也要之天地與人不外陰陽二氣天之陰陽失相燮理之人之陰陽失醫燮理之良相良醫總在調劑陰陽使之兩得其平焉已矣樞機論竊聞三陰三陽有樞機焉樞者如門戶之樞乃陰陽開闔之轉機也內經樞機有二一曰少陰為樞一曰少陽為樞陰之初生為少陰少陰稚陰也手少陰屬心足少陰屬腎心為人身君主之官神明所從出腎為陰陽互根之地精氣之本原故少陰為轉陽至陰之機竅陰之樞也由少陰而太陰由太陰而厥陰經曰太陰為開厥陰為闔蓋太陰脾土得此樞而散精以升於上太陰肺金得此樞而布精以降於下能升能降故謂之開由是厥陰心包絡得此樞而陰血以生厥陰肝木得此樞而陰血以藏以生以藏故謂之闔是太陰厥陰之開闔皆少陰之樞所默運者也厥陰為陰之極陰極則陽生而陰轉入於陽陽之初生為少陽少陽稚陽也手少陽屬三焦足少陽屬膽三焦具真陽之火其體虛潤其氣氤氳焦熱也滿腔中熱氣布濩能通調水道也按三焦從右腎生出心腎相通三焦因與心包絡相通而為表裡膽為初春之木其體軟嫩其氣溫和故少陽為轉陰至陽之機括陽之樞也由少陽而太陽由太陽而陽明經曰太陽為開陽明為闔蓋太陽膀胱得此樞而水道通調太陽小腸得此樞而食物變化通調變化故謂之開由是陽明胃腑得此樞而陽氣含納陽明大腸得此樞而陽氣收藏含納收藏故謂之闔是太陽陽明之開闔皆少陽之樞所默運者也陽明為陽之極陽極則陰生而陽又轉入於陰然則少陰少陽非陰陽出入開闔之樞機者哉若其樞一有不利則出入之機停出入機停則開闔之機廢能開不能闔則泄瀉諸病生能闔不能開則噎膈便閉諸病生病先天則從腎起病後天則從脾胃起脾胃病則土不生金而金敗金敗則水衰水衰則木枯木枯則火熾火熾則水益涸水涸則龍火起龍火起而風火雷火燥火亦相繼而起則一身無非火矣夫此火之來總由於樞之不利火即陽氣外越而不能依附於陰者也若寒以降之則火益烈而元氣亡矣故欲其樞之利非溫潤之咸柔之不可法當滋腎之陰納腎之陽蓋腎為水火互根之臟腎陰足而後水濟火腎陽固而後氣歸精也法當養肝之血達膽之氣蓋肝膽為東方震巽之木木之陰液不可耗木之生氣尤不可伐也知少陰少陽之為樞而治法可悟矣衛氣行度一經星經天論衛氣陽氣也即人之天氣也天有二十八宿周布四面一面七星四七二十八星房昴為東西之緯橫看虛張為南北之經縱看房至畢屬陽主晝昴至心屬陰主夜人身衛氣之行亦猶是也晝行陽經二十五度夜行陰經二十五度一晝一夜五十度周於身與宗氣營氣度數相等或曰衛氣出於何所行於何地乎曰宗氣積於上焦營氣出於中焦而衛氣則出於下焦營氣隨宗氣行於經脈之中衛氣則不隨宗氣入於經脈而自行於各經脈外及頭目手足皮膚分肉之間故經曰清者為營濁者為衛營行脈中衛行脈外或又曰衛氣何以出於下焦行於脈外乎曰經謂上焦如霧此三焦即三停肺司呼吸布散精液以行於經脈之中彌淪布濩如天之有霧中焦如漚水穀精微之氣蒸變而為心血凝聚浮沉如水中之有漚下焦如瀆飲入於胃脾實輸之下行於右腎旁之三焦腑得三焦腑之氣化滲入膀胱故三焦為決瀆之官膀胱為州都之官正以下焦如瀆之畜泄乎水也衛氣賴下焦陰中真陽以升出中上二焦故衛氣出於下焦營為水穀之精氣屬陰陰性精專自行脈中衛為水穀之悍氣屬陽陽性剽悍滑利故行脈外請析言之平旦陰盡由寐而寤邵子曰人之神寐則棲腎寤則棲心將寐在脾熟寐在腎將寤在肝正寤在心十二經脈皆根於心寤屬陽太陽為陽中之陽故經曰人寤則目張目張則陽氣出於睛明穴屬足太陽經而上行於頭始於足太陽次手太陽再下足少陽次手少陽再下足陽明次手陽明如是周二十五度乃下行陰分而目復合而寐目合則陽氣從足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎如是亦周二十五度終而復始如環無端再析言之如卯初初刻陰盡而寤衛行太陽先行足經次行手經余皆同卯初一刻衛行少陽卯初二刻衛行陽明卯初三刻衛間行足少陰卯正初刻衛復行太陽卯正一刻衛復行少陽卯正二刻衛復行陽明卯正三刻衛復間行足少陰陽盡間陰者以足少陰陰陽互根為人身之大根柢大樞紐也如是環行自卯至申周二十五度陽盡於陰陰受氣矣陰亦周二十五度一晝一夜漏下百刻而盡衛氣五十度周於身如是無已與天地同紀知此則人之病否生死可以決藥之升降補瀉表裡陰陽可無差矣營氣行度一經水行地論營氣陰氣也如地水之氣隨天氣以運行者也天有經宿地有經水人有經脈經脈者乃運行臟腑之血以周於內外者也臟屬陰故臟六經為陰如手太陰肺手少陰心手厥陰心包絡足太陰脾足少陰腎足厥陰肝是也腑屬陽故腑六經為陽如手陽明大腸手太陽小腸手少陽三焦右腎旁三焦腑足陽明胃足太陽膀胱足少陽膽是也陰之大者為太陰太陰為開敷布陰氣者也太陰三陰也經曰三陰為母陰之小者為少陰少陰為樞轉輸陰氣者也少陰二陰也經曰二陰為雌兩陰交盡為厥陰厥陰為闔受納陰氣者也厥陰一陰也經曰一陰為獨使陽之大者為太陽太陽行背在裡太陽為開敷布陽氣者也太陽三陽也經曰三陽為父陽之小者為少陽少陽行身之側面在表裡之間少陽為樞轉輸陽氣者也兩陽合明為陽明陽明行腹在表之裡陽明為闔收納陽氣者也然則陰陽分手足者何也蓋人有三焦此三焦即三停而三焦只是兩焦以人身中有膈膜遮蔽濁氣不使上熏心肺膈膜以上肺與心與心包絡象天經脈因行於手故手三陰從臟走手陰從內起手三陽從手走頭陽從外起手三陽雖位居下焦然與手三陰為表裡直相連絡故亦走手膈膜以下諸臟腑皆象地經脈因行於足故足三陽從頭走足陽行於外足三陰從足走腹陰行於內象天者陰先而陽後象地者陽先而陰後此水火既濟地天交泰之道也或曰經脈既有從腹走手從手走頭從頭走足從足走腹之不同何謂皆根於心乎既曰皆根於心何又謂營出中焦肺脈亦從中焦起乎曰經脈根於心而行於腹行於手行於頭行於足此經所止之處即彼經所起之處猶樹之由根而干由干而枝枝又生枝繁衍無已而要皆原於根也心脈下緣於胃脈猶樹之根鬚生於地下也根於心者大哉乾元萬物資始緣於胃者至哉坤元萬物資生經曰心生血又曰營氣之道內谷為寶谷入於胃乃傳之肺精專者行於經隧常營無已終而復始是謂天地之紀蓋謂水穀精微之氣皆由胃出而上注於心奉心化赤為血而上注於肺陰隨陽化天氣行而營氣與之俱行故每日營氣之行皆從肺經始地上承天也由肺經下行而注於大腸經肺與大腸相表裡復上行而注於胃經循注於脾經脾與胃相表裡又上行而注於心經由心經下行而注於小腸經心與小腸相表裡由是而注於膀胱經循注於腎經腎與膀胱相表裡從腎注心包絡心腎相交由心包絡下行而注於三焦經心包絡與三焦相表裡從三焦經復上行而注於膽經循注於肝經肝與膽相表裡至肝經而營氣一周於身經故曰厥陰為陰之盡厥陰為闔盡而闔故藏血由肝經上行而復注於肺經終而復始如環無端一晝一夜五十度周於身經故曰五十營再以經脈運行於內外者析言之手太陰肺脈根於心緣於胃而上通於肺由肺下膈絡大腸還上膈由肺系喉管兩旁左是經脈管右是絡管外行乳上三肋端去中行旁開六寸同身寸法橫從腋下達肘內循臂前廉入寸口上魚際大指後肉隆起處至手大指內側少商穴其支者循腕後入手次指內側商陽穴而交手陽明手陽明大腸脈外起手次指內側入合谷俗名虎口循臂外前廉達肩入缺盆肩下橫骨陷中內行絡肺下膈屬大腸從缺盆分支外行直上頸側貫頰內入上齒還出外行人中挾鼻空旁迎香穴而交足陽明足陽明胃脈外起鼻空旁上行當目下胞之中下入上齒還出挾口繞腮上耳前至額角下頸側結喉兩旁人迎穴入缺盆再下行當乳之中內行下膈屬胃絡脾挾臍旁入氣街毛際兩旁胃口又生一支亦挾臍旁入氣街外行腿合縫從合縫斜行腿面直至足中指之外側又生一小支別跗上入大指間出其端厲兌穴而交足太陰足太陰脾脈外起足大指端之內側循內踝前廉上股大腿內廉入腹行季脅在足少陽厥陰之裡一行上膈挾咽連舌本散舌下其支者復從胃別上膈注心中從胃之別絡注心濁氣乃不上僭而交手少陰手少陰心脈起於心中出屬心系心系上與肺通由肺葉而下曲折向後貫脊髓通於腎肺心腎一氣相通轉而向前下膈絡小腸其支者從心系上挾咽繫於目其直者外行腋下循肘臂內後廉至小指內側少衝穴而交手太陽手太陽小腸脈外起手小指內側而行外側少澤穴循肘外後廉過肩後廉入缺盆內行絡心下膈抵胃屬小腸其支者由缺盆交肩貫頸頰至目鋭眥目外角卻入耳中其支者由耳前斜絡於顴至目內眥目內角而交足太陽足太陽膀胱脈外起目內眥上額交巔分一小支從巔至耳上角後行下項循肩後分二大支一大支挾脊旁開寸半第一行抵腰中腰中有四空內行絡腎屬膀胱其直者從腰下外行貫臀入膕中膝後曲處委中穴一大支又從肩膊後左右分下貫胛膂脊兩旁肉為膂挾脊旁開三寸第二行入膕中貫腨內足肚出外踝至足小指外側端至陰穴以交足少陰足少陰腎脈外起小指下斜趨足心循內踝入足後跟上行股內後廉貫脊裡屬腎絡膀胱其直者從股內前行至合縫由合縫上行入腹去腹中行旁開一寸至臍入腎由臍上行去中行旁開一寸五分從腎上貫肝膈又上行去中行旁開二寸至胸中入肺循喉嚨挾舌本其支者從肺出絡心注胸中肺心心包絡肝四臟皆與腎經相通以交手厥陰手厥陰心包絡脈內起胸中下膈絡三焦其支者由胸中出脅抵腋循心肺二經之間外行起腋下三寸乳外側一寸許向外上轉循臂肘內兩筋之間入掌中勞宮穴至中指出其端中衝穴其支者別掌中行小指內之次指端關衝穴以交手少陽手少陽三焦脈外起小指次指之外側上循手臂外兩骨中間貫肘上肩由肩上項交出膽經之後入缺盆內行布膻中散絡心包下膈屬三焦其支者外行入缺盆上項系耳後出耳上角以屈下頰至䪼目下為䪼其支者從耳後內入耳中外走耳前交動脈間至目鋭眥而交足少陽足少陽膽脈外起目鋭眥上頭角下耳後循頸側行三焦經之前後入缺盆一支從耳後入耳中走耳前還至目鋭眥一支別鋭眥下大迎胃經穴在頷前一寸三分動脈陷中還行於䪼合三焦經下加頰車耳下穴名行頸側亦入缺盆由缺盆內行胸中貫膈絡肝屬膽循脅裡出氣街毛際兩旁動脈繞毛際橫入髀厭中胯骨其直者從缺盆外行過肩下腋走身側之季脅脅骨下盡處下髀厭行膝外廉至外踝前還行足跗至足小指次指之外側竅陰穴生一小支別足跗下足大指岐骨貫爪甲出三毛大指爪甲後為三毛大敦穴以交足厥陰足厥陰肝脈外起足大指爪甲端還行足跗走內踝出脾脈之後入膕中循股陰內行繞陰器抵小腹還行季脅肝經章門穴斜上直乳下二肋端挾胃屬肝絡膽貫膈布脅肋循喉嚨上連目系外行出額與督脈會於巔一支外行從目系下頰還唇一支內行從肝別貫膈上注於肺終而復始此經脈也所謂十二絡者即十二經之別所以回血入於經者也別有脾之大絡名曰大包出淵液穴下三寸屬膽經布胸脅實則身盡痛虛則百節皆縱又有胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣乃十二經脈之宗氣土為萬物之母故亦名宗氣盛喘數絶者病在中結而橫有積也絶不至則死動甚者宗氣泄也知經絡之所行則知病之所在矣若夫奇經無臟腑配合之經即足六經之別考沖任督一源而三脈皆起於中極下中極穴在臍下四寸任脈由中極下之會陰穴當臍中而上至承漿穴而止衝脈由中極挾臍旁而上至胸中而散督脈由中極下行轉而向後自長強穴尾閭骨端而上行於背之中行至齦交穴牙齦內而止任督二脈一行身前以任養諸陰一行身後以總督諸陽猶天地之有子午可以分可以合分之以見陰陽之對待合之以見陰陽之環行一而二二而一者也陰維維一身之陰脈陽維維一身之陽脈又與任督二脈相輔而行者也陰蹺起於足內踝之照海穴屬足少陰經側行而上於目內眥之睛明穴屬足太陽經陽蹺起於足外踝之申脈穴屬足太陽經側行而亦上於目內眥之睛明穴陰維陽維陰蹺陽蹺四脈猶八方四正之有四維也帶脈起於季脅下之章門穴為足厥陰少陽之會與天樞穴平猶天之有天腰橫帶也知奇經之附正經而行正經治而奇經亦治亦何必深言治法以矜奇炫異乎百病提綱論人稟天地之氣以生即感天地之氣以病亦必法天地之氣以治夫天地之氣陰陽之氣也陰陽之氣燥濕之氣也乾金為天天氣主燥坤土為地地氣主濕乾得坤之陰爻成離火就燥也坤得乾之陽爻成坎水流濕也乾坤化為坎離故燥濕為先天之體水火為後天之用水火即燥濕所變而燥濕又因寒熱而化也水氣寒火氣熱寒搏則燥生熱爍則燥成熱蒸則濕動寒鬱則濕凝是寒熱皆能化為燥濕也或曰燥濕二氣何以寒熱皆能化乎曰子欲知燥濕曷觀乾坤乾象太極首一畫為陽次二畫為陰乾金本陽含陰也故乾為太陽而非孤陽坤之六畫即乾之偶而並者坤土本陰承陽也故坤為太陰而非孤陰乾坤卦象天地請實徵諸天地宗動天空洞無物無物為純陽宗動天最高高則轉得緊行得健緊而健亦為純陽陽之精為日日為真火金位之下火氣承之天屬陽燥亦屬陽固也然宗動天以內之八重天星為少陰月為太陰真陽之下真陰承之故曰陽含陰所以天之燥氣下降必含陰氣以降燥熱為本因燥而熱故曰燥熱不曰熱燥寒燥為變也因寒而燥故曰寒燥不曰燥寒陰之精為月月為真水水應月而生於地地屬陰濕亦屬陰固也然地居天中不動地之陽氣即天之陽氣陰隨乎陽故曰陰承陽所以地之濕氣上升必藉陽氣乃升寒濕為本因寒而濕故曰寒濕不曰濕寒濕熱為變也因濕而熱故曰濕熱不曰熱濕竊聞天地之間有三際最上一層為熱際次一層為冷際地上一層為溫際蓋因乎此觀此可知天地祗此陰陽二氣而陰陽二氣又是一氣特隨升降而變焉耳夫燥濕二氣各主一歲之半冬至陽氣潛藏於地地得陽氣而濕暗動故水泉動交春東風解凍雷乃發聲東風與雷皆陽也濕陰也陰隨陽化陽氣漸出於地而濕氣漸生故草木含液而萌動交夏溫風至陽氣盡出於地暑熱蒸騰而濕氣最盛故土潤溽暑大雨時行天地之氣化剛為柔夏至陽氣盡出於地而一陰甫生燥氣尚未行令交秋涼風至白露降天地始肅陽統陰降而燥氣始動秋分以後雷始收聲水始涸故濕氣始收斯時露寒霜肅陽統陰漸降而燥氣乃行故草木黃落交冬天氣上升地氣下降天地痞塞陽統陰全降而燥氣最盛陽氣潛藏於地下而外無所衛故水始冰地始凍虹藏不見天地之氣化柔為剛蓋水旺於冬實長於夏火盛於夏實藏於冬陰陽互根大化所以循環不窮也觀此可知燥屬陽中之陰濕屬陰中之陽且未動屬陰動則屬陽易曰吉凶悔吝生乎動蓋動則變變則化寒燥化為燥熱返其本也寒濕化為濕熱因乎變也人能體察燥濕二氣之因寒因熱所由生而以之為綱再察其化熱未化熱之變與夫燥鬱則不能行水而又夾濕濕鬱則不能布精而又化燥之理而以之為目綱舉目張一任病情萬狀而權衡在握矣且夫燥濕二氣為時行之氣又有非時之偏氣如久旱則燥氣勝乾熱乾冷則燥氣亦勝在春為風燥在夏為暑燥在秋為涼燥在冬為寒燥久雨則濕氣勝地氣不收溽暑陰冷則濕氣亦勝在春為風濕在夏與初秋為暑濕在深秋與冬為寒濕經曰必先歲氣無伐天和俗謂外感為時氣時之為義大矣哉若以一定之成方治無定之時邪其不知時之甚者哉然不獨當因時也尤當因地西北地高燥氣勝東南地卑濕氣勝不獨當因地也尤當因人六氣傷人因人而化陰虛體質最易化燥燥固為燥即濕亦化為燥陽虛體質最易化濕濕固為濕即燥亦必夾濕燥也濕也固外感百病所莫能外者也或曰外感有風寒暑濕燥火之六氣子以燥濕二氣賅之可推其故而析言之歟曰在地成形在天為氣六氣風居乎始寒暑濕燥居乎中火居乎終風居乎始者風固燥濕二氣所由動也暑居乎中者寒暑固燥濕二氣所由變也火居乎終者火又燥濕二氣所由化也請析言之風在卦為巽二陽居一陰之上外陽內陰且陽倍於陰故風為陽邪風固善動數變而無定體者也東方濕氣動必雨故曰濕風西方燥氣動必旱故曰燥風南方暑氣動必熱而濕故曰暑風北方寒氣動必冷而燥故曰寒風東南之風濕兼暑也東北之風濕兼寒也西南之風燥兼火也西北之風燥兼寒也動之得中人物因之以生動之太過人物感之而病蓋燥微則物暢其機燥甚則物即干萎濕微則物受其滋濕甚則物被其腐物如此人可知矣寒固燥所由生而火又燥所由成者也經云燥勝則乾所以夏月炎暑司權物見風日則津汁漸干人出汗多則津液漸耗火勝則燥固也秋冬寒涼司令在草木則枯萎在露則結為霜在雨則化為雪在水則凍為冰在人則手足皴裂兩間皆寒燥之氣所盤結也冬在卦為坎一陽居二陰之中寒冰外凝而燥火內濟故寒燥之病易化為燥熱經謂傷寒為熱病蓋寒則燥燥則熱理相因也若冬月陽不潛藏地濕不收則寒又必夾濕所以冬得秋病如病瘧病痢病溫者要皆兼乎濕邪耳至於暑即濕熱二氣互釀為害而化為燥者也必須分別濕多熱多偏於濕者化燥緩偏於熱者化燥急若純熱無濕則又為中暍之暑燥矣若夫火藏於金木水土中而動之則出又燥濕二氣所歸宿者也故戛金取火鑽木取火掘土取火土之精凝結而為石觀取火於石即可知取火於土之義海為火谷江湖水動處亦皆有火病人亦然金火同宮離為君火故肺與心動為燥火若濕與熱蒸又為濕火肝為震之雷火巽之風火故肝動為燥火若濕與熱蒸又為濕火腎火為龍火龍火水中之火水虧火旺化為燥火若濕與熱蒸又為濕火脾屬土土為雜氣故脾火多濕火濕火傷及脾陰又化為燥火燥也濕也終歸火化也此地二生火所以成之者也他如春溫寒化燥而夾濕者也風溫風化燥也溫熱暑溫濕熱交合為病而偏於熱者也濕溫濕熱交合為病而偏於濕者也溫疫病如役擾乃濁土中濕熱鬱蒸之氣而化燥最速者也伏暑乃暑濕交合之邪伏於膜原待涼燥而後激發者也瘧疾有暑濕合邪伏於膜原有風寒逼暑入於營舍亦皆待涼燥而後激發者也霍亂有傷於暑燥有傷於寒燥有傷於暑濕有傷於寒濕有燥夾濕濕化燥相因而為病者也審是燥濕二氣非風寒暑火所生而化化而成之者哉吾故舉之以為提綱曰敢問治法如何曰治外感燥濕之邪無他使邪有出路而已使邪早有出路而已出路者何肺胃腸膀胱是也蓋邪從外來必從外去毛竅是肺之合口鼻是肺胃之竅大腸膀胱為在裡之表又肺胃之門戶故邪從汗解為外解邪從二便解亦為外解燥屬天氣天氣為清邪以氣搏氣故首傷肺經氣分氣無形質其有形質者乃胃腸中渣滓燥邪由肺傳裡得之以為依附故又病胃腸肺與大腸同為燥金肺胃為子母故經謂陽明亦主燥金以燥邪傷燥金同氣相求理固然也濕屬地氣地氣氤氳黏膩為濁邪然濁邪亦屬是氣氣從口鼻傳入故亦傷肺經氣分肺主一身氣化氣為邪阻不能行水故濕無由化濁邪歸濁道故必傳胃腸濁中清者必傳膀胱曰藥之何如曰汗者人之津汗之出者氣所化今氣不化津而無汗者乃氣為邪所阻耳邪阻則毛竅經絡不開即胃腸膀胱亦因之不開法當輕開所阻肺氣之邪佐以流利胃腸氣機兼通膀胱氣化燥邪辛潤以開之濕邪辛淡以開之燥兼寒者辛溫潤以開之燥兼熱者辛涼輕劑以開之濕兼寒者辛溫淡以開之濕兼熱者辛涼淡以開之燥化熱者辛涼重劑以開之濕化熱者辛苦通降以開之燥為濕鬱者辛潤之中參苦辛淡以化濕濕為燥郁者辛淡之中參辛潤以解燥燥擾神明者辛涼輕虛以開之濕昏神智者苦辛清淡以開之總之肺經氣分邪一開通則汗自解矣其有納穀後即病者氣為邪搏不及腐化須兼宣松和化不使之結後雖傳裡小通之即行矣其有感邪之重且濁者必然傳裡傳裡即須攻下若肺氣未開而里證又急又必於宣通肺氣之中加以通潤胃腸之品肺主天氣天氣通地氣乃行耳燥邪大腸多有結糞必咸以軟之潤以通之濕邪大便多似敗醬必緩其藥力以推蕩之或用丸藥以磨化之燥傷津液者滑潤之品增液以通之濕阻氣機者辛苦之味開化以行之要之邪傷天氣治以開豁天氣開而毛竅經絡之清邪自開即胃腸膀胱之濁邪無所搏束亦與之俱開汗得解而二便解如上竅開而下竅自通也若上竅未開而強通下竅則氣為上焦之邪所阻不能傳送下行譬如搏足之鳥而欲飛騰其可得乎邪傳地道治以通利地氣通而胃腸膀胱之濁邪自通即毛竅經絡之清邪孤懸無依亦與之俱通二便解而汗亦解如下竅通而上竅自開也若下竅不通而強開上竅則氣為胃腸之邪所阻不得化汗外出譬如海門淤塞而欲衆流順軌其又可得乎審若是天道與地道一以貫之之道也豈有二哉曰其有人虛證實者當何如曰人虛證實不過加以托邪之法護正之方究當以祛邪為主邪早退一日正即早安一日經故曰有故無隕否則養癰成患後雖欲治不可得而治吾故曰治外邪之法無他使邪有出路而已使邪早有出路而已矣或又曰邪無形質依渣滓以為形質然則病人不與之食可乎曰非也邪之所湊其氣必虛能食而不與之食則胃氣愈虛譬如空城禦敵賊必直入而無所防不獨邪入於胃已也胃無穀氣則生化之源絶五臟皆為虛器邪且無所不入矣曰然則強與之食可乎而亦非也不能食而強與之食則邪氣愈遏是齎盜糧也總之食與不食當視病者之能與不能強食固不可禁食尤不可但當清淡養胃不可濃濁護邪諺有之曰餓不死的傷寒謂知飢為有胃氣乃是不死之傷寒也吾淮鞠通先生嘗諄言之奈何病家猶強食醫家猶禁食而竟昧乎大中至正之理也哉曰外感百病不外躁濕二氣吾聞諸子矣敢問內傷何如曰內傷千變萬化而推致病之由亦祗此燥濕兩端大道原不外一陰一陽也彼古今醫籍分門別類名色愈多治法愈歧徒足炫一時之耳目反令後學無所指歸總由未能探本窮原以察天地陰陽之理焉耳請析言之外感者實也雖虛而必先實內傷者虛也雖實而必先虛陽氣虛則蒸運無力而成內濕陰血虛則榮養無資而成內燥思慮過度則氣結氣結則樞轉不靈而成內濕氣結則血亦結血結則營運不周而成內燥且也陰陽互根氣血同源陽虛甚者陰亦必虛釜無薪火安望蒸變乎精微氣虛甚者血亦必虛車無轆轤安望汲引以灌溉往往始也病濕繼則濕又化燥陰虛甚者陽亦必虛燈殘油涸焉能大發其輝光血虛甚者氣亦必虛水淺舟停焉能一往而奔放往往始也病燥繼則燥又夾濕蓋化濕猶自外來虛濕雖從內生然畢竟是水飲所化猶不足中之有餘病也化燥則從內涸矣故因燥化濕者仍當以治濕為本而治燥兼之由濕化燥者即當以治濕為本而治燥兼之此治法標本先後之大要也曰臟腑輕重何如曰凡因天氣致病者為外感外感先病人之天氣凡因人致病者為內傷內傷先病人之地氣故內燥起於肺胃腎胃為重腎為尤重蓋肺為敷布精液之源胃為生化精液之本腎又為敷布生化之根柢內濕起於肺脾腎脾為重腎為尤重蓋肺為通調水津之源脾為散輸水津之本腎又為通調散輸之樞紐若是者脾也胃也腎也固肺所藉以生藉以化者也天氣不下降由於地氣不上騰顧可不分輕重也哉總之病有燥濕藥有燥潤病有純雜方有變通經曰知其要者一言而終不知其要流散無窮其斯之謂與望病須察神氣論經曰望而知之之謂神既稱之曰神必能以我之神會彼之神夫人之神氣棲於二目而歷乎百體尤必統百體察之察其清濁以辨燥濕察其動靜以辨陰陽察其有無以決死生如是而望始備而望始神春山先生曰人之神氣在有意無意間流露最真醫者清心凝神一會即覺不宜過泥泥則私意一起醫者與病者神氣相混反覺疑似難於捉摸此又以神會神之妙理也試以色論經謂五色內應五臟青屬肝木紅屬心火黃屬脾土白屬肺金黑屬腎水此道其常也而病則有變甚有五色不應五臟者此又變中之變總之不論何色均要有神氣神氣云者有光有體是也光者外面明朗體者裡面潤澤光無形主陽主氣體有象主陰主血氣血無乖陰陽不爭自然光體俱備經云生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫蓋以平人五臟既和其色稟胃氣而出於皮毛之間胃氣色黃皮毛色白精氣內含寶光外發既不浮露又不混蒙故曰如縞裹又云精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼碧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼重言以申明之即重有神氣之義蓋有神氣者有胃氣者也又云青如草茲者死黃如枳實者死黑如炱煙煤者死赤如衃血者死白如枯骨者死此氣血俱亡無光無體神氣已去者也又云青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此氣血雖病神氣未傷有光有體不能內含而不外露者也觀內經論色分平病死三等雖未明言神氣而神氣已寓於其中矣或曰病有萬變色於何別曰天地不外燥濕病亦不外燥濕色亦不外燥濕燥屬天氣色多有光而浮濕屬地氣色多有體而晦風燥寒燥由外搏束主收斂收斂則急面色多繃急而光潔燥搏津液痰飲外溢於面色多紅潤而浮夾濕多紅潤而晦燥邪化熱色多幹紅苗竅乾澀多煩渴甚則變枯而青黑枯而青黑則真陰虧極而色無光體矣寒濕內生色必滯暗變黃變黑皆沉晦不明濕兼風色潤而浮多自汗濕與暑合與熱合或濕土鬱蒸之溫邪三者皆由口鼻吸入三焦主蒸散蒸散則緩面色多鬆緩而垢晦甚者濁邪由內蒸而外溢如油膩煙燻者然若由濕化燥則又晦而且干晦而干則濕邪未去真陰又虧色又無光而無體矣或曰部位何如曰經謂心熱病額先赤若青黑色主有暴疾肺熱病鼻先赤凡鼻色青者主腹痛微黑者有水氣鼻準黃者小便難白者為氣虛鮮紅有留飲又曰肺熱病右頰先赤肝熱病左頰先赤腎熱病頦先赤又主膀胱熱結小便不通肝病者目眥青赤主熱白睛黃主黃疸目眥黃為病欲愈又曰心病者顴赤腎病者顴與顏黑黃顏天庭赤色出兩顴大如拇指主卒死又曰色多青則痛色黑則痹如霍亂閉遏色與絡脈皆見黑色之類黃赤則熱多白則寒五色皆見則為寒熱經言部位之應臟腑以及五色辨病之說不可枚舉學者不可不知又不可盡拘表裡陰陽傳變甚速故不可拘所當權於其大以燥濕二字為提綱以兼風兼寒兼暑化火未化火為權變以色中之光體為神氣大道原不外一陰一陽也望色之後即須審形竅頭為諸陽之會因於濕首如裹目如蒙痰飲上干於頭則眩暈嘔吐痰水血燥風動亦眩暈頭癢頭偏疼又有腎水虛燥陰不潛陽氣逆上行經所謂頭痛巔疾下虛上實是也又有肝膽燥熱木旺風生耳目無血以養經所謂徇蒙招尤目瞑耳聾下實上虛是也兩實字皆指虛火言非真實也又有頭重視身名天柱骨倒元氣已敗此頭無神氣者也肝開竅於目肝脈上連目系燥病則目光炯炯濕病則目多昏蒙燥甚則目無淚而乾澀濕甚則目珠黃而眥爛或眼胞腫如臥蠶陽明腑實則譫語妄有所見熱入血室血耗陰傷晝日明瞭夜則低聲自語如見鬼狀開目見人病屬陽閉目不欲見人病屬陰脫陽者見鬼脫陰者目盲脫陰脫陽者病危目有眵有淚精采內含者為有神氣無眵無淚白珠色藍烏珠色滯精采內奪及浮光外露者皆為無神氣凡病目能識人者輕睛昏不識人及目直視歪視目小目瞪目睛正圓戴眼反折眼胞陷下為神氣已去多不治其直視歪視上視目睛微定移時稍動者有因痰閉使然又不可竟作不治論肺開竅於鼻燥病鼻多幹澀濕病鼻多潤澤鼻流清涕多風寒鼻流濁涕多熱鼻孔燥如煙煤為陽毒熱極鼻孔冷滑而黑為陰毒冷極痰飲壅遏肺氣則呼吸有聲肺腎虛脫則出入氣微或喘急抬肩鼻孔掀張氣微與掀張則神氣由此散矣腎開竅於耳心寄竅於耳膽上絡於耳暴病耳聾耳腫耳痛耳旁紅屬少陽風熱燥邪或肝膽熱挾濕濁上壅久病耳聾屬氣虛屬精脫若耳焦枯受塵垢屬腎水虧極此亦內無精液而外無神氣者也脾開竅於口口苦屬燥熱口甜屬濕熱唇口赤腫而乾者熱極青黑而潤者寒極焦而紅者可治焦而黑者難治淡白為氣虛淡白不澤為液少唇青而反環口黧黑唇舌顫振不止口如魚口氣出不返者死為其神氣已去故也心開竅於舌脾之大絡繫於舌本肝腎脈亦通舌本凡木舌重舌舌衄屬心經燥熱舌菌舌墊舌腫大塞口屬脾經濕熱挾心火上壅舌本強硬為熱兼痰若舌卷短痿軟枯小則肝腎陰涸而舌因無神氣矣舌之有苔猶地之有苔地之苔濕氣上泛而生舌之苔脾胃津液上潮而生故平人舌中常有浮白苔一層或浮黃苔一層夏月濕土司令苔每較厚而微黃但不滿不板滯其脾胃濕熱素重者往往終年有白厚苔或舌中灰黃至有病時脾胃津液為邪所郁或因瀉痢脾胃氣陷舌反無苔或比平昔較薄其胃腎津液不足者舌多赤而無苔或舌中有紅路一條或舌尖舌邊多紅點此平人舌苔之大較也若夫有病則舌必見苔病藏於中苔顯於外確鑿可憑毫釐不爽醫家把握首賴乎此是不可以不辨風寒為寒燥之邪風溫為溫燥之邪風寒初起在表風溫首傷肺經氣分故舌多無苔即有黃白苔亦薄而滑漸次傳裡與胃腑糟粕相為搏結苔方由薄而厚由白而黃而黑而燥其象皆板滯不宣逮下後苔始化腐腐者宣松而不板實之象由腐而退漸生浮薄新苔一層乃為病邪解盡其有初起白苔即燥如白砂者名白砂苔此溫燥之邪過重宜速下之佐以甘涼救液亦有苔至黑而不燥者或黃黑苔中有一二條白者或舌前雖燥舌根苔白厚者皆夾濕夾痰飲之故亦有苔雖黃黑消薄而無地質者胃陰虛故也苔有地質與無地質此虛實之一大關也濕為濁邪兼證最多風濕傷表苔多滑白不厚寒濕傷里苔多膩白而厚暑溫濕溫溫疫溫熱皆濕土鬱蒸之氣冬溫因陽不潛藏亦濕土鬱蒸之餘氣數者皆從口鼻吸入肺胃膜原由里而發春溫為冬傷於寒寒鬱久而化熱寒燥之氣又能搏束津液水飲伏於膜原與熱混合亦由里而發暑濕晚發名曰伏暑因夏傷暑濕伏於膜原秋日涼燥之氣又從外搏遏在內之暑濕此由表邪引動里邪而發暑濕瘧疾亦多由此按六氣之邪有賊邪時邪伏邪之分如風寒卒感謂之賊邪賊邪尖穎隨感隨發頃刻不能藏伏風溫溫熱暑溫濕溫溫疫冬溫等證皆吸受時行之氣如春受風陽化熱之氣夏受濕土鬱蒸之氣故謂之時邪風陽化熱尚屬正氣濕土鬱蒸則多不正之氣時邪雖伏而後發但不能久藏春溫伏暑謂之伏邪如經所謂冬傷於寒春必病溫夏傷於暑秋成痎瘧之類皆逾時而發或曰寒暑之邪何以伏而後發曰伏邪者正邪也寒為冬令之常氣暑為夏令之常氣常氣感人由漸而入人多不覺靈樞經曰正邪之傷人也若有若無若存若亡謂令人當時不知所受故能藏伏伏邪時邪皆由里發多夾濕故初起舌上即有白苔且厚而不薄膩而不滑或粗如積粉或色兼淡黃逮傳胃化火與糟粕相摶方由白而黃而黑而燥其暑溫濕溫之邪多黃白混合似黃似白或黃膩或灰黃而皆不燥此等舌苔即有下證或大便不通不爽宜熟大黃緩下之以舌苔不燥腸中必無燥糞多似敗醬色故不宜猛下此燥邪濕邪燥濕混合之邪舌苔之大較也試取葉氏所論而詳言之初起舌苔白而缺津者燥熱傷肺津也宜輕清泄熱為其上者上之也如杏仁桔梗牛蒡之類辛潤以解搏束桑葉蔞皮之類輕清以解燥熱佐山梔皮連翹殼之微苦微燥以燥屬金微苦能勝之也舌苔白而底絳者濕遏熱伏也須防其變干宜辛淡輕清泄濕透熱不使濕邪遏熱為要如三仁湯蔻仁易蔻皮稍佐滑石淡竹葉蘆根之類以清化之初病舌苔白燥而薄為胃腎陰虧其神不昏者宜小生地元參麥冬等味以救陰戥分不宜過大恐遏伏邪氣銀花知母蘆根竹葉等味以化邪尤須加辛潤以透達若神即昏者加以開閉如普濟丹寧上丸之類遲則內閉外脫不治舌苔白燥而厚者調胃承氣湯下之佐以清滑養陰之品如鮮生地元參梨汁蘆根之類取其清滑不滯邪氣若舌苔白膩不燥自覺悶極屬脾濕重宜加減正氣散三仁湯之類去苡仁蘆根滑石加醒頭草神麯辛淡開化芳香逐穢舌脹大不能出口屬脾濕胃熱鬱極毒延於口前法加生大黃汁利之舌脹自消舌苔白厚黏膩口甜吐濁涎沫為脾疸乃脾胃濕熱氣聚與穀氣相搏滿則上溢亦宜加減正氣散加醒頭草神麯舌苔如鹼色或白苔夾一二條黃色乃宿滯夾穢濁之邪前法加宣中消滯藥否恐結閉不能透出膜原白苔厚如積粉四邊舌肉紫絳乃濕土鬱蒸之溫邪發為溫疫仿達原飲三仁湯加減透邪以防傳陷苔白不燥或黃白相兼或灰白不渴慎不可投苦泄清下此濕鬱未達或素多痰飲雖中脘痞痛亦不可攻宜用開化如杏蔻枳桔陳皮茯苓通草之類舌苔黃濁胸膈按痛或自痛或痞脹此濕熱混合宜苦降辛通如蔞貝溫膽小陷胸半夏瀉心黃芩滑石湯之類然黃要有地質之黃乃可用苦辛重劑若消黃光滑乃無形濕熱已見虛象宜蔞貝梔翹之類微辛微苦輕輕開化大忌苦辛重劑舌苔老黃灰黃如沉香色而有地質不滑而澀或中有斷紋或中心厚苔此邪已傳裡胃腑腸腑與宿滯相結脘腹必滿必痛皆當下之若未見此樣舌苔恐濕聚太陰為滿寒熱濕錯雜為痛或濕阻氣機為脹仍當從辛淡溫法開化若苔黃薄而干與前白薄而乾者同治熱邪傳營舌色必絳而無苔其有舌絳中兼黃白苔者及似苔非苔者此氣分遏郁之熱爍津非血分也宜用前辛潤達邪輕清泄熱法最忌苦寒冰伏陰柔滋膩致氣分之邪遏伏內陷反成純絳無苔其有不因冰伏而舌純絳鮮澤神昏者乃邪傳包絡宜犀角鮮地黃銀翹鬱金鮮石菖蒲竹瀝薑汁等味清化之中佐辛潤開閉若其人平素多痰外熱一陷里絡即閉須兼用寧上普濟丹丸之類遲恐閉極痙厥舌絳望之若干捫之有津此平昔津虧濕熱熏蒸濁痰蒙閉心包宜輕清泄熱佐寧上丸開之舌色紫暗捫之濕乃其人胸膈中素有宿瘀與熱相搏宜鮮地黃犀角丹皮丹參赤芍鬱金花粉桃仁藕汁等味涼血化瘀否則瘀熱為伍阻遏機竅遂變如狂發狂之證舌紫而腫大乃酒毒衝心前法加生大黃汁利之舌絳欲伸而抵齒難伸者此痰阻舌竅肝風內動宜於清化劑中加竹瀝薑汁膽星川貝等味以化痰熱切勿滋膩遏伏火邪舌絳而燥邪火傷營也宜犀角鮮地黃湯其有因寒涼陰柔遏伏者往往愈清愈燥愈滋愈干又宜甘平甘潤佐以辛潤透邪其津乃回舌絳有碎點黃白者欲生疳也舌與滿口生白衣如黴苔或生糜點謂之口糜因其人胃腎陰虛中無砥柱濕熱用事混合蒸騰證屬難治酌用導赤犀角地黃之類救之舌生大紅點者熱毒乘心也導赤犀角加黃連金汁治之或稍加生大黃汁利之舌心絳干乃胃熱上鑠心營宜清心胃舌尖絳干乃心火上炎宜導赤以瀉其腑舌絳而光亮絳而不鮮甚至干晦枯萎者或淡而無色如豬腰樣者此胃肝腎陰涸極而舌無神氣者也急宜加減炙甘草湯加沙參玉竹雞子黃生龜板等味甘平濡潤以救之黑為腎色苔黑燥而厚此胃腸邪結傷及腎陰急宜大承氣鹹苦下之若黑燥而不甚厚調胃承氣微和之或增液承氣墊下之若舌淡黑如淡墨色而津不滿者此腎虛無根之火上炎急用復脈生脈六味輩救之舌苔灰黑青黯而滑潤者及舌雖無苔不燥而有如煙煤隱隱者無熱不渴或見肢涼此虛寒證水來剋火之象急宜理陰煎之類溫之若舌短縮為肝腎氣竭難治看舌之後又須驗齒齒為骨之餘齦為胃之絡燥熱最爍胃津並爍腎液初起齒光燥如石者熱爍腎陰也若無汗惡寒乃寒燥之氣搏束衛分所致宜辛涼透汗勿用滋膩初病齒流清血痛者為胃火沖激不痛者為龍火內爍分虛實治之齒焦而有垢者胃熱爍腎陰也當微下之無下證者宜玉女煎清胃救腎齒上半潤下半燥者乃水不上承心火無濟宜清心滋水枯處轉潤乃安胃腎二經之血上走齒齦病深動血結瓣於上陽血色紫如干漆陰血色黃如醬豆瓣陽血滋胃為主陰血救腎為要然見豆瓣色者多險蓋陰下竭陽上厥也齒垢如灰糕樣者乃胃氣無權濕濁用事多死齒無垢者死齒如枯骨者死腎液涸而色不榮而齒因無神氣矣咬牙有實有虛咬牙齦者為濕熱化風但咬牙者或痰熱阻絡或胃腑熱極氣走其絡皆欲作痙之象或咬牙而脈證皆衰或在下後此胃虛無穀氣以自榮虛則喜實故也速宜滋益胃陰若下後牙關緊閉為胃氣絶不治其有初病舌本不縮而硬牙關咬定不開者此痰熱阻竅先用烏梅擦之使開酸能生津又酸屬木木來泄土故擦之即開再進清熱化痰潛肝之劑腎開竅於二陰前陰利水後陰利谷燥病溺多清黃濕病溺多渾濁濕熱溫邪溺多渾黃渾赤其有病濕而溺不渾濁者在外感為邪鬱氣分氣不行水以致濕熱留而不行在內傷為氣虛不能傳化若論大便燥邪多硬濕邪多溏燥搏氣機不能化水又多窘迫下利傷寒化燥傷陰下之宜猛濕邪膠黏重濁糞如敗醬下之宜輕若春溫溫疫溫熱內有燥糞者又當急下陽明以存津液傷寒大便溏為邪已盡若協熱下利及下利稀水色純青者又當速下存津不可誤認為邪已盡濕邪大便溏為邪未盡必屎燥乃為無濕若大便塵腐散薄完穀不化而無氣味或如屋漏水者此屬敗象不可誤認為邪未盡總之經權常變不可執一互證旁參乃有心得形竅望後當審胸腹臟腑部位胸中為肺之府膻中為心之府正在心下有膈膜旁有脅肋為肝膽之分野此數者皆清氣津液往來之所其有胸痞者濕阻氣機也胸痛者水結氣分也或肺氣壅遏也正在心下以及脅肋硬痛者乃濕熱痰飲蓄水與氣搏結使然非渣滓也胃為中土西學云胃橫居膈下偏左脘大向左尾小向右胃氣故由右降胃上口名曰賁門其紋密故食物易入而難出非嘔吐不開胃下口名曰幽門下達小腸小腸周回疊積下抵小腹小腸下口橫接大腸大腸分上中下三回回長尺許上回與小腸橫接名曰闌門其口如唇渣滓可入不可出上回由右胯內旁倒行而上中回橫過胃底下回至脾下從左軟脅斜落下達廣腸以至魄門魄門即肛門與肺氣貫通肝居膈下胃上左右兩大葉左小右大右大故稍偏膈肉右方經故曰肝生於左不曰肝藏於左經曰肝生於左肺藏於右凡肝有病最為要害肝葉撐張則脹肝熱血燥經絡凝滯不通下部回血壅脹即有水血溢於夾膜之裡漸漬漸深終成蠱脹肚大筋青不治夫青筋非筋也血絡也青者血燥而結也此證多由怒郁傷肝所致蓋肝鬱則熱熱則燥燥則血不流通而結血結則不獨血滯於中即水飲亦無由吸攝不能循其常道下輸膀胱故蠱脹多水醫者見水行水不審水由肝血燥結所致所以不效易曰山風蠱艮為山巽為風艮上巽下則為蠱古人取名為蠱為其燥木剋土象類山風之義膽系肝右葉內膽汁所以潤肝而利腸也肝性易燥每取潤於膽汁凡人食後小腸飽滿腸頭上逼膽囊膽汁漬入腸內利傳渣滓膽有熱則上嘔苦涎熱迫下行則下泄青汁膽受驚亦泄青汁腸有寒渣滓不結膽汁無所用事亦致瀉青膽絡凝滯膽汁入血又多生黃病肝膽經脈由脅肋下抵小腹繞陰器故少腹屬厥陰經肝經凝滯則經脈結痛成疝肝經血燥則抽搐燥甚則引舌與卵故舌卷卵縮脾附於胃西學謂脾居胃之左在第九至十一肋骨之內脾形如豎掌與胃相連胃脘大向左故曰脾居胃之左外豐圓向脅內深窩向胃故曰臍以上屬太陰經脾質甚軟可小可大其用在集聚往來之血為動脈寬間之地經故曰脾統血脾為胃行其津液經故曰脾為之使人有瘧疾惡寒戰栗血脈不行於外即縮於內無所歸藏則聚於脾聚於脾則脾脹大脾脹大故人脘脅脹悶逮瘧止血行其脹自消久久不已脾不輸精水與血結成為瘧母再久則濕去瘧止血燥成塊結於左肋在體質壯者人參鱉甲煎丸取血肉飛走諸靈通和血絡若濕未去而瘧未止者取蔣氏夜光丸通絡燥濕然此皆利於實而不利於虛也吾鄉又多有痞塊亦生左肋下世宗越人肥氣之說後人又妄制五積丸藥一派消削攻下多致人於死不知五積與瘧母之推移不動者皆由血絡燥結所致血燥而至於結塊則營氣不得行於其間故按之堅硬不痛治法皆以潤為主或溫潤或清潤視其人之寒熱用之再佐咸潤以軟之辛潤以通之有濕者佐苦辛以化之自無不效之理又脾絡燥結即有血水滲泄於下蠱脹之源間發於此此由思慮傷脾所致思則氣結氣結則血亦結結則血水不循常道而蠱成焉蠱脹總不外肝脾二經血絡燥結所致觀此而蠱取山風之義更可知矣蠱脹末路肌肉消瘦皮膚乾黑青絡暴露皆燥象也非有目所共睹者哉腎居脊骨第十四節陷中從上數下在十四節從下數上在第七節經曰七節之傍中有小心是也與精液總管相通經故曰腎藏精三焦經在右腎傍化水而通水道經故曰腎主水腎開竅於二陰腎與天樞穴通故曰當臍屬少陰經膀胱在前陰交骨之裡西學謂膀胱內有精囊有精溺兩管內底有兩小竅斜與腎通按男子精溺管至前陰會而為一女子分而為二此陽奇陰偶之義也女子外溺竅經名廷孔經曰膀胱者州都之官津液藏焉氣化則能出矣夫所謂津者溺是也液者日生之精是也氣化者三焦之氣化也彼西學之說尚與經義不悖臟腑部位體用如此知此則知病之所在矣然病有諸內必形諸外更當即著於外者言之燥病或肌膚刺痛手不可捫或項背強痛甚痛筋攣發痙手足牽引口噤頭搖面黑毛焦唇反眼戴舌卷囊縮又有腸拘似塊傴僂難伸及骨痿偏枯等證凡物乾則必縮干則必硬干則必動干則必痿理固然也在人亦然濕病則頭目昏重肢體困倦痠疼嗜臥懶動甚則神智昏沉如癡如醉凡物濫則必重濫則必軟濫則必混濁而不清明理固然也在人亦然燥熱必煩而動身熱口渴揭去衣被揚手擲足尋衣摸席撮空理線此條非大實即大虛總以苔脈神色為憑脈來沉實有力舌苔黃厚陽也熱也實也寒濕必倦而靜無熱不渴欲得衣被或身重足冷蜷臥惡寒或好向壁臥閉目不欲見光明懶與人言脈來軟濫無力舌苔色白陰也寒也虛也然則燥濕寒熱虛實不皆即外可知其內乎而猶不止此蓋人身之所守莫重於五臟而身之所主尤莫重於一心心也者神氣之所由生者也顧不重哉試以燥濕言之燥屬天氣天氣為清邪清邪不昏人神智故風燥寒燥暑燥初起令人心知所苦如頭痛寒熱皆自知之惟邪來迅速直傳心包者乃有內閉神昏之候或邪傳胃腑與濁滯相合又令譫語神昏濕屬地氣地氣為濁邪濁邪最昏人神智往往溫病初起即令人神氣異常昏糊煩躁不知所苦間有神清而能自主者夢寐亦多不安閉目即有所見有所見即譫妄之根原又有病初起時神智驚惶目光外浮反自云無病病深時猶能行走而身體強直脈病人不病謂之行尸不治此真陰涸極病陷於中神浮於外最深最重者也多屬不治然此就心之一臟言之也試再言五臟經曰五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強者生失強者死又曰手太陰氣絶則皮毛焦太陰者行氣溫於皮毛者也氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節則爪枯毛折毛折者毛先死丙篤丁死火勝金也手少陰氣絶則脈不通脈不通則血不流血不流則毛色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也足太陰氣絶則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也骨不濡則肉不能著骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也足厥陰氣絶則筋絶厥陰者肝脈也肝者筋之合也筋聚於陰器而脈絡於舌本脈不榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也五陰氣俱絶則目系轉轉則目運五臟之精華皆上聚於目目運者志先死志先死則遠一日半死矣六陽氣絶則陰與陽相離離則腠理發泄絶汗乃出如珠不流故旦占夕死夕占旦死又曰太陽之脈其終也戴眼上視反折身反向後瘛瘲手足抽掣其色白絶汗乃出出則死矣少陽終者耳聾百節皆縱緩縱不收筋痿故也目環目運轉絶系絶系一日半死色先青白乃死矣金勝木陽明終者口目動作善驚妄言色黃其上下經盛不仁肉絶則終矣少陰終者面黑齒長牙齦宣露而垢腹脹閉上下不通而終矣腎開竅於二陰太陰終者腹脹閉不得息善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷卵縮而終矣又曰大骨枯槁腎衰大肉陷下脾衰胸中氣滿喘息不便其氣動形肺衰其六月死真臟脈見乃與之期日凡若此者皆陰液絶於內而神氣奪於外者也其論少陰太陰上下不通兩條乃邪實正虛正不勝邪陰液涸極之故故經又有五實死五虛死之說曰脈盛心實皮熱肺實腹脹脾實前後不通腎實悶瞀肝實此謂五實脈細心虛皮寒肺虛氣少肝虛泄利前後腎虛飲食不入脾虛此謂五虛漿粥入胃泄注止則虛者活身汗得後利表裡皆解則實者活是虛者以脾腎為主實者以表裡得解邪有出路為主此診外感內傷之大法也別有急虛身中卒至急邪乘虛卒中身內五臟絶閉脈道不通氣不往來譬於墮溺不可為期此不可責之於望也外此皆可望而知之者也故曰望而知之之謂神
